/* ─── 🎨 색상표 (45 Color Chart) TAB ─── */
function rColorTab() {
  let colorChartHtml = `
    <div class="card card-rose" style="margin-bottom:12px; padding: 10px; box-sizing: border-box; width: 100%;">
      <div class="section-title" style="text-align:center;font-weight:bold;color:var(--rose2);margin-bottom:6px;font-size:1.1rem;">🎨 러브몬 45 컬러 차트</div>
      <p style="text-align:center; font-size:0.75rem; color:var(--text2); margin-bottom:12px; line-height:1.4;">
        원하는 번호를 클릭해 닉네임을 등록해보세요!<br>(빈 자리에만 등록 가능, 관리자는 수정 가능)
      </p>
      <div class="color-chart-grid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; background-color: #f1f3f5; padding: 6px; border-radius: 10px; width: 100%; box-sizing: border-box;">
  `;
  for(let i = 1; i <= 45; i++) {
    const nick = S.colorSlots[i] || "";
    const hasNameClass = nick ? "has-name" : "";
    const displayName = nick ? nick : "비어있음";
    let tileColor = "";
    if (i === 45) {
      tileColor = "#000000";
    } else {
      const hue = (60 + (i - 1) * 7.5) % 360;
      const saturation = Math.max(30, 95 - (i * 1.2));
      const lightness = Math.max(5, 65 - (i * 1.3));
      tileColor = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
    }
    const superSharpText = "text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 2px 2px 3px rgba(0,0,0,0.9);";
    colorChartHtml += `
      <div class="color-slot ${hasNameClass}"
           data-a="setColorSlot"
           data-slot="${i}"
           style="background-color: ${tileColor}; ${superSharpText} color: #ffffff; border: 1.5px solid #ffffff; box-shadow: inset 0 0 4px rgba(0,0,0,0.2), 0 1px 3px rgba(0,0,0,0.15); border-radius: 6px; aspect-ratio: 1 / 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; padding: 2px; box-sizing: border-box; min-width: 0;">
        <div class="slot-num" style="font-size: 0.95rem; font-weight: 800; line-height: 1.1; margin-bottom: 1px;">${i}</div>
        <div class="slot-nick" style="font-size: 0.62rem; font-weight: bold; background: rgba(0,0,0,0.4); padding: 1px 2px; border-radius: 3px; width: 92%; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.1; box-sizing: border-box;">
          ${esc(displayName)}
        </div>
      </div>
    `;
  }
  colorChartHtml += `</div></div>`;
  return colorChartHtml;
}

      ? `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
           <p style="font-size:12px;font-weight:700;color:var(--text2);margin:0 0 8px">💍 교배 신청 가능한 상대 (호감도 ${BREED_AFFECTION} 필요)</p>
           ${S.petEntries.filter(p=>p.nick!==myNick&&(p.level||1)>=BREED_LV).length===0
             ? `<p style="font-size:12px;color:var(--text3);text-align:center;padding:8px">아직 교배 가능한 상대가 없어요 (Lv.${BREED_LV}+ 필요)</p>`
             : S.petEntries.filter(p=>p.nick!==myNick&&(p.level||1)>=BREED_LV).map(p=>{
                 const alreadyReq=S.breedRequests.some(r=>r.from===myNick&&r.to===p.nick&&r.status==='pending');
                 const myAff=myPet.affectionMap?.[p.nick]||0;
                 const canBreedNow=myAff>=BREED_AFFECTION;
                 return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
                   <div style="flex:1;min-width:0">
                     <span style="font-size:22px">${getVisualEmoji(p)}</span>
                     <span style="font-size:13px;font-weight:600;margin-left:4px">${esc(p.nick)}</span>
                     <span style="font-size:11px;color:var(--text3);margin-left:4px">${esc(p.petName)} Lv.${p.level||1}</span>
                     <div style="margin-top:3px">
                       <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--rose2)">
                         <span>💕 호감도 ${myAff}/${BREED_AFFECTION}</span>
                       </div>
                       <div class="affection-bar"><div class="affection-fill" style="width:${Math.min(100,(myAff/BREED_AFFECTION)*100)}%"></div></div>
                     </div>
                   </div>
                   ${alreadyReq
                     ? `<span style="font-size:11px;color:var(--rose);background:var(--rose-lt);padding:4px 10px;border-radius:99px;flex-shrink:0">신청중 ⏳</span>`
                     : canBreedNow
                       ? `<button class="btn btn-primary" style="padding:6px 14px;font-size:12px;flex-shrink:0" data-a="lm_breedReq" data-nick="${esc(p.nick)}">💍 신청</button>`
                       : `<span style="font-size:10px;color:var(--text3);text-align:center;flex-shrink:0">🔒 호감도 부족</span>`
                   }
                 </div>`;
               }).join('')
           }
         </div>`
      : ''
    }

    ${incomingReqs.length>0?`
    <div class="lm-breed-incoming">
      <p style="font-size:12px;font-weight:700;color:var(--rose2);margin:0 0 8px">💍 교배 신청 도착! (${incomingReqs.length}건)</p>
      ${incomingReqs.map(r=>`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div><span style="font-size:18px">${esc(r.fromEmoji||'🐾')}</span> <span style="font-size:13px;font-weight:600">${esc(r.from)}</span>님의 <span style="font-size:12px;color:var(--text3)">${esc(r.fromPetName||'')}</span></div>
        <button class="btn btn-primary" style="padding:5px 12px;font-size:12px" data-a="lm_breedAccept" data-id="${r.id}" data-from="${esc(r.from)}">수락 💍</button>
      </div>`).join('')}
    </div>`:''}
    ${outgoingReqs.length>0?`<div style="font-size:11px;color:var(--text3);margin-top:8px;padding:6px 10px;background:rgba(232,83,122,.05);border-radius:8px">⏳ 교배 신청 대기중: ${outgoingReqs.map(r=>esc(r.to)).join(', ')}</div>`:''}
  </div>`;

  /* ─ 마켓 ─ */
  /* ★ 이름 변경권: nameChangeCount 기반 무료/유료 분기 */
  const nameChangeCount=myPet.nameChangeCount||0;
  const renameCostLabel=nameChangeCount===0?'무료 (첫 1회)':'10,000P';
  const marketHTML=`
  <div class="card" style="margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <p style="font-size:13.5px;font-weight:700;color:var(--rose2);margin:0">🏪 러브몬 마켓</p>
      <span class="gold-badge">💰 ${myPoints.toLocaleString()}P 보유</span>
    </div>
    <p style="font-size:11.5px;color:var(--text3);margin:0 0 10px;line-height:1.6">내 펫에게 먹이거나, 다른 사람 펫에게 선물로 보낼 수 있어요!</p>
    <div class="lm-market-grid">
      ${MARKET_ITEMS.map(item=>`
        <div class="lm-market-item" data-a="lm_buyFeed" data-item="${item.id}">
          <div style="font-size:32px;margin-bottom:5px">${item.emoji}</div>
          <div style="font-size:12.5px;font-weight:700;margin-bottom:2px">${esc(item.name)}</div>
          <div style="font-size:10.5px;color:var(--text3);margin-bottom:6px;line-height:1.4">${esc(item.desc)}</div>
          <div style="font-size:13px;font-weight:700;color:var(--gold)">${item.cost.toLocaleString()}P</div>
        </div>
      `).join('')}
    </div>
    <button class="action-btn premium" data-a="lm_buyRenameTicket">🎟️ 펫 이름 변경 (${renameCostLabel}) ${nameChangeCount>0?`<span style="font-size:10px;opacity:.8">${nameChangeCount}회 사용</span>`:''}</button>
  </div>`;

  /* ─ 다른 유저 펫 ─ */
  /* ★ 호감도 표시 + 장미꽃 선물 버튼 추가 */
  const otherPets=S.petEntries.filter(p=>p.nick!==myNick);
  let otherPetsHTML='';
  if(otherPets.length>0){
    otherPetsHTML=`<div class="card" style="margin-bottom:12px">
      <p style="font-size:13.5px;font-weight:700;color:var(--rose2);margin:0 0 4px">🌍 다른 유저의 러브몬</p>
      <p style="font-size:11.5px;color:var(--text3);margin:0 0 10px">사료 +10 · 장미꽃 +20 호감도로 교배를 준비해요! 💕</p>
      ${otherPets.map(p=>{
        const canBreed=(myPet.level||1)>=BREED_LV&&(p.level||1)>=BREED_LV;
        const myAff=myPet.affectionMap?.[p.nick]||0;
        const canBreedFull=canBreed&&myAff>=BREED_AFFECTION;
        const alreadyReq=S.breedRequests.some(r=>r.from===myNick&&r.to===p.nick&&r.status==='pending');
        const pLvPct=Math.min(100,Math.round(((p.xp||0)/XP_PER_LV)*100));
        return`<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
          <div style="font-size:34px;flex-shrink:0">${getVisualEmoji(p)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:14px">${esc(p.nick)} <span style="font-size:11px;color:var(--text3);font-weight:400">${esc(p.petName)} · Lv.${p.level||1} · ${esc(p.mbti||'')}</span></div>
            <div style="height:4px;background:rgba(155,89,182,.1);border-radius:99px;margin:5px 0 2px">
              <div style="height:100%;width:${pLvPct}%;background:linear-gradient(90deg,var(--rose),var(--lm-purple));border-radius:99px"></div>
            </div>
            <div style="font-size:10.5px;color:var(--text3);margin-bottom:4px">XP ${p.xp||0}/${XP_PER_LV} · 💰${p.points||0}P</div>
            <div style="font-size:10.5px;color:var(--rose2)">💕 호감도 ${myAff}/${BREED_AFFECTION}</div>
            <div class="affection-bar"><div class="affection-fill" style="width:${Math.min(100,(myAff/BREED_AFFECTION)*100)}%"></div></div>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
            <button class="btn btn-plum" style="padding:5px 10px;font-size:11px;min-width:56px" data-a="lm_feedOther" data-nick="${esc(p.nick)}">🍖+10</button>
            <button class="btn btn-primary" style="padding:5px 10px;font-size:11px;min-width:56px" data-a="lm_giveRoseToPet" data-nick="${esc(p.nick)}">🌹+20</button>
            ${(()=>{
              const pvpCd=S.myPet?.pvpCooldown||0;
              const pvpReady=Date.now()>pvpCd+PVP_COOLDOWN_MS;
              const remH=Math.ceil((pvpCd+PVP_COOLDOWN_MS-Date.now())/3600000);
              return pvpReady
                ?`<button class="btn btn-danger" style="padding:5px 10px;font-size:11px;min-width:56px" data-a="lm_pvp" data-nick="${esc(p.nick)}">⚔️PvP</button>`
                :`<span style="font-size:9px;color:#C62828;text-align:center">⚔️${remH}h후</span>`;
            })()}
            ${canBreedFull&&!alreadyReq?`<button class="btn" style="padding:5px 10px;font-size:11px;min-width:56px;border-color:var(--rose2);color:var(--rose2)" data-a="lm_breedReq" data-nick="${esc(p.nick)}">💍 교배</button>`:''}
            ${alreadyReq?`<span style="font-size:10px;color:var(--rose);text-align:center">신청중</span>`:''}
            <button class="btn" style="padding:5px 10px;font-size:11px;min-width:56px;border-color:var(--gold);color:var(--gold)" data-a="lm_sendPoints" data-nick="${esc(p.nick)}">💰 송금</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  /* ─ 족보 ─ */
  let familyHTML='';
  if(S.familyTree.length>0){
    familyHTML=`<div class="card" style="margin-bottom:12px">
      <p style="font-size:13.5px;font-weight:700;color:var(--rose2);margin:0 0 10px">🌳 우리 방 족보 대시보드</p>
      ${S.familyTree.map(f=>`<div class="lm-family-row">
        <span>${esc(f.parent1Emoji)} ${esc(f.parent1Nick)}</span>
        <span style="color:var(--rose);font-size:14px">💕</span>
        <span>${esc(f.parent2Emoji)} ${esc(f.parent2Nick)}</span>
        <span style="color:var(--text3)">→</span>
        <span style="background:rgba(232,83,122,.08);border:1px solid var(--border2);border-radius:8px;padding:2px 8px;font-size:12px">${esc(f.childEmoji)} ${esc(f.childName)}</span>
      </div>`).join('')}
    </div>`;
  }

  /* ★ 환생 버튼 */
  let rebirthHTML='';
  if((myPet.level||1)>=MAX_LV){
    rebirthHTML=`<div class="card" style="margin-bottom:12px;text-align:center;padding:1.5rem">
      <div style="font-size:44px;margin-bottom:6px">🔥</div>
      <p style="font-size:14px;font-weight:700;color:var(--text1);margin-bottom:4px">Lv.${MAX_LV} 최고 레벨 달성!</p>
      <p style="font-size:12px;color:var(--text3);margin-bottom:14px;line-height:1.7">환생하면 레벨 1로 돌아가지만<br>주사위 굴림 시 모든 스탯 +${REBIRTH_DICE_BONUS} 영구 보너스!</p>
      <button class="rebirth-btn" data-a="lm_rebirth">🔥 환생하기 (${((myPet.rebirthCount||0)+1)}회차)</button>
    </div>`;
  }

  /* ★ 장착 아이템 섹션 */
  const eq=myPet.equipment||{};
  const inv=myPet.petInventory||[];
  const equipmentHTML=`
  <div class="card" style="margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <p style="font-size:13.5px;font-weight:700;color:var(--rose2);margin:0">⚔️ 장착 아이템</p>
      <div style="display:flex;gap:6px">
        <button class="btn ${S.equipTab==='equip'?'btn-sel':''}" style="padding:5px 10px;font-size:11px" data-a="setEquipTab" data-v="equip">장착 슬롯</button>
        <button class="btn ${S.equipTab==='shop'?'btn-sel':''}" style="padding:5px 10px;font-size:11px" data-a="setEquipTab" data-v="shop">상점</button>
        <button class="btn ${S.equipTab==='inv'?'btn-sel':''}" style="padding:5px 10px;font-size:11px" data-a="setEquipTab" data-v="inv">인벤(${inv.length})</button>
      </div>
    </div>
    ${S.equipTab==='equip'?`
    <!-- 장착 슬롯 시각화 (개선) -->
    <div style="background:linear-gradient(135deg,rgba(253,238,244,.5),rgba(240,230,255,.5));border-radius:12px;padding:10px;margin-bottom:10px">
      <div class="equip-grid">
        ${Object.entries(EQUIP_SLOTS).map(([slot,info])=>{
          const equipped=eq[slot];
          const gradeGlow=equipped?`glow-${equipped.grade||'normal'}`:'' ;
          return`<div class="equip-slot ${equipped?'filled':''} ${gradeGlow}"
            data-a="${equipped?'lm_unequip':''}" data-slot="${slot}"
            title="${equipped?`클릭하면 ${equipped.name} 해제`:info.label+' 비어있음'}">
            <div class="slot-emoji">${equipped?equipped.emoji:info.icon}</div>
            <div class="slot-name">${info.label}</div>
            ${equipped?`
              <div class="slot-item grade-${equipped.grade}">${esc(equipped.name)}</div>
              <div style="font-size:9px;color:var(--text3)">${Object.entries(equipped.stats||{}).map(([k,v])=>k.toUpperCase()+'+'+v).join(' ')}</div>
              <div style="font-size:9px;color:#C62828;margin-top:2px">클릭 → 해제</div>
            `:`<div style="font-size:9px;color:var(--text3)">비어있음</div>`}
          </div>`;
        }).join('')}
      </div>
    </div>
    <!-- 합산 스탯 표시 -->
    ${(()=>{
      const es=getEquippedStats(myPet);
      const bs=getScaledStats(myPet);
      const bonuses=[];
      if(es.atk>bs.atk)bonuses.push(`ATK +${es.atk-bs.atk}`);
      if(es.def>bs.def)bonuses.push(`DEF +${es.def-bs.def}`);
      if(es.maxHp>bs.maxHp)bonuses.push(`HP +${es.maxHp-bs.maxHp}`);
      if(es.maxMp>bs.maxMp)bonuses.push(`MP +${es.maxMp-bs.maxMp}`);
      if(es.eva>bs.eva)bonuses.push(`EVA +${es.eva-bs.eva}%`);
      return bonuses.length?`<div style="background:rgba(46,196,182,.08);border:1px solid rgba(46,196,182,.25);border-radius:8px;padding:6px 10px;font-size:11px;color:var(--mint);font-weight:600;text-align:center">⚔️ 장착 보너스: ${bonuses.join(' · ')}</div>`:'<p style="font-size:11px;color:var(--text3);text-align:center">장착 아이템 없음</p>';
    })()}`
    :S.equipTab==='shop'?`
    <!-- 장비 상점 -->
    <div style="display:flex;flex-direction:column;gap:6px">
      ${EQUIP_SHOP.map(item=>`
        <div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border:1.5px solid var(--border);border-radius:10px;background:white">
          <span style="font-size:26px;flex-shrink:0">${item.emoji}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:12.5px;font-weight:700" class="grade-${item.grade}">${esc(item.name)}</div>
            <div style="font-size:10.5px;color:var(--text3)">${item.slot} · ${Object.entries(item.stats).map(([k,v])=>k.toUpperCase()+'+'+v).join(' ')}</div>
          </div>
          <button class="btn btn-gold" style="padding:5px 10px;font-size:11px;flex-shrink:0" data-a="lm_buyEquip" data-id="${item.id}">${item.cost.toLocaleString()}P</button>
        </div>
      `).join('')}
    </div>`:`
    <!-- 인벤토리 -->
    ${inv.length===0?`<p style="text-align:center;color:var(--text3);font-size:13px;padding:1rem">인벤토리가 비어있어요.<br>상점에서 아이템을 구매하세요!</p>`:''}
    <div style="display:flex;flex-direction:column;gap:6px">
      ${inv.map(item=>`
        <div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border:1.5px solid var(--border);border-radius:10px;background:white">
          <span style="font-size:26px">${item.emoji}</span>
          <div style="flex:1">
            <div style="font-size:12.5px;font-weight:700" class="grade-${item.grade}">${esc(item.name)}</div>
            <div style="font-size:10.5px;color:var(--text3)">${item.slot}</div>
          </div>
          <button class="btn btn-primary" style="padding:5px 10px;font-size:11px" data-a="lm_equip" data-slot="${item.slot}" data-id="${item.id}">장착</button>
        </div>
      `).join('')}
    </div>`}
  </div>`;

  return rebirthHTML+myPetHTML+equipmentHTML+marketHTML+otherPetsHTML+familyHTML;
}

/* ═══════════════════════════════════════
   🥚 2세 육아 탭 (신규)
═══════════════════════════════════════ */
function rBabyTab(){
  const myNick=S.myEntry?.nick;
  if(!myNick||!S.myPet){
    return`<div class="card" style="text-align:center;padding:2rem">
      <div style="font-size:48px;margin-bottom:12px" class="float">🥚</div>
      <p style="font-size:13px;color:var(--text2)">MBTI 검사 완료 후 이용 가능합니다.</p>
    </div>`;
  }

  /* ★ 부화 완료된 공동 육아 펫이 있으면 먼저 표시 */
  const hatchedBaby=S.babyPets.find(b=>b.hatched&&(b.parent1Nick===myNick||b.parent2Nick===myNick));
  if(hatchedBaby){
    return rHatchedBabyUI(hatchedBaby, myNick);
  }

  /* 아직 알 단계 */
  const baby=S.babyPets.find(b=>!b.hatched&&(b.parent1Nick===myNick||b.parent2Nick===myNick));
  if(!baby){
    return`<div class="card" style="text-align:center;padding:2rem">
      <div style="font-size:48px;margin-bottom:12px">🥚</div>
      <p style="font-size:13px;color:var(--text2)">현재 육아 중인 알이 없어요.<br>교배를 통해 2세 알을 만들어보세요!</p>
    </div>`;
  }

  /* 알 단계 - 부화 대기 */
  const effectiveHatchMs=(baby.hatchTime||0)-(baby.hatchReduction||0)*60000;
  const now=Date.now();
  const canHatch=now>=effectiveHatchMs;
  const remainingMs=Math.max(0,effectiveHatchMs-now);
  const partnerNick=baby.parent1Nick===myNick?baby.parent2Nick:baby.parent1Nick;
  const myPoints=S.myPet.points||0;

  return`
  <div class="card card-rose" style="text-align:center;padding:1.5rem;margin-bottom:12px">
    <div style="font-size:72px;margin-bottom:8px" class="${canHatch?'pulse':'float'}">${baby.babyEmoji||'🥚'}</div>
    <div style="font-size:19px;font-weight:700;color:var(--rose2);margin-bottom:4px">${esc(baby.babyName||'아기몬')} 의 알</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:14px">
      ${esc(baby.parent1Nick)} 💕 ${esc(baby.parent2Nick)} 의 2세 알
    </div>
    ${canHatch
      ? `<div style="background:linear-gradient(135deg,rgba(232,83,122,.1),rgba(155,89,182,.1));border:1px solid var(--border2);border-radius:12px;padding:12px;margin-bottom:14px">
           <div style="font-size:14px;font-weight:700;color:var(--rose2);margin-bottom:4px">🎉 부화 준비 완료!</div>
           <p style="font-size:13px;color:var(--text2);margin:0">부화 버튼을 눌러 2세 러브몬을 탄생시키세요!</p>
         </div>
         <button class="btn btn-primary" style="width:100%;padding:14px;font-size:15px;margin-top:4px" data-a="lm_hatchBaby" data-id="${baby.id}">🐣 지금 부화시키기!</button>`
      : `<div style="background:rgba(46,196,182,.08);border:1px solid rgba(46,196,182,.25);border-radius:12px;padding:12px;margin-bottom:14px">
           <div style="font-size:13px;font-weight:700;color:var(--mint);margin-bottom:6px">⏳ 부화까지 남은 시간</div>
           <div style="font-size:28px;font-weight:700;color:var(--text1)">${msToHM(remainingMs)}</div>
           <div style="font-size:11px;color:var(--text3);margin-top:4px">케어로 시간을 단축할 수 있어요!</div>
         </div>`
    }
    <div style="font-size:12px;color:var(--text3);padding:8px 12px;background:rgba(155,89,182,.06);border-radius:8px;border:1px solid rgba(155,89,182,.15)">
      🤝 파트너: <b>${esc(partnerNick)}</b> 와 공동 육아 중 · 보유 포인트: <b>${myPoints.toLocaleString()}P</b>
    </div>
  </div>

  ${!canHatch?`
  <div class="card" style="margin-bottom:12px">
    <p style="font-size:13.5px;font-weight:700;color:var(--rose2);margin:0 0 6px">💝 2세 전용 케어</p>
    <p style="font-size:11.5px;color:var(--text3);margin:0 0 12px;line-height:1.6">케어를 통해 부화 시간을 단축하세요!<br>양쪽 부모 모두 케어에 참여할 수 있어요 🌸</p>

    <div style="font-size:20px;font-weight:700;color:var(--rose2);margin-bottom:6px">${esc(baby.babyName||'아기몬')}</div>

function rHouseTab(){
  const myNick=S.myEntry?.nick;
  const isVisiting=!!S.visitingHouse;
  const targetNick=isVisiting?S.visitingHouse:myNick;
  const houseData=isVisiting?S.houseEntries.find(h=>h.nick===targetNick):S.myHouse;
  const tier=houseData?HOUSE_TIERS.find(t=>t.id===houseData.tier)||HOUSE_TIERS[0]:null;

  /* 처음 방문 or 내 집 없으면 생성 */
  if(!isVisiting&&!S.myHouse){
    return`<div class="card" style="text-align:center;padding:2rem">
      <div style="font-size:64px;margin-bottom:12px" class="float">🏚️</div>
      <p style="font-size:16px;font-weight:700;margin-bottom:8px">아직 집이 없어요!</p>
      <p style="font-size:12.5px;color:var(--text3);margin-bottom:16px;line-height:1.7">내 러브몬만의 집을 만들어봐요!<br>판잣집은 무료예요 🎁</p>
      <button class="btn btn-primary" style="padding:12px 28px;font-size:14px" data-a="lm_initHouse">🏚️ 집 만들기 (무료)</button>
    </div>`;
  }
  if(isVisiting&&!houseData){
    return`<div class="card" style="text-align:center;padding:2rem">
      <div style="font-size:48px;margin-bottom:8px">🏚️</div>
      <p style="font-size:13px;color:var(--text2)">${targetNick}님은 아직 집이 없어요.</p>
      <button class="btn btn-mint" style="margin-top:12px;padding:8px 18px" data-a="lm_backFromHouse">← 돌아가기</button>
    </div>`;
  }

  const guestbook=houseData?.guestbook||[];
  const furniture=houseData?.furniture||[];
  const inventory=houseData?.inventory||[];
  const myPoints=S.myPet?.points||0;

  return`
  ${isVisiting?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
    <button class="btn" style="padding:6px 12px;font-size:12px" data-a="lm_backFromHouse">← 돌아가기</button>
    <span style="font-size:13px;font-weight:600">${esc(targetNick)}님의 집 방문 중</span>
    <span style="font-size:11px;color:var(--text3)">👣 ${houseData?.visitors||0}명 방문</span>
  </div>`:''}

  <!-- ★ Three.js 3D 집 -->
  <div class="card" style="padding:0;overflow:hidden;margin-bottom:10px;border-radius:16px">
    <div class="house-canvas-wrap">
      <div id="house3d-canvas" style="width:100%;height:360px"></div>
      <div class="house-ctrl-hint">← 드래그로 회전 →</div>
    </div>
    <div style="padding:10px 14px;background:white">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <span style="font-size:22px">${tier?.emoji||'🏚️'}</span>
          <span style="font-size:14px;font-weight:700;margin-left:6px">${tier?.name||'판잣집'}</span>
          <span style="font-size:11px;color:var(--text3);margin-left:6px">가구 ${furniture.length}/${tier?.maxSlots||3}개</span>
        </div>
        <div style="font-size:11px;color:var(--text3)">
          🎨 ${WALLPAPERS[houseData?.wallpaper||'rose']?.name||'기본'} · ${FLOORS[houseData?.floor||'wood']?.name||'원목'}
        </div>
      </div>
    </div>
  </div>

  ${!isVisiting?`
  <!-- 내 집: 꾸미기 컨트롤 -->
  <div class="card" style="margin-bottom:10px">
    <p style="font-size:13px;font-weight:700;color:var(--rose2);margin:0 0 10px">🎨 집 꾸미기</p>
    <!-- 집 업그레이드 -->
    <p style="font-size:11.5px;color:var(--text2);margin:0 0 6px;font-weight:600">집 등급 업그레이드</p>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      ${HOUSE_TIERS.map(t=>{
        const isCurrent=t.id===houseData?.tier;
        const canUpgrade=(S.myPet?.level||1)>=t.reqLv&&(t.cost===0||(myPoints>=t.cost));
        return`<button class="house-tier-card ${isCurrent?'current':''}" style="min-width:80px" data-a="lm_upgradeHouse" data-tier="${t.id}" ${isCurrent?'disabled':''}>
          <div style="font-size:20px">${t.emoji}</div>
          <div style="font-size:11px;font-weight:600">${t.name}</div>
          <div style="font-size:10px;color:${isCurrent?'var(--rose2)':canUpgrade?'var(--mint)':'#C62828'}">${isCurrent?'현재':`${t.cost===0?'무료':`${t.cost.toLocaleString()}P`} · Lv.${t.reqLv}+`}</div>
        </button>`;
      }).join('')}
    </div>
    <!-- 벽지/바닥 -->
    <p style="font-size:11.5px;color:var(--text2);margin:0 0 6px;font-weight:600">🎨 벽지 / 바닥재</p>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">
      ${Object.entries(WALLPAPERS).map(([k,v])=>`<button class="btn ${houseData?.wallpaper===k?'btn-sel':''}" style="padding:5px 10px;font-size:11px" data-a="lm_setWallpaper" data-v="${k}">${v.name} ${v.cost>0?`(${v.cost}P)`:''}</button>`).join('')}
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      ${Object.entries(FLOORS).map(([k,v])=>`<button class="btn ${houseData?.floor===k?'btn-sel':''}" style="padding:5px 10px;font-size:11px" data-a="lm_setFloor" data-v="${k}">${v.name} (${v.cost}P)</button>`).join('')}
    </div>
    <!-- 가구 배치 -->
    ${furniture.length>0?`<p style="font-size:11.5px;color:var(--text2);margin:0 0 6px;font-weight:600">🛋️ 배치된 가구 (클릭 시 제거)</p>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      ${furniture.map(f=>`<button class="btn btn-danger" style="padding:5px 10px;font-size:12px" data-a="lm_removeFurniture" data-id="${f.id}">${f.emoji} ${esc(f.name)} ×</button>`).join('')}
    </div>`:''}
    <!-- 인벤토리 배치 -->
    ${inventory.length>0?`<p style="font-size:11.5px;color:var(--text2);margin:0 0 6px;font-weight:600">📦 보관 중인 가구 (클릭 시 배치)</p>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      ${inventory.map(f=>`<button class="btn btn-mint" style="padding:5px 10px;font-size:12px" data-a="lm_placeFurniture" data-id="${f.id}">${f.emoji} ${esc(f.name)}</button>`).join('')}
    </div>`:''}
  </div>

  <!-- 가구 상점 -->

function rDungeonTab(){
  const myPet=S.myPet;
  if(!myPet){
    return`<div class="card" style="text-align:center;padding:2rem">
      <div style="font-size:48px;margin-bottom:12px">⚔️</div>
      <p style="font-size:13px;color:var(--text2)">MBTI 검사 완료 후 이용 가능합니다.</p>
    </div>`;
  }
  if(S.dungeonState?.active)return rBattleUI();

  /* ★ 장착 아이템 포함 스탯 */
  const scaled=getEquippedStats(myPet);
  const hasDice=!!myPet.diceStats;
  const myNick=S.myEntry?.nick;
  const hatchedBaby=S.babyPets.find(b=>b.hatched&&(b.parent1Nick===myNick||b.parent2Nick===myNick));
  const inv=myPet.inventory||{};
  const curHp=myPet.currentHp??scaled.maxHp;
  const curMp=myPet.currentMp??scaled.maxMp;
  const curSp=myPet.currentSp??100;
  const hpPct=Math.round((curHp/scaled.maxHp)*100);
  const mpPct=Math.round((curMp/scaled.maxMp)*100);
  const spPct=Math.round((curSp/100)*100);
  /* ★ 쿨타임 계산 */
  const lastDungeon=myPet.lastDungeonAt||0;
  const cooldownEnd=lastDungeon+DUNGEON_COOLDOWN_MS;
  const isCooldown=Date.now()<cooldownEnd;
  const coolRemain=Math.max(0,cooldownEnd-Date.now());

  /* ★ 쿨타임 / 층별 진행도 계산 */
  const cooldownStart=myPet.dungeonCooldownStart||0;
  const cooldownEnd=cooldownStart+DUNGEON_COOLDOWN_MS;
  const isCooldown=Date.now()<cooldownEnd;
  const coolRemain=Math.max(0,cooldownEnd-Date.now());

    <div>
      <div style="font-size:12px;font-weight:700;color:#E64A19;margin-bottom:2px">5층 전부 클리어! 쿨타임 중</div>
      <div class="cooltime-timer">${Math.floor(coolRemain/60000)}분 ${Math.floor((coolRemain%60000)/1000)}초</div>
    </div>
  </div>`:`<div class="card card-mint" style="margin-bottom:12px;padding:10px 14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:12px;font-weight:700;color:var(--mint)">⚔️ 이번 라운드 클리어 현황 (${clearedCount}/5)</span>
      ${clearedCount>0?`<button class="btn" style="padding:3px 8px;font-size:10.5px;color:#C62828;border-color:#FFCDD2" data-a="lm_resetDungeonKills">초기화</button>`:''}
    </div>
    <div style="display:flex;gap:6px">
      ${DUNGEON_ALL_FLOORS.map(f=>`<div style="flex:1;text-align:center;padding:6px 4px;border-radius:8px;background:${kills[f]?'rgba(46,196,182,.15)':'rgba(0,0,0,.04)'};border:1px solid ${kills[f]?'rgba(46,196,182,.4)':'var(--border)'}">
        <div style="font-size:14px">${kills[f]?'✅':'⚔️'}</div>
        <div style="font-size:10px;color:${kills[f]?'var(--mint)':'var(--text3)'};">${f}층</div>
      </div>`).join('')}
    </div>
    ${clearedCount===5?`<p style="font-size:11px;color:var(--rose2);font-weight:700;margin:6px 0 0;text-align:center">🔥 마지막 층만 남았어요! 클리어하면 5분 쿨타임 시작!</p>`:''}
  </div>`}
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <div style="font-size:44px">${myPet.petEmoji||'🐾'}</div>
      <div style="flex:1">
        <div style="font-weight:700;font-size:15px">${esc(myPet.petName)} <span style="font-size:11px;color:var(--text3)">Lv.${myPet.level||1}</span></div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:6px">
          ATK ${scaled.atk} · DEF ${scaled.def} · EVA ${scaled.eva}%
        </div>
        <div style="display:flex;flex-direction:column;gap:5px">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:10.5px;color:#E53935;width:22px">HP</span>
            <div class="hp-bar" style="flex:1"><div class="hp-fill" style="width:${hpPct}%"></div></div>
            <span style="font-size:10.5px;color:var(--text2);width:52px">${curHp}/${scaled.maxHp}</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:10.5px;color:#1E88E5;width:22px">MP</span>
            <div class="mp-bar" style="flex:1"><div class="mp-fill" style="width:${mpPct}%"></div></div>
            <span style="font-size:10.5px;color:var(--text2);width:52px">${curMp}/${scaled.maxMp}</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:10.5px;color:#8E24AA;width:22px">SP</span>
            <div class="sp-bar" style="flex:1"><div class="sp-fill" style="width:${spPct}%"></div></div>
            <span style="font-size:10.5px;color:var(--text2);width:52px">${curSp}/100</span>
          </div>
        </div>
      </div>
    </div>

    ${hatchedBaby?`<div style="display:flex;align-items:center;gap:8px;padding:8px;background:rgba(155,89,182,.07);border-radius:8px;border:1px solid rgba(155,89,182,.2);margin-bottom:10px">
      <span style="font-size:24px">${hatchedBaby.babyEmoji||'🐣'}</span>
      <div><div style="font-size:12px;font-weight:700">${esc(hatchedBaby.babyName||'아기몬')} Lv.${hatchedBaby.babyLevel||1}</div>
      <div style="font-size:10.5px;color:var(--text3)">🍼 2세 지원 동반 가능 (전투 중 쿨다운 3턴)</div></div>
    </div>`:''}

    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${hasDice
        ?`<button class="btn" style="padding:6px 12px;font-size:11.5px;border-color:var(--plum);color:var(--plum)" data-a="lm_rerollDice">🎲 재굴림 (500P)</button>`
        :''
      }
      <button class="btn btn-mint" style="padding:6px 12px;font-size:11.5px" data-a="lm_restoreHpMp">💊 완전회복 (500P)</button>
    </div>
  </div>

  <!-- 주사위 미굴림 안내 -->
  ${!hasDice?`
  <div class="card card-gold" style="margin-bottom:12px;text-align:center;padding:1.5rem">
    <div style="font-size:48px;margin-bottom:10px" class="float">🎲</div>
    <p style="font-size:15px;font-weight:700;color:var(--text1);margin-bottom:6px">기본 스탯을 설정해주세요!</p>
    <p style="font-size:12px;color:var(--text3);margin-bottom:14px;line-height:1.7">주사위를 굴려 HP·MP·ATK·DEF·EVA 기본값을 결정합니다<br>첫 번째 굴림은 무료예요! 🎁<br>재굴림은 500P마다 가능합니다</p>
    <button class="btn btn-gold" style="padding:12px 32px;font-size:14px" data-a="lm_rerollDice">🎲 주사위 굴리기 (무료)</button>
  </div>`:''}

  <!-- 기본 스탯 박스 -->
  ${hasDice?`
  <div class="card" style="margin-bottom:12px">
    <p style="font-size:12.5px;font-weight:700;color:var(--text2);margin:0 0 10px">📊 기본 스탯 (Lv.${myPet.level||1} 기준)</p>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px">
      <div class="dice-stat-box"><div class="val" style="color:#E53935">${scaled.maxHp}</div><div class="lbl">HP</div></div>
      <div class="dice-stat-box"><div class="val" style="color:#1E88E5">${scaled.maxMp}</div><div class="lbl">MP</div></div>
      <div class="dice-stat-box"><div class="val" style="color:var(--rose2)">${scaled.atk}</div><div class="lbl">ATK</div></div>
      <div class="dice-stat-box"><div class="val" style="color:var(--plum)">${scaled.def}</div><div class="lbl">DEF</div></div>
      <div class="dice-stat-box"><div class="val" style="color:var(--mint)">${scaled.eva}%</div><div class="lbl">EVA</div></div>
    </div>
    <p style="font-size:10.5px;color:var(--text3);margin:8px 0 0">🎲 기본값: HP ${myPet.diceStats.hp} · MP ${myPet.diceStats.mp} · ATK ${myPet.diceStats.atk} · DEF ${myPet.diceStats.def} · EVA ${myPet.diceStats.eva}%<br>📈 레벨당 HP+12 · MP+6 · ATK+3 · DEF+2 · EVA+0.5%</p>
  </div>`:''}

  <!-- 스킬 목록 -->
  ${hasDice?`
  <div class="card" style="margin-bottom:12px">
    <p style="font-size:12.5px;font-weight:700;color:var(--text2);margin:0 0 10px">⚔️ 공격 스킬 / 🛡️ 방어 스킬</p>
    <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:8px">
      ${ATK_SKILLS.map(s=>`<div style="display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:18px">${s.emoji}</span>
        <span style="font-weight:600;flex:1">${s.name}</span>
        <span style="color:${(s.mp||0)>0?'#1E88E5':'var(--text3)'};font-size:11px">${(s.mp||0)>0?`MP -${s.mp}`:'무료'}</span>
        <span style="font-size:10.5px;color:var(--text3)">${s.desc.split('·')[0]}</span>
      </div>`).join('')}
    </div>
    <div style="display:flex;flex-direction:column;gap:5px">
      ${DEF_SKILLS.map(s=>`<div style="display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:18px">${s.emoji}</span>
        <span style="font-weight:600;flex:1">${s.name}</span>
        <span style="color:#1E88E5;font-size:11px">MP -${s.mp||0}</span>
        <span style="font-size:10.5px;color:var(--text3)">${s.desc.split('·')[0]}</span>
      </div>`).join('')}
    </div>
  </div>`:''}

  <!-- 보유 물약 -->
  ${hasDice&&Object.values(inv).some(v=>v>0)?`
  <div class="card" style="margin-bottom:12px">
    <p style="font-size:12.5px;font-weight:700;color:var(--text2);margin:0 0 8px">🎒 보유 물약</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${POTION_ITEMS.filter(p=>(inv[p.id]||0)>0).map(p=>`
        <div style="display:flex;align-items:center;gap:5px;background:var(--rose-lt);border:1px solid var(--border2);border-radius:8px;padding:4px 10px;font-size:12px">
          ${p.emoji} ${p.name} <b style="color:var(--rose2)">×${inv[p.id]}</b>
        </div>
      `).join('')}
    </div>
  </div>`:''}

  <!-- 던전 층 선택 -->
  ${hasDice?`
  <div class="card" style="margin-bottom:12px">
    <p style="font-size:13.5px;font-weight:700;color:var(--rose2);margin:0 0 4px">⚔️ 던전 입장</p>
    <p style="font-size:11.5px;color:var(--text3);margin:0 0 12px;line-height:1.6">층이 높을수록 강한 몹 · 더 많은 보상 · 최소 레벨 조건 있음<br>1~10층 전부 클리어 후 5분 쿨타임!</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:520px;overflow-y:auto;padding-right:2px">
      ${DUNGEON_FLOORS.map((fl,fi)=>{
        const locked=(myPet.level||1)<fl.reqLv;
        const cleared=kills[fi+1];
        return`<div class="dungeon-floor-card ${locked?'locked':''}" style="${cleared?'border-color:var(--mint);background:rgba(46,196,182,.06)':''}" data-a="lm_selectFloor" data-floor="${fi}">
          <div style="font-size:28px;margin-bottom:3px">${fl.emoji}</div>
          <div style="font-size:13px;font-weight:700">${fl.floor}층</div>
          <div style="font-size:11.5px;color:var(--text2);margin:2px 0">${esc(fl.name)}</div>
          <div style="font-size:10px;color:${locked?'#C62828':cleared?'var(--mint)':'var(--mint)'};font-weight:600">${locked?`🔒 Lv.${fl.reqLv}`:cleared?'✅ 클리어':'✅ 입장 가능'}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:2px">XP ${fl.mobs.map(m=>m.xp).join('/')} · ${fl.mobs.map(m=>m.pts).join('/')}P</div>
        </div>`;
      }).join('')}
    </div>
  </div>

  <!-- 물약 상점 -->
  <div class="card" style="margin-bottom:12px">
    <p style="font-size:13.5px;font-weight:700;color:var(--rose2);margin:0 0 10px">🏪 물약 상점</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${POTION_ITEMS.map(p=>`
        <div style="border:1.5px solid var(--border);border-radius:10px;background:white;padding:10px;text-align:center;cursor:pointer" data-a="lm_buyPotion" data-id="${p.id}">
          <div style="font-size:28px;margin-bottom:4px">${p.emoji}</div>
          <div style="font-size:12px;font-weight:700;margin-bottom:2px">${esc(p.name)}</div>
          <div style="font-size:10.5px;color:var(--mint);margin-bottom:4px">${p.desc}</div>
          <div style="font-size:12px;font-weight:700;color:var(--gold)">${p.cost.toLocaleString()}P</div>
        </div>
      `).join('')}
    </div>
  </div>`:''}`;
}

/* 던전 배틀 중 UI */

  if(!ds)return'';
  const myPet=S.myPet;
  /* ★ 장착 아이템 포함 스탯 */

  const hpPct=Math.round((ds.playerHp/ds.playerMaxHp)*100);
  const mpPct=Math.round((ds.playerMp/ds.playerMaxMp)*100);
  const spPct=Math.round((ds.playerSp/100)*100);
  const mobHpPct=Math.round((ds.mobCurrentHp/ds.mob.hp)*100);

  const hasPotion=POTION_ITEMS.some(p=>(inv[p.id]||0)>0);

  return`

    <!-- 배틀 헤더 -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">

      <div style="font-weight:700;font-size:15px;color:var(--text1)">${esc(ds.mob.name)}</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:6px">ATK ${ds.mob.atk} · DEF ${ds.mob.def} · EVA ${ds.mob.eva}%</div>

        <span style="font-size:10.5px;color:#E53935;width:22px">HP</span>

      <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px">${esc(myPet.petEmoji)} ${esc(myPet.petName)}</div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <div style="display:flex;align-items:center;gap:5px">
          <span style="font-size:10px;color:#E53935;width:20px">HP</span>

        <button class="btn ${(s.mp||0)<=ds.playerMp?'btn-mint':'btn-danger'}"
          style="padding:7px 6px;font-size:11.5px;flex-direction:column;gap:2px;text-align:center"

/* ═══════════════════════════════════════

function rCatchmindTab(){
  const myNick=S.myEntry?.nick;
  const state=S.catchmindState;
  const isDrawer=state?.status==='drawing'&&state?.drawerNick===myNick;
  const isIdle=!state||state.status==='idle';
  const isReveal=state?.status==='reveal';
  const tool=S.cmTool;

  /* 마스킹: 출제자에게만 단어 보임 */
  const wordMasked=state?.word?
    (isDrawer?state.word:'❓'.repeat(state.word.length)):'';

  const COLORS=['#000000','#E53935','#1E88E5','#FDD835','#43A047','#FB8C00','#8E24AA','#FFFFFF'];
  const WIDTHS=[{v:3,l:'S'},{v:6,l:'M'},{v:10,l:'L'},{v:20,l:'XL'}];

  return`
  <!-- 게임 상태 헤더 -->
  <div class="card card-rose" style="margin-bottom:10px;padding:12px 14px">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:13px;font-weight:700;color:var(--rose2)">🎨 캐치마인드</div>
        <div style="font-size:11.5px;color:var(--text3);margin-top:2px">
          ${state?.status==='drawing'?`✏️ 출제자: <b>${esc(state.drawerNick)}</b>`:
            isReveal?`✅ 정답: <b>${esc(state?.word||'')}</b> (${esc(state?.solvedBy||'시간초과')})`:
            '대기 중...'}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        ${state?.status==='drawing'?`
          <div id="cm_timer" style="font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;min-width:48px;text-align:right">--초</div>
          <div style="font-size:11px;color:var(--text3)">라운드 ${state.round||1}</div>`:''}
        ${isDrawer&&state?.status==='drawing'?`<button class="btn btn-danger" style="padding:5px 10px;font-size:11px" data-a="lm_cm_skip">⏭ 포기</button>`:''}
      </div>
    </div>
    ${isDrawer&&state?.status==='drawing'?`
      <div style="margin-top:10px;padding:10px 14px;background:rgba(255,255,255,.8);border-radius:10px;border:1.5px dashed var(--rose2);text-align:center">
        <p style="font-size:11px;color:var(--text3);margin-bottom:4px">📝 내가 그릴 주제어 (다른 사람에게 보이지 않아요)</p>
        <p style="font-size:22px;font-weight:700;color:var(--rose2);letter-spacing:3px">${esc(state.word)}</p>
      </div>`:''}
    ${!isDrawer&&state?.status==='drawing'?`
      <div style="margin-top:8px;text-align:center;letter-spacing:6px;font-size:18px">
        ${'⬜'.repeat(state?.word?.length||0)}
        <span style="font-size:11px;color:var(--text3);letter-spacing:0;margin-left:8px">${state?.word?.length||0}글자</span>
      </div>`:''}
  </div>

  <!-- ★ 캔버스 -->
  <div style="background:white;border-radius:14px;border:2px solid ${isDrawer?'var(--rose2)':'var(--border)'};overflow:hidden;margin-bottom:${isDrawer?'8px':'10px'};position:relative;touch-action:none">
    <canvas id="cm_canvas" style="display:block;width:100%;height:260px;cursor:${isDrawer?'crosshair':'default'}"></canvas>
    ${!state||isIdle?`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.9);flex-direction:column;gap:8px">
      <div style="font-size:48px">🎨</div>
      <p style="font-size:14px;font-weight:700;color:var(--text1)">캐치마인드</p>
      <p style="font-size:12px;color:var(--text3)">아래 버튼으로 게임을 시작해요!</p>
    </div>`:''}
    ${isReveal?`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(253,238,244,.92);flex-direction:column;gap:8px">
      <div style="font-size:44px">${state?.solvedBy?'🎉':'⏰'}</div>
      <p style="font-size:18px;font-weight:700;color:var(--rose2)">${state?.solvedBy?`${esc(state.solvedBy)}님 정답!`:'시간 초과!'}</p>
      <p style="font-size:16px;font-weight:600">정답: <b>${esc(state?.word||'')}</b></p>
      <p style="font-size:12px;color:var(--text3)">잠시 후 다음 라운드...</p>
    </div>`:''}
  </div>

  <!-- 그리기 도구 (출제자 전용) -->
  ${isDrawer?`
  <div class="card" style="margin-bottom:10px;padding:10px 12px">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <!-- 색상 팔레트 -->
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        ${COLORS.map(c=>`<div style="width:26px;height:26px;border-radius:50%;background:${c};border:2px solid ${tool.color===c&&!tool.eraser?'var(--rose2)':'rgba(0,0,0,.2)'};cursor:pointer;flex-shrink:0;box-shadow:${tool.color===c&&!tool.eraser?'0 0 0 2px white,0 0 0 4px var(--rose2)':''}" data-a="lm_cm_color" data-v="${c}"></div>`).join('')}
        <div style="width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#ff0,#f00,#00f);border:2px solid ${tool.eraser?'var(--rose2)':'rgba(0,0,0,.2)'};cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px" data-a="lm_cm_eraser" title="지우개">🧹</div>
      </div>
      <!-- 굵기 -->
      <div style="display:flex;gap:4px">
        ${WIDTHS.map(w=>`<button class="btn" style="padding:4px 8px;font-size:11px;min-width:28px;${tool.width===w.v&&!tool.eraser?'background:var(--rose);color:white;':''}font-weight:700" data-a="lm_cm_width" data-v="${w.v}">${w.l}</button>`).join('')}
      </div>
      <!-- 전체 지우기 -->
      <button class="btn btn-danger" style="padding:4px 10px;font-size:11.5px;margin-left:auto" data-a="lm_cm_clearAll">🗑️ 전체</button>
    </div>
    <!-- 현재 도구 미리보기 -->
    <div style="margin-top:8px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3)">
      <div style="width:${tool.width}px;height:${tool.width}px;border-radius:50%;background:${tool.eraser?'#ccc':tool.color};flex-shrink:0"></div>
      <span>${tool.eraser?'🧹 지우개':`🎨 색상 · 굵기 ${tool.width}px`}</span>
    </div>
  </div>`:
  /* 정답 입력 (비출제자 + 게임 중) */
  state?.status==='drawing'&&myNick?`
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <input id="cm_guess_input" class="inp" placeholder="그림을 보고 정답을 입력하세요..." style="flex:1">
    <button class="btn btn-primary" style="padding:0 16px;font-size:13px;flex-shrink:0" data-a="lm_cm_guess">✏️ 제출</button>
  </div>`:''}

  <!-- 시작 / 대기 버튼 -->
  ${isIdle||isReveal?`
  <button class="btn btn-primary" style="width:100%;padding:13px;font-size:14.5px;margin-bottom:10px" data-a="lm_cm_start">
    🎨 ${isIdle?'게임 시작 (랜덤 출제자 선정)':'다음 라운드 시작'}
  </button>`:''}

  <!-- 추측 채팅 -->
  <div class="card" style="margin-bottom:10px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <p style="font-size:12.5px;font-weight:700;color:var(--text2);margin:0">💬 추측 피드</p>
      <span style="font-size:10.5px;color:var(--text3)">${S.cmGuesses.length}개</span>
    </div>
    <div id="cm_chat_feed" style="max-height:180px;overflow-y:auto;font-size:12.5px">${renderCMGuesses()}</div>
  </div>

  <!-- 보상 안내 -->
  <div class="card card-gold" style="margin-bottom:10px">
    <p style="font-size:12.5px;font-weight:700;margin:0 0 8px">🏆 보상 안내</p>
    <div style="font-size:12px;color:var(--text2);display:flex;flex-direction:column;gap:5px">
      <div style="display:flex;justify-content:space-between"><span>✅ 정답 맞추기 (추측자)</span><span class="gold-badge">+100P +5IQ</span></div>
      <div style="display:flex;justify-content:space-between"><span>🎨 그림 출제 (다음 라운드 출제자)</span><span class="gold-badge">+50P +2IQ</span></div>
    </div>
  </div>`;
}

function renderChatMessages(){
  if(S.chosungChat.length===0)return`<p style="font-size:12.5px;color:var(--text3);text-align:center;padding:1.5rem">아직 채팅이 없어요. 첫 번째로 정답을 맞춰보세요!</p>`;
  return S.chosungChat.map(m=>{
    const type=m.type||'chosung';
    const pMap={chosung:'+50P +3IQ',ox:'+20P +1IQ',nonsense:'+40P +2IQ',short:'+30P +2IQ'};
    const reward=pMap[type]||'+50P';
    return`<div class="lm-chat-msg ${m.isCorrect?'correct':''}">
      <span class="lm-chat-nick">${esc(m.nick||'')}</span>
      <span style="font-size:13px;color:${m.isCorrect?'var(--rose2)':'var(--text1)'}">${esc(m.message||'')}</span>
      ${m.isCorrect?`<span style="font-size:11px;color:var(--rose);margin-left:auto">⚡ ${reward}</span>`:''}
    </div>`;
  }).join('');
}

function rPlazaTab(){
  const state=S.chosungState;
  const myNick=S.myEntry?.nick;
  const qMode=S.quizMode||state?.type||'chosung';
  const myPet=S.myPet;
  const myIQ=myPet?.iq||100;

  /* ── 퀴즈 타입 선택 탭 ── */
  const quizTypeTabs=`
  <div style="display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap">
    ${[
      {id:'chosung', label:'🔤 초성퀴즈', reward:'+50P +3IQ'},
      {id:'ox',      label:'⭕ OX퀴즈',   reward:'+20P +1IQ'},
      {id:'nonsense',label:'🤪 넌센스',   reward:'+40P +2IQ'},
      {id:'short',   label:'✏️ 주관식',   reward:'+30P +2IQ'},
    ].map(t=>`<button class="btn ${qMode===t.id?'btn-sel':''}" style="padding:6px 10px;font-size:11.5px;flex:1"
      data-a="lm_setQuizMode" data-v="${t.id}">${t.label}<br><span style="font-size:9.5px;opacity:.7">${t.reward}</span></button>`).join('')}
  </div>`;

  /* ── 문제 표시 ── */
  let questionHTML='';
  let inputHTML='';

  if(!state){
    questionHTML=`<div style="text-align:center;padding:2rem 0;color:var(--text3)">
      <div style="font-size:40px;margin-bottom:10px">🎉</div>
      <p style="font-size:13px">퀴즈 준비 중... 잠시 후 시작됩니다!</p>
    </div>`;
  } else {
    const solved=state.solvedBy;
    const solvedBox=solved?`<div style="text-align:center;padding:10px;background:var(--rose-lt);border-radius:10px;margin-top:10px;border:1px solid var(--border2)">
      <p style="font-size:14px;font-weight:700;color:var(--rose2)">⚡ ${esc(state.solvedBy)}님이 먼저 정답!</p>
      <p style="font-size:12px;color:var(--text2);margin:4px 0 0">정답: <b>${esc(state.answer||state.answers?.[0]||'')}</b></p>
      ${state.explain?`<p style="font-size:11px;color:var(--text3);margin:3px 0 0">${esc(state.explain)}</p>`:''}
      <p style="font-size:11px;color:var(--text3);margin:3px 0 0">다음 문제 준비 중...</p>
    </div>`:'';

    if(state.type==='chosung'){
      questionHTML=`
        <p style="font-size:13px;font-weight:700;color:var(--plum);text-align:center;margin-bottom:8px">🔤 초성 퀴즈 [${esc(state.genre||'일반')}]</p>
        <div style="display:flex;justify-content:center;gap:8px;margin:8px 0 12px;flex-wrap:wrap">
          ${(state.chosung||[]).map(c=>`<div class="lm-cho-char">${c}</div>`).join('')}
        </div>
        <p style="font-size:12px;color:var(--text3);text-align:center">💡 힌트: ${esc(state.hint||'')}</p>
        ${solvedBox}`;
      if(!solved&&myNick)inputHTML=`<div style="display:flex;gap:8px;margin-top:10px">
        <input id="lm_chosung_input" class="inp" placeholder="정답을 입력하세요..." style="flex:1">
        <button class="btn btn-mint" style="padding:0 18px;font-size:13px" data-a="lm_submitAnswer">⚡ 입력</button>
      </div>`;

    } else if(state.type==='ox'){
      questionHTML=`
        <p style="font-size:13px;font-weight:700;color:var(--plum);text-align:center;margin-bottom:10px">⭕ OX 퀴즈</p>
        <div style="background:white;border-radius:12px;padding:14px 16px;border:1.5px solid var(--border);text-align:center;margin-bottom:10px">
          <p style="font-size:16px;font-weight:600;line-height:1.6">${esc(state.question||'')}</p>
        </div>
        ${solvedBox}`;
      if(!solved&&myNick)inputHTML=`<div style="display:flex;gap:10px;margin-top:10px">
        <button class="btn" style="flex:1;padding:18px;font-size:32px;border-color:rgba(76,175,80,.5);background:rgba(76,175,80,.05)" data-a="lm_submitOX" data-v="O">⭕</button>
        <button class="btn" style="flex:1;padding:18px;font-size:32px;border-color:rgba(244,67,54,.5);background:rgba(244,67,54,.05)" data-a="lm_submitOX" data-v="X">❌</button>
      </div>`;

    } else if(state.type==='nonsense'){
      questionHTML=`
        <p style="font-size:13px;font-weight:700;color:var(--plum);text-align:center;margin-bottom:10px">🤪 넌센스 퀴즈</p>
        <div style="background:linear-gradient(135deg,rgba(253,238,244,.6),rgba(240,230,255,.6));border-radius:12px;padding:16px;border:1.5px solid var(--border);text-align:center;margin-bottom:10px">
          <p style="font-size:15px;font-weight:600;line-height:1.7">${esc(state.question||'')}</p>
          ${state.hint?`<p style="font-size:11.5px;color:var(--text3);margin-top:6px">💡 ${esc(state.hint)}</p>`:''}
        </div>
        ${solvedBox}`;
      if(!solved&&myNick)inputHTML=`<div style="display:flex;gap:8px;margin-top:10px">
        <input id="lm_chosung_input" class="inp" placeholder="정답을 입력하세요..." style="flex:1">
        <button class="btn btn-mint" style="padding:0 18px;font-size:13px" data-a="lm_submitAnswer">⚡ 입력</button>
      </div>`;

    } else { /* short */
      questionHTML=`
        <p style="font-size:13px;font-weight:700;color:var(--plum);text-align:center;margin-bottom:10px">✏️ 주관식 퀴즈</p>
        <div style="background:white;border-radius:12px;padding:16px;border:2px solid rgba(232,83,122,.3);text-align:center;margin-bottom:10px">
          <p style="font-size:16px;font-weight:600;line-height:1.6">${esc(state.question||'')}</p>
        </div>
        ${solvedBox}`;
      if(!solved&&myNick)inputHTML=`<div style="display:flex;gap:8px;margin-top:10px">
        <input id="lm_chosung_input" class="inp" placeholder="답변을 입력하세요..." style="flex:1">
        <button class="btn btn-primary" style="padding:0 18px;font-size:13px" data-a="lm_submitAnswer">✏️ 제출</button>
      </div>`;
    }
  }

  if(!myNick&&!inputHTML){
    inputHTML=`<p style="font-size:12px;color:var(--text3);text-align:center;margin-top:10px;padding:10px;background:var(--rose-lt);border-radius:8px">포인트·IQ를 받으려면 MBTI 검사를 먼저 완료해주세요!</p>`;
  }

  /* ── 랭킹: 포인트/레벨/환생/IQ ── */
  const lbMode=S.lbMode||'points';
  const sortedByPoints=[...S.petEntries].sort((a,b)=>(b.points||0)-(a.points||0)).slice(0,10);
  const sortedByLevel=[...S.petEntries].sort((a,b)=>(b.level||1)-(a.level||1)||(b.xp||0)-(a.xp||0)).slice(0,10);
  const sortedByRebirth=[...S.petEntries].sort((a,b)=>(b.rebirthCount||0)-(a.rebirthCount||0)||(b.level||1)-(a.level||1)).slice(0,10);
  const sortedByIQ=[...S.petEntries].sort((a,b)=>(b.iq||100)-(a.iq||100)).slice(0,10);
  const sortedByPvP=[...S.petEntries].sort((a,b)=>(b.pvpRecord?.win||0)-(a.pvpRecord?.win||0)).slice(0,10);
  const sortedPets=lbMode==='level'?sortedByLevel:lbMode==='rebirth'?sortedByRebirth:lbMode==='iq'?sortedByIQ:lbMode==='pvp'?sortedByPvP:sortedByPoints;

  const lbToggle=`
    <div style="display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap">
      <button class="lb-mode-btn ${lbMode==='points'?'active':''}" data-a="setLbMode" data-v="points">💰 포인트</button>

    :sortedPets.map((p,i)=>{
      const rankEmoji=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
      const rebirthBadge=(p.rebirthCount||0)>0?`<span class="rebirth-badge" style="font-size:9px">🔥${p.rebirthCount}</span>`:'';
      const iqColor=(p.iq||100)>=150?'#FFD700':(p.iq||100)>=130?'#F44336':(p.iq||100)>=110?'#9C27B0':'var(--text2)';

        :lbMode==='rebirth'

        :`<div style="text-align:right"><div class="lm-lb-pts">${(p.points||0).toLocaleString()}P</div><div style="font-size:10px;color:var(--text3)">Lv.${p.level||1}</div></div>`;
      return`<div class="lm-lb-row">
        <div class="lm-lb-rank">${rankEmoji}</div>

  return`

  <div class="card card-mint" style="margin-bottom:12px">

      <p style="font-size:13px;font-weight:700;color:var(--text2);margin:0">💬 실시간 답변 피드</p>

      <div style="display:flex;justify-content:space-between"><span>✏️ 주관식 퀴즈 정답</span><span class="gold-badge">+30P +2IQ</span></div>

/* ═══════════════════════════════════════
   DOM EVENTS BINDING
═══════════════════════════════════════ */
function attachEvents(){
  const app=document.getElementById("app");
  [["nickI","nick"],["areaI","area"],["pinI","pin"],["heightI","height"],["freeI","freeTime"],
   ["idealI","idealType"],["appealI","appeal"],["gidolI","giDol"]
  ].forEach(([id,key])=>{const el=app.querySelector("#"+id);if(el)el.addEventListener("input",e=>{S[key]=e.target.value;});});
  const pwI=app.querySelector("#pwI");if(pwI)pwI.addEventListener("keydown",e=>{if(e.key==="Enter")login();});

  const chosungI=app.querySelector("#lm_chosung_input");
  if(chosungI){
    chosungI.addEventListener("input",e=>{S.chosungInput=e.target.value;});
    chosungI.addEventListener("keydown",e=>{if(e.key==="Enter")submitQuizAnswer();});
  }
  /* ★ 캐치마인드 정답 Enter */
  const cmGuessI=app.querySelector("#cm_guess_input");
  if(cmGuessI)cmGuessI.addEventListener("keydown",e=>{if(e.key==="Enter")submitCMGuess();});

  const feed=app.querySelector("#lm_chat_feed");
  if(feed)feed.scrollTop=feed.scrollHeight;

  app.querySelectorAll("[data-a]").forEach(el=>{
    el.addEventListener("click",()=>{
      const a=el.dataset.a;

      if(a==="gender"){S.gender=el.dataset.v;render();}
      else if(a==="startMBTI")startMBTI();
      else if(a==="startBal")startBal();
      else if(a==="startDat")startDat();
      else if(a==="loadMyInfo")loadMyInfo();
      else if(a==="goHome"){S.screen="home";render();}
      else if(a==="goBoard"){S.screen="board";S.tab="board";render();}
      else if(a==="goCompat"){S.screen="board";S.tab="compat";render();}
      else if(a==="retry"){
        S.nick="";S.area="";S.pin="";S.gender="";S.height="";S.freeTime="";S.idealType="";S.appeal="";S.giDol="";
        S.myEntry=null;S.myBalEntry=null;S.myDatEntry=null;S.myPet=null;
        localStorage.removeItem("lmg_user");localStorage.removeItem("lmg_bal");
        localStorage.removeItem("lmg_dat");localStorage.removeItem("lmg_pet");
        S.screen="home";render();
      }
      else if(a==="testBack"){if(S.qIdx>0){S.qIdx--;render();}else{S.screen="home";render();}}
      else if(a==="mbtiAns")mbtiAns(parseInt(el.dataset.v));
      else if(a==="balBack"){if(S.balIdx>0){S.balIdx--;render();}else{S.screen="home";render();}}
      else if(a==="balAns")balAns(el.dataset.v);
      else if(a==="datBack"){if(S.datIdx>0){S.datIdx--;render();}else{S.screen="home";render();}}
      else if(a==="datAns")datAns(el.dataset.v);
      else if(a==="tab"){S.tab=el.dataset.v;render();}
      else if(a==="selM"){const e=S.entries.find(x=>x.id===el.dataset.id);S.selM=S.selM?.id===el.dataset.id?null:e;render();}
      else if(a==="selF"){const e=S.entries.find(x=>x.id===el.dataset.id);S.selF=S.selF?.id===el.dataset.id?null:e;render();}
      else if(a==="giveRose"){if(S.myEntry)giveRose(S.myEntry.nick,S.myEntry.gender,el.dataset.recv,el.dataset.rg);}
      else if(a==="login")login();
      else if(a==="logout"){S.isAdmin=false;S.pwErr="";render();}
      else if(a==="adminResetLevel"){adminResetPetLevel(el.dataset.nick);}
      else if(a==="adminCapAll"){adminCapAllLevels();}
      /* ★ 환생 */
      else if(a==="lm_rebirth"){rebirthPet();}
      /* ★ 장착 아이템 */
      else if(a==="setEquipTab"){S.equipTab=el.dataset.v;render();}
      else if(a==="lm_buyEquip"){buyEquipItem(el.dataset.id);}
      else if(a==="lm_equip"){equipItem(el.dataset.slot,el.dataset.id);}
      else if(a==="lm_unequip"){if(confirm(`장착 해제하시겠습니까?`))unequipItem(el.dataset.slot);}
      /* ★ 하우스 */
      else if(a==="lm_initHouse"){initMyHouse();}
      else if(a==="lm_upgradeHouse"){upgradeHouse(el.dataset.tier);}
      else if(a==="lm_buyFurniture"){buyFurnitureItem(el.dataset.id);}
      else if(a==="lm_placeFurniture"){placeFurnitureItem(el.dataset.id);}
      else if(a==="lm_removeFurniture"){if(confirm("가구를 제거하고 인벤토리로 돌려보낼까요?"))removeFurnitureFromHouse(el.dataset.id);}
      else if(a==="lm_visitHouse"){visitHouse(el.dataset.nick);}
      else if(a==="lm_backFromHouse"){S.visitingHouse=null;if(window.__houseR){window.__houseR.destroy();window.__houseR=null;}render();}
      else if(a==="lm_leaveGuestbook"){
        const input=document.getElementById('guestbookInput');
        if(input&&input.value.trim())leaveGuestbook(el.dataset.nick,input.value);
        else alert("한 마디를 입력해주세요!");
      }
      else if(a==="lm_setWallpaper"){
        const wp=WALLPAPERS[el.dataset.v];
        if(wp&&wp.cost>0&&(S.myPet?.points||0)<wp.cost){alert(`포인트 부족! (필요: ${wp.cost}P)`);return;}
        if(wp?.cost>0&&!confirm(`${wp.name} 구입? (-${wp.cost}P)`))return;
        if(wp?.cost>0)petCol.doc(S.myEntry.nick).update({points:INC(-wp.cost)}).then(()=>{S.myPet.points-=wp.cost;});
        houseCol.doc(S.myEntry.nick).update({wallpaper:el.dataset.v});
        if(S.myHouse)S.myHouse.wallpaper=el.dataset.v;
        if(window.__houseR){window.__houseR.destroy();window.__houseR=null;}render();
      }
      else if(a==="lm_setFloor"){
        const fl=FLOORS[el.dataset.v];
        if(fl&&fl.cost>0&&(S.myPet?.points||0)<fl.cost){alert(`포인트 부족! (필요: ${fl.cost}P)`);return;}
        if(fl?.cost>0&&!confirm(`${fl.name} 구입? (-${fl.cost}P)`))return;
        if(fl?.cost>0)petCol.doc(S.myEntry.nick).update({points:INC(-fl.cost)}).then(()=>{S.myPet.points-=fl.cost;});
        houseCol.doc(S.myEntry.nick).update({floor:el.dataset.v});
        if(S.myHouse)S.myHouse.floor=el.dataset.v;
        if(window.__houseR){window.__houseR.destroy();window.__houseR=null;}render();
      }
      else if(a==="del")deleteParticipant(el.dataset.id);
      else if(a==="delAll"){if(confirm("정말 전체 삭제하시겠어요?"))delAllMBTI();}
      else if(a==="edit"){S.editId=el.dataset.id;render();}
      else if(a==="cancelEdit"){S.editId=null;render();}
      else if(a==="saveEdit"){
        const id=el.dataset.id;
        const newData={
          nick:document.getElementById(`edit_nick_${id}`).value.trim(),
          area:document.getElementById(`edit_area_${id}`).value.trim(),
          gender:document.getElementById(`edit_gender_${id}`).value.trim(),
          height:document.getElementById(`edit_height_${id}`).value.trim(),
          freeTime:document.getElementById(`edit_freeTime_${id}`).value.trim(),
          idealType:document.getElementById(`edit_idealType_${id}`).value.trim(),
          appeal:document.getElementById(`edit_appeal_${id}`).value.trim(),
          giDol:document.getElementById(`edit_giDol_${id}`).value.trim(),
          mbti:document.getElementById(`edit_mbti_${id}`).value.trim(),
          pin:document.getElementById(`edit_pin_${id}`).value.trim()
        };
        updateParticipant(id,newData);
      }
      /* ── 러브몬 액션 ── */
      else if(a==="goLovemon"){S.screen="board";S.tab="lm_pet";render();}
      else if(a==="goPlaza"){S.screen="board";S.tab="lm_plaza";render();}
      else if(a==="lm_createPet"){initOrLoadPet(S.myEntry.nick,S.myEntry.gender,S.myEntry.mbti,S.myBalEntry?.answers);}
      else if(a==="lm_buyFeed"){feedPet(el.dataset.item);}
      else if(a==="lm_feedOther"){
        const itemId=prompt("어떤 아이템을 선물하시겠습니까?\n1. 기본 사료 (100P) — 호감도 +10\n2. 도파민 특식 (500P) — 호감도 +10\n번호를 입력해주세요:","1");
        if(itemId==="1")feedPet('feed_basic',el.dataset.nick);
        else if(itemId==="2")feedPet('feed_dopamine',el.dataset.nick);
      }
      /* ★ 장미꽃 선물 → 호감도 +20 */
      else if(a==="lm_giveRoseToPet"){giveRoseToPet(el.dataset.nick);}
      else if(a==="lm_sendPoints"){transferPoints(el.dataset.nick);}
      else if(a==="lm_breedReq"){requestBreed(el.dataset.nick);}
      else if(a==="lm_breedAccept"){acceptBreed(el.dataset.id,el.dataset.from);}
      else if(a==="lm_submitAnswer"){submitQuizAnswer();}
      /* ★ OX 버튼 제출 */
      else if(a==="lm_submitOX"){submitOXAnswer(el.dataset.v);}
      /* ★ 퀴즈 타입 변경 */
      else if(a==="lm_setQuizMode"){
        S.quizMode=el.dataset.v;
        startQuizQuestion(el.dataset.v,null).catch(()=>{});render();
      }
      /* ★ 캐치마인드 핸들러 */
      else if(a==="lm_cm_start"){startCatchmindRound(null);}
      else if(a==="lm_cm_skip"){skipCMRound();}
      else if(a==="lm_cm_guess"){submitCMGuess();}
      else if(a==="lm_cm_color"){
        S.cmTool={...S.cmTool,color:el.dataset.v,eraser:false};
        if(window.__cmCanvas)window.__cmCanvas.updateTool(S.cmTool);
        render();
      }
      else if(a==="lm_cm_eraser"){
        S.cmTool={...S.cmTool,eraser:true};
        if(window.__cmCanvas)window.__cmCanvas.updateTool(S.cmTool);
        render();
      }
      else if(a==="lm_cm_width"){
        S.cmTool={...S.cmTool,width:parseInt(el.dataset.v),eraser:false};
        if(window.__cmCanvas)window.__cmCanvas.updateTool(S.cmTool);
        render();
      }
      else if(a==="lm_cm_clearAll"){
        if(confirm("캔버스를 전체 지우겠습니까?"))clearCMStrokes();
      }
      /* ★ 2세 공동 육아 먹이 주기 */
      else if(a==="lm_feedBaby"){
        feedBaby(el.dataset.id, parseInt(el.dataset.cost), parseInt(el.dataset.xp));
      }
      /* ★ 2세 액티비티 (신규) */
      else if(a==="lm_babyActivity"){
        doBabyActivity(el.dataset.id, el.dataset.act);
      }
      /* ★ 던전 킬 초기화 */
      else if(a==="lm_resetDungeonKills"){
        if(confirm("이번 라운드 클리어 기록을 초기화하겠습니까?")){{
          const myNick=S.myEntry?.nick;
          if(myNick){
            petCol.doc(myNick).update({dungeonKills:{}}).catch(()=>{});
            if(S.myPet)S.myPet.dungeonKills={};
            render();
          }
        }}
      }
      /* ★ 던전 진입: 층 선택 */
      else if(a==="lm_selectFloor"){
        const fi=parseInt(el.dataset.floor);
        const fl=DUNGEON_FLOORS[fi];
        if(!fl)return;
        if(fl.mobs.length===1){
          startDungeon(fi,0);
        }else{
          const choice=fl.mobs.map((m,i)=>`${i+1}. ${m.emoji} ${m.name} (HP ${m.hp}·ATK ${m.atk}) → XP ${m.xp}·${m.pts}P`).join('\n');
          const pick=prompt(`${fl.emoji} ${fl.name}\n사냥할 몬스터를 선택하세요:\n${choice}\n번호 입력:`,'1');
          if(!pick)return;
          const idx=parseInt(pick)-1;
          if(idx<0||idx>=fl.mobs.length){alert("올바른 번호를 입력해주세요.");return;}
          startDungeon(fi,idx);
        }
      }
      /* ★ 던전 배틀 액션 */
      else if(a==="lm_dungeonAction"){
        dungeonAction(el.dataset.type, el.dataset.skill);
      }
      /* ★ 던전 물약 사용 메뉴 */
      else if(a==="lm_usePotionMenu"){
        const ds=S.dungeonState;
        if(!ds)return;
        const inv=ds.inventory||{};
        const avail=POTION_ITEMS.filter(p=>(inv[p.id]||0)>0);
        if(!avail.length){alert("보유한 물약이 없어요! 상점에서 구입하세요 🧪");return;}
        const list=avail.map((p,i)=>`${i+1}. ${p.emoji} ${p.name} (${inv[p.id]}개) - ${p.desc}`).join('\n');
        const pick=prompt(`🧪 사용할 물약 선택:\n${list}\n번호 입력:`,'1');
        if(!pick)return;
        const chosen=avail[parseInt(pick)-1];
        if(!chosen)return;
        dungeonAction('potion',chosen.id);
      }
      /* ★ PvP 도전 */
      else if(a==="lm_pvp"){startPvP(el.dataset.nick);}
      /* ★ 물약 구매 */
      else if(a==="lm_buyPotion"){buyPotion(el.dataset.id);}
      /* ★ 주사위 재굴림 */
      else if(a==="lm_rerollDice"){rerollDice();}
      /* ★ HP/MP 완전 회복 (500P) */
      else if(a==="lm_restoreHpMp"){restoreHpMp();}
      /* ★ 2세 육아 케어 */
      else if(a==="lm_careForBaby"){
        careForBaby(el.dataset.id,parseInt(el.dataset.reduction),parseInt(el.dataset.cost));
      }
      /* ★ 2세 부화 */
      else if(a==="lm_hatchBaby"){hatchBaby(el.dataset.id);}
      /* ★ 랭킹 모드 전환 */
      else if(a==="setLbMode"){S.lbMode=el.dataset.v;render();}
      /* ★ 관리자 승인 토글 */
      else if(a==="toggleCheck"){
        const id=el.dataset.id;
        const checked=el.dataset.checked==='1';
        toggleAdminCheck(id,checked);
      }
      /* ★ 펫 이름 변경권 (무료 1회 / 이후 10,000P) */
      else if(a==="lm_buyRenameTicket"){
        const myNick=S.myEntry?.nick;
        if(!myNick||!S.myPet){alert("먼저 러브몬을 생성해주세요!");return;}
        const nameChangeCount=S.myPet.nameChangeCount||0;
        const cost=nameChangeCount===0?0:10000;
        if(cost>0&&(S.myPet.points||0)<cost){
          alert(`포인트가 부족합니다! (10,000P 필요, 보유: ${S.myPet.points||0}P)`);return;
        }
        const newName=prompt(
          `새로운 러브몬의 이름을 입력해주세요:\n${nameChangeCount===0?'🎁 첫 번째 변경은 무료예요!':`이후 변경은 10,000P 차감됩니다 (보유: ${S.myPet.points||0}P)`}`
        );
        if(newName&&newName.trim()!==""){
          const updateData={petName:newName.trim(),nameChangeCount:INC(1)};
          if(cost>0)updateData.points=INC(-cost);
          petCol.doc(myNick).update(updateData).then(()=>{
            if(cost>0)S.myPet.points-=cost;
            S.myPet.petName=newName.trim();
            S.myPet.nameChangeCount=(nameChangeCount+1);
            alert(`펫의 이름이 '${newName.trim()}'(으)로 변경되었습니다!${cost===0?' (무료 변경 1회 사용 완료)':''}`);
            render();
          }).catch(()=>alert("이름 변경 중 오류가 발생했습니다."));
        }
      }
      /* ── 색상표 슬롯 ── */
      else if(a==="setColorSlot"){
        const slot=el.dataset.slot;
        const currentName=S.colorSlots[slot]||"";
        const isAdmin=S.isAdmin;
        if(currentName!==""&&!isAdmin&&currentName!==S.myEntry?.nick){
          alert("이미 다른 유저가 선점한 번호입니다. 본인의 자리만 수정 가능합니다.");return;
        }
        const newNick=prompt(`${slot}번 색상표에 등록할 닉네임을 입력하세요:\n(비워두면 삭제됩니다)`,currentName||S.myEntry?.nick||"");
        if(newNick!==null){
          const updates={};
          if(newNick.trim()===""){
            updates[slot]=firebase.firestore.FieldValue.delete();
            delete S.colorSlots[slot];
          }else{
            updates[slot]=newNick.trim();
            S.colorSlots[slot]=newNick.trim();
          }
          gameStateCol.doc("color_chart").set(updates,{merge:true});
          render();
        }
      }
    });
  });
}

/* ═══════════════════════════════════════
   BOOT
═══════════════════════════════════════ */
render();
load();
</script>

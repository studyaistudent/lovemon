<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 연애 미니게임 × 러브몬</title>
<meta property="og:title" content="💕 연애 미니게임 × 러브몬">
<meta property="og:description" content="MBTI · 밸런스게임 · 연애성향 · 장미꽃 · 러브몬 육성 · 초성광장">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');
:root {
  --rose:       #E8537A;
  --rose2:      #C73B65;
  --rose-lt:    #FDEEF4;
  --rose-pale:  #FFF6FA;
  --plum:       #7C3F7E;
  --gold:       #D4A853;
  --cream:      #FDF8F2;
  --text1:      #2A1A2E;
  --text2:      #6B4870;
  --text3:      #B89CB8;
  --border:     rgba(232,83,122,.18);
  --border2:    rgba(232,83,122,.35);
  --shadow:     0 4px 24px rgba(232,83,122,.12);
  --r:          14px;
  --r-sm:       10px;
  --mint:       #2EC4B6;
  --mint-lt:    #E8F8F7;
  --lm-gold:    #F0A500;
  --lm-purple:  #9B59B6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:#FDF0F6;
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 10%,rgba(232,83,122,.10) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 80%,rgba(124,63,126,.08) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%,rgba(212,168,83,.05) 0%,transparent 60%);
  min-height:100vh;color:var(--text1);
}
body::before{
  content:'💕 🌹 💗 🌸 💘 ✨ 🐾 🥚 💕 🌹';
  position:fixed;top:0;left:0;width:100%;
  font-size:11px;letter-spacing:26px;
  color:rgba(232,83,122,.06);
  pointer-events:none;z-index:0;
  line-height:30px;word-spacing:18px;
  white-space:nowrap;overflow:hidden;
}
#app{max-width:560px;margin:0 auto;padding:1rem;position:relative;z-index:1;}

/* ── Card ── */
.card{background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;box-shadow:var(--shadow);}
.card-rose{background:linear-gradient(135deg,rgba(253,238,244,.95),rgba(253,245,250,.95));border-color:var(--border2);}
.card-mint{background:linear-gradient(135deg,rgba(232,248,247,.95),rgba(240,253,252,.95));border-color:rgba(46,196,182,.3);}
.card-gold{background:linear-gradient(135deg,rgba(253,248,230,.95),rgba(255,252,240,.95));border-color:rgba(212,168,83,.3);}

/* ── Buttons ── */
.btn{border:1.5px solid var(--border2);border-radius:var(--r-sm);padding:10px 16px;cursor:pointer;font-size:13.5px;font-family:'Noto Sans KR',sans-serif;background:white;color:var(--text1);transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:5px;}
.btn:hover{background:var(--rose-lt);}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(135deg,var(--rose),var(--rose2)) !important;color:white !important;border:none !important;font-weight:500;box-shadow:0 3px 12px rgba(232,83,122,.35);}
.btn-primary:hover{opacity:.88;box-shadow:0 5px 18px rgba(232,83,122,.45);}
.btn-sel{background:linear-gradient(135deg,var(--rose),var(--rose2)) !important;color:white !important;border-color:transparent !important;}
.btn-plum{background:linear-gradient(135deg,var(--plum),#9C27B0) !important;color:white !important;border:none !important;box-shadow:0 3px 12px rgba(124,63,126,.3);}
.btn-mint{background:linear-gradient(135deg,var(--mint),#1A9E95) !important;color:white !important;border:none !important;box-shadow:0 3px 12px rgba(46,196,182,.3);}
.btn-gold{background:linear-gradient(135deg,var(--gold),#B8860B) !important;color:white !important;border:none !important;box-shadow:0 3px 12px rgba(212,168,83,.3);}
.btn-danger{color:#C62828 !important;border-color:#FFCDD2 !important;}

/* ── Inputs ── */
.inp{width:100%;padding:10px 14px;border:1.5px solid var(--border2);border-radius:var(--r-sm);font-size:13.5px;font-family:'Noto Sans KR',sans-serif;background:white;color:var(--text1);transition:border-color .15s,box-shadow .15s;}
.inp:focus{outline:none;border-color:var(--rose);box-shadow:0 0 0 3px rgba(232,83,122,.12);}

/* ── Progress bar ── */
.prog{height:6px;background:var(--rose-lt);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--rose2));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.prog-mint{background:linear-gradient(90deg,var(--mint),#1A9E95);}

/* ── Tabs ── */
.tabs{display:flex;background:white;border:1px solid var(--border);border-radius:var(--r-sm);overflow-x:auto;margin-bottom:14px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;min-width:58px;padding:9px 6px;font-size:11px;font-family:'Noto Sans KR',sans-serif;background:transparent;border:none;border-right:1px solid var(--border);cursor:pointer;color:var(--text2);transition:all .15s;line-height:1.3;white-space:pre-line;text-align:center;}
.tab:last-child{border-right:none;}
.tab.on{background:linear-gradient(135deg,var(--rose),var(--rose2));color:white;font-weight:500;}
.tab.on-mint{background:linear-gradient(135deg,var(--mint),#1A9E95);color:white;font-weight:500;}

/* ── Answer buttons ── */
.ans{width:100%;padding:15px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:white;color:var(--text1);cursor:pointer;font-size:14px;font-family:'Noto Sans KR',sans-serif;text-align:center;transition:all .15s;}
.ans:hover{background:var(--rose-lt);border-color:var(--rose);transform:translateY(-1px);}
.ans:active{transform:scale(.98);}

/* ── Scroll list ── */
.slist{max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;}
.slist::-webkit-scrollbar{width:3px;}
.slist::-webkit-scrollbar-thumb{background:var(--rose-lt);border-radius:99px;}

/* ── Animations ── */
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes livePulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

.float{animation:float 2.5s ease-in-out infinite;}
.pulse{animation:pulse 1.5s ease-in-out infinite;}
.fadein{animation:fadeIn .4s ease;}
.live-dot{width:7px;height:7px;background:#E8537A;border-radius:50%;display:inline-block;animation:livePulse 1.2s infinite;}

/* ── Score bar ── */
.sbar{height:7px;background:var(--rose-lt);border-radius:99px;overflow:hidden;flex:1;}
.sbar-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--rose2));border-radius:99px;transition:width .6s ease;}

/* ── Title decorative ── */
.title-deco{font-family:'Playfair Display',serif;font-style:italic;letter-spacing:.5px;}

/* ── Badges ── */
.rose-badge{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,#FFE4EF,#FFC8DA);color:var(--rose2);padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid rgba(232,83,122,.3);}
.gold-badge{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,#FFF3CD,#FFE082);color:#8B6914;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid rgba(212,168,83,.4);}

/* ── Heart separator ── */
.sep{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin:6px 0;}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:var(--border);}
.chip{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:500;}

/* ── LoveMon Specific ── */
.lm-pet-card{
  background:linear-gradient(160deg,rgba(253,238,244,.98),rgba(240,230,255,.98));
  border:1.5px solid rgba(155,89,182,.25);
  border-radius:18px;padding:1.4rem;text-align:center;
  box-shadow:0 6px 28px rgba(155,89,182,.12);
}
.lm-xp-bar{height:8px;background:rgba(155,89,182,.12);border-radius:99px;overflow:hidden;}
.lm-xp-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--lm-purple));border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.lm-stat-row{display:flex;justify-content:center;gap:20px;margin:10px 0;}
.lm-stat{text-align:center;}
.lm-stat .val{font-size:22px;font-weight:700;line-height:1;}
.lm-stat .lbl{font-size:10.5px;color:var(--text3);margin-top:2px;}
.lm-cho-char{
  width:50px;height:50px;border-radius:12px;
  border:2px solid rgba(46,196,182,.4);
  background:white;display:inline-flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:700;color:var(--mint);
  box-shadow:0 3px 12px rgba(46,196,182,.15);
  animation:pulse 2s ease-in-out infinite;
}
.lm-market-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.lm-market-item{
  border:1.5px solid var(--border);border-radius:12px;
  background:white;padding:10px 8px;text-align:center;
  cursor:pointer;transition:all .15s;
}
.lm-market-item:hover{border-color:var(--rose);background:var(--rose-lt);transform:translateY(-2px);}
.lm-market-item:active{transform:scale(.97);}
.lm-feed-log{max-height:150px;overflow-y:auto;}
.lm-feed-log::-webkit-scrollbar{width:3px;}
.lm-feed-log::-webkit-scrollbar-thumb{background:var(--rose-lt);}
.lm-chosung-chat{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;}
.lm-chosung-chat::-webkit-scrollbar{width:3px;}
.lm-chosung-chat::-webkit-scrollbar-thumb{background:rgba(46,196,182,.2);}
.lm-chat-msg{padding:5px 8px;border-radius:8px;font-size:13px;display:flex;gap:6px;align-items:baseline;}
.lm-chat-msg.correct{background:rgba(232,83,122,.07);border:1px solid rgba(232,83,122,.2);}
.lm-chat-nick{font-weight:700;font-size:12px;color:var(--rose2);flex-shrink:0;}
.lm-family-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;flex-wrap:wrap;}
.lm-breed-incoming{background:rgba(155,89,182,.07);border:1px solid rgba(155,89,182,.2);border-radius:10px;padding:10px;margin-top:8px;}
.lm-lb-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.lm-lb-rank{font-size:16px;width:26px;text-align:center;}
.lm-lb-pet{font-size:22px;}
.lm-lb-nick{flex:1;font-size:13px;font-weight:600;}
.lm-lb-pts{font-size:13px;font-weight:700;color:var(--gold);}

/* ── 추가된 커스텀 기능 UI ── */
.color-chart-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr); 
  gap: 8px; margin-top: 15px;
}
.color-slot {
  border: 1px solid var(--border); background: var(--cream);
  padding: 12px 5px; text-align: center; border-radius: 8px; cursor: pointer;
  transition: all 0.2s ease; box-shadow: 0 2px 4px rgba(232, 83, 122, 0.05);
}
.color-slot:hover {
  background: var(--rose-pale); border-color: var(--rose); transform: translateY(-2px);
}
.color-slot .slot-num { font-size: 0.75rem; color: var(--text3); margin-bottom: 4px; }
.color-slot .slot-nick { font-size: 0.85rem; font-weight: 500; color: var(--text2); word-break: break-all; }
.color-slot.has-name { background: var(--rose-lt); border-color: var(--rose2); }
.color-slot.has-name .slot-nick { color: var(--rose2); font-weight: 700; }
.action-btn.premium {
  background: linear-gradient(135deg, var(--gold), #e8c678);
  color: #fff; border: none; padding: 10px; border-radius: 8px; width: 100%;
  margin-top: 8px; cursor: pointer; font-weight: bold; font-family:'Noto Sans KR',sans-serif;
  box-shadow: 0 3px 10px rgba(212,168,83,.3); transition: all 0.2s ease;
}
.action-btn.premium:hover { opacity: 0.9; transform: translateY(-1px); }
.action-btn.premium:active { transform: scale(0.97); }

/* ── 애정도 바 ── */
.affection-bar{height:5px;background:rgba(232,83,122,.12);border-radius:99px;overflow:hidden;margin-top:3px;}
.affection-fill{height:100%;background:linear-gradient(90deg,#F06292,var(--rose2));border-radius:99px;transition:width .5s ease;}

/* ── 장미꽃 알림판 스크롤 ── */
.mutual-roses-scroll{max-height:320px;overflow-y:auto;padding-right:2px;}
.mutual-roses-scroll::-webkit-scrollbar{width:3px;}
.mutual-roses-scroll::-webkit-scrollbar-thumb{background:var(--rose-lt);border-radius:99px;}

/* ── 2세 육아 케어 그리드 ── */
.baby-care-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.baby-care-item{
  border:1.5px solid var(--border);border-radius:12px;
  background:white;padding:12px 10px;text-align:center;
  cursor:pointer;transition:all .15s;
}
.baby-care-item:hover{border-color:var(--rose);background:var(--rose-lt);transform:translateY(-2px);}
.baby-care-item:active{transform:scale(.97);}

/* ── 던전 / 배틀 UI ── */
.dungeon-floor-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.dungeon-floor-card{border:1.5px solid var(--border);border-radius:12px;background:white;padding:12px 10px;text-align:center;cursor:pointer;transition:all .15s;}
.dungeon-floor-card:hover{border-color:var(--rose);background:var(--rose-lt);transform:translateY(-2px);}
.dungeon-floor-card.locked{opacity:.45;cursor:not-allowed;pointer-events:none;}
.hp-bar{height:10px;background:#FFCDD2;border-radius:99px;overflow:hidden;}
.hp-fill{height:100%;background:linear-gradient(90deg,#EF5350,#E53935);border-radius:99px;transition:width .4s ease;}
.mp-bar{height:10px;background:#BBDEFB;border-radius:99px;overflow:hidden;}
.mp-fill{height:100%;background:linear-gradient(90deg,#42A5F5,#1E88E5);border-radius:99px;transition:width .4s ease;}
.sp-bar{height:8px;background:#E1BEE7;border-radius:99px;overflow:hidden;}
.sp-fill{height:100%;background:linear-gradient(90deg,#AB47BC,#8E24AA);border-radius:99px;transition:width .4s ease;}
.battle-log{max-height:130px;overflow-y:auto;font-size:12px;line-height:1.7;color:var(--text2);padding:6px 8px;background:rgba(0,0,0,.02);border-radius:8px;border:1px solid var(--border);}
.battle-log::-webkit-scrollbar{width:3px;}
.battle-log::-webkit-scrollbar-thumb{background:var(--rose-lt);}
.skill-btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.dice-stat-box{background:white;border:1.5px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.dice-stat-box .val{font-size:20px;font-weight:700;color:var(--rose2);}
.dice-stat-box .lbl{font-size:10.5px;color:var(--text3);margin-top:2px;}

/* ── 등급별 펫 글로우 효과 (3D 퀄리티) ── */
.glow-normal  { box-shadow: 0 0 15px rgba(158,158,158,.3), var(--shadow); }
.glow-rare    { box-shadow: 0 0 25px rgba(33,150,243,.5), 0 0 60px rgba(33,150,243,.15), var(--shadow); }
.glow-epic    { box-shadow: 0 0 30px rgba(156,39,176,.6), 0 0 80px rgba(156,39,176,.2), var(--shadow); }
.glow-unique  { box-shadow: 0 0 35px rgba(255,87,34,.7), 0 0 90px rgba(255,87,34,.25), var(--shadow); }
.glow-legend  { box-shadow: 0 0 40px rgba(244,67,54,.8), 0 0 100px rgba(244,67,54,.3), var(--shadow); }
.glow-rebirth { box-shadow: 0 0 50px rgba(255,215,0,1), 0 0 120px rgba(255,165,0,.6), 0 0 200px rgba(255,100,0,.3); animation: rebirthPulse 2s ease-in-out infinite; }
@keyframes rebirthPulse { 0%,100%{box-shadow:0 0 50px rgba(255,215,0,1),0 0 120px rgba(255,165,0,.6);} 50%{box-shadow:0 0 70px rgba(255,215,0,1),0 0 160px rgba(255,165,0,.8),0 0 250px rgba(255,100,0,.5);} }

/* ── 장착 아이템 슬롯 ── */
.equip-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:10px; }
.equip-slot { border:1.5px solid var(--border); border-radius:10px; background:white; padding:8px 6px; text-align:center; cursor:pointer; transition:all .15s; min-height:64px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
.equip-slot:hover { border-color:var(--rose); background:var(--rose-lt); transform:translateY(-2px); }
.equip-slot.filled { background:linear-gradient(135deg,rgba(232,83,122,.06),rgba(155,89,182,.06)); border-color:var(--rose2); }
.equip-slot .slot-emoji { font-size:24px; }
.equip-slot .slot-name { font-size:9px; color:var(--text3); }
.equip-slot .slot-item { font-size:10.5px; font-weight:600; color:var(--text1); }
.grade-normal  { color:#9E9E9E !important; }
.grade-rare    { color:#2196F3 !important; }
.grade-epic    { color:#9C27B0 !important; }
.grade-unique  { color:#FF5722 !important; }
.grade-legend  { color:#F44336 !important; }
.grade-god     { color:#FFD700 !important; }

/* ── 하우스 3D 컨테이너 ── */
.house-canvas-wrap { width:100%; height:360px; border-radius:14px; overflow:hidden; position:relative; background:#1a1a2e; }
.house-canvas-wrap canvas { display:block; width:100% !important; height:100% !important; }
.house-ctrl-hint { position:absolute; bottom:10px; right:10px; font-size:10px; color:rgba(255,255,255,.5); background:rgba(0,0,0,.3); padding:3px 8px; border-radius:99px; pointer-events:none; }
.house-tier-card { border:1.5px solid var(--border); border-radius:10px; background:white; padding:10px; text-align:center; cursor:pointer; transition:all .15s; }
.house-tier-card:hover { border-color:var(--rose); background:var(--rose-lt); transform:translateY(-2px); }
.house-tier-card.current { border-color:var(--rose2); background:var(--rose-lt); }
.furniture-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.furniture-item { border:1.5px solid var(--border); border-radius:10px; background:white; padding:10px 8px; text-align:center; cursor:pointer; transition:all .15s; }
.furniture-item:hover { border-color:var(--rose); background:var(--rose-lt); transform:translateY(-2px); }

/* ── 선물함 ── */
.gift-card { display:flex; align-items:center; gap:10px; padding:10px 12px; border:1.5px solid var(--border); border-radius:10px; background:white; margin-bottom:6px; }
.gift-card.unread { background:var(--rose-lt); border-color:var(--border2); }
.gift-unread-dot { width:8px; height:8px; background:var(--rose); border-radius:50%; flex-shrink:0; animation:pulse 1.5s infinite; }

/* ── 환생 ── */
.rebirth-btn { width:100%; padding:14px; font-size:15px; font-family:'Noto Sans KR',sans-serif; background:linear-gradient(135deg,#FF6B35,#FFD700,#FF6B35); background-size:200% 100%; color:white; border:none; border-radius:12px; cursor:pointer; font-weight:700; animation:shimmerBtn 2s linear infinite; box-shadow:0 4px 20px rgba(255,107,53,.5); }
@keyframes shimmerBtn { 0%{background-position:0% 0%} 100%{background-position:200% 0%} }
.rebirth-badge { display:inline-flex; align-items:center; gap:4px; background:linear-gradient(135deg,#FF6B35,#FFD700); color:white; padding:2px 10px; border-radius:99px; font-size:11px; font-weight:700; }

/* ── 던전 쿨타임 ── */
.dungeon-cooltime { display:flex; align-items:center; gap:10px; padding:12px 14px; background:linear-gradient(135deg,rgba(255,87,34,.08),rgba(255,152,0,.06)); border:1.5px solid rgba(255,87,34,.25); border-radius:12px; margin-bottom:12px; }
.cooltime-timer { font-size:22px; font-weight:700; color:#E64A19; font-variant-numeric:tabular-nums; }

/* ── 향상된 펫 카드 ── */
.pet-card-3d { background:linear-gradient(160deg,rgba(253,238,244,.98),rgba(240,230,255,.98)); border-radius:20px; padding:1.5rem; text-align:center; position:relative; overflow:hidden; }
.pet-card-3d::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle at 60% 40%, rgba(232,83,122,.08) 0%, transparent 50%); pointer-events:none; }
.pet-emoji-3d { font-size:80px; display:block; margin:0 auto 8px; filter:drop-shadow(0 8px 16px rgba(232,83,122,.3)); animation:float3d 3s ease-in-out infinite; }

/* ── 랭킹 모드 탭 ── */

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function todayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function shortNick(n){return(n||"").split("/")[0].trim();}
function getMBTICompat(t1,t2){const i=TYPES.indexOf(t1),j=TYPES.indexOf(t2);return(i>=0&&j>=0)?COMPAT[i][j]:null;}
function calcMBTI(ans){
  const c={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  QS.forEach(q=>{const a=ans[q.id];if(a===undefined)return;if(a>0)c[q.p]+=a;else if(a<0)c[OPP[q.p]]+=Math.abs(a);});
  return`${c.E>=c.I?"E":"I"}${c.S>=c.N?"S":"N"}${c.T>=c.F?"T":"F"}${c.J>=c.P?"J":"P"}`;
}
function calcPctCompat(e1,e2,questions){
  let match=0,total=0;
  questions.forEach(q=>{const v1=e1.answers?.[q.id],v2=e2.answers?.[q.id];if(v1!==undefined&&v2!==undefined){total++;if(v1===v2)match++;}});
  return total>0?Math.round((match/total)*100):null;
}
function pctLabel(pct){
  if(pct>=90)return"취향이 거의 같아요! 천생연분 💘";
  if(pct>=70)return"취향이 잘 맞아요! 아주 좋아요 💕";
  if(pct>=50)return"반반이에요! 다른 점이 매력포인트 🌸";
  if(pct>=30)return"조금 달라요... 노력이 필요해 💪";
  return"정반대예요! 신기한 인연 😅";
}
function determinePet(mbti,balAnswers){
  let spicy=0;
  if(balAnswers){if(balAnswers[8]==="A")spicy++;if(balAnswers[16]==="B")spicy++;if(balAnswers[3]==="B")spicy++;}
  if(spicy>=2)return{e:'😈',n:'악동몬',d:'매운맛 유전자! 뿔 달린 악동 몬스터 계열'};
  return PET_BY_MBTI[mbti]||{e:'🐾',n:'러브몬',d:'신비로운 인연의 펫'};
}
function getPetEvolution(level, isBred, iconOverride) {
  if (isBred && iconOverride) return { stage: "전설의 훈련사", icon: iconOverride };
  if (level < 5) return { stage: "유아기", icon: "🌱 (유아기)" };
  if (level < 10) return { stage: "성장기", icon: "🌿🌸 (성장기)" };
  if (level < 15) return { stage: "청소년기", icon: "🌺🦋 (청소년기)" };
  return { stage: "베테랑 훈련사", icon: "👑🧚‍♀️✨ (베테랑)" };
}
function lvLabel(lv){
  if(lv>=MAX_LV)return'👑🧚‍♀️✨ 베테랑 훈련사';
  if(lv>=10)return`🌺🦋 청소년기 Lv.${lv}`;
  if(lv>=5)return`🌿🌸 성장기 Lv.${lv}`;
  return`🌱 유아기 Lv.${lv}`;
}
function getVisualEmoji(pet) {
  if (pet.isBred) return pet.petEmoji;
  if (pet.level >= MAX_LV) return pet.petEmoji + "✨";
  if (pet.level >= 10) return pet.petEmoji + "🌸";
  if (pet.level >= 5) return pet.petEmoji + "🌿";
  return pet.petEmoji + "🌱";
}
/* ★ 환생 횟수별 이름 색상 */
function getRebirthColor(count){
  if(!count||count<=0) return 'var(--rose2)';
  if(count<=2)  return '#2196F3'; /* 파랑 */
  if(count<=5)  return '#9C27B0'; /* 보라 */
  if(count<=9)  return '#FF5722'; /* 주황 */
  if(count<=14) return '#F44336'; /* 빨강 */
  return '#FFD700';               /* 황금 15회+ */
}
function getRebirthGlow(count){
  if(!count||count<=0) return '';
  if(count<=2)  return 'glow-rare';
  if(count<=5)  return 'glow-epic';
  if(count<=9)  return 'glow-unique';
  if(count<=14) return 'glow-legend';
  return 'glow-rebirth';
}
function formatDateKo(dateStr){
  if(!dateStr)return'';
  const parts=dateStr.split('-');
  if(parts.length===3)return`${parts[1]}/${parts[2]}`;
  return dateStr;
}
function msToHM(ms){
  const h=Math.floor(ms/3600000);
  const m=Math.floor((ms%3600000)/60000);
  if(h>0)return`${h}시간 ${m}분`;
  return`${m}분`;
}

/* ═══════════════════════════════════════

function load(){
  S.loading=true;render();
  try{
    mbtiCol.orderBy("timestamp","desc").onSnapshot(snap=>{
      S.entries=snap.docs.map(d=>({id:d.id,...d.data()}));
      S.loading=false;
      if(S.screen==="board"||S.screen==="home")render();
    });
    balCol.orderBy("timestamp","desc").onSnapshot(snap=>{
      S.balEntries=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(S.screen==="board"&&S.tab==="compat")render();
    });
    datCol.orderBy("timestamp","desc").onSnapshot(snap=>{
      S.datEntries=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(S.screen==="board"&&S.tab==="compat")render();
    });
    const today=todayStr();
    roseCol.where("date","==",today).onSnapshot(snap=>{
      S.roseEntries=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(S.screen==="board")render();
    });
    mutualCol.orderBy("timestamp","desc").limit(50).onSnapshot(snap=>{
      S.mutualRoses=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(S.screen==="board"&&S.tab==="rose")render();
    });
    /* 러브몬 리스너 */
    petCol.orderBy("timestamp","desc").onSnapshot(snap=>{
      S.petEntries=snap.docs.map(d=>({id:d.id,...d.data()}));
      const myNick=S.myEntry?.nick;
      if(myNick){
        const found=S.petEntries.find(p=>p.nick===myNick);
        if(found){S.myPet=found;localStorage.setItem("lmg_pet",JSON.stringify(found));}
      }
      if(S.screen==="board"&&S.tab==="lm_pet")render();
    });
    /* 색상표 리스너 */
    gameStateCol.doc("color_chart").onSnapshot(snap => {
      if (snap.exists) S.colorSlots = snap.data();
      else S.colorSlots = {};
      if (S.screen === "board" && S.tab === "lm_colors") render();
    });
    gameStateCol.doc("chosung_current").onSnapshot(async snap=>{
      S.chosungState = snap.exists ? snap.data() : null;
      const state = S.chosungState;
      if(state?.solvedBy && !window.__nextQuestionRunning){
        window.__nextQuestionRunning = true;
        setTimeout(async()=>{
          try{
            const latestSnap = await gameStateCol.doc("chosung_current").get();
            if(!latestSnap.exists){window.__nextQuestionRunning = false;return;}
            const latest = latestSnap.data();
            if(latest.solvedBy){
              /* ★ 랜덤 문제 + 현재 퀴즈 타입 유지 */
              await startQuizQuestion(S.quizMode||latest.type||'chosung', latest.answer);
            }
          }catch(e){ console.error(e); }
          window.__nextQuestionRunning = false;
        },3000);
      }
      if(S.screen==="board" && S.tab==="lm_plaza"){ render(); }
    });
    chatCol.orderBy("timestamp","desc").limit(40).onSnapshot(snap=>{
      S.chosungChat=snap.docs.map(d=>({id:d.id,...d.data()})).reverse();
      if(S.screen==="board"&&S.tab==="lm_plaza"){
        const feed=document.getElementById("lm_chat_feed");
        if(feed){feed.innerHTML=renderChatMessages();feed.scrollTop=feed.scrollHeight;}
        else render();

  if(todaySent.some(r=>r.receiver===receiverNick)){alert("이미 이 분께 장미꽃을 보냈어요 💕");return;}
  try{
    const roseData={sender:senderNick,sender_gender:senderGender,receiver:receiverNick,receiver_gender:receiverGender,date:today};

    const mutual=S.roseEntries.find(r=>r.sender===receiverNick&&r.receiver===senderNick&&r.date===today);

async function initOrLoadPet(nick,gender,mbti,balAnswers){
  if(!nick)return;

    if(snap.exists){
      S.myPet={id:snap.id,...snap.data()};
      localStorage.setItem("lmg_pet",JSON.stringify(S.myPet));

    }
    const petInfo=determinePet(mbti,balAnswers);
    const petData={
      nick,gender,mbti,
      petEmoji:petInfo.e,petName:petInfo.n,petDesc:petInfo.d,
      level:1,xp:0,points:100, isBred:false,
      lastLogin:todayStr(),loginStreak:1,
      nameChangeCount:0,
      affectionMap:{},
      iq:100, /* ★ 초기 IQ */
    };
    await petCol.doc(nick).set({...petData,timestamp:TS()});
    S.myPet={id:nick,...petData};
    localStorage.setItem("lmg_pet",JSON.stringify(S.myPet));
    alert(`🥚 ${petInfo.e} 러브몬 [${petInfo.n}]이 탄생했습니다!\n신규 가입 보너스 100P도 드려요! 💕`);
    render();
  }catch(e){console.error(e);}
}

async function addPoints(nick,amount){

    await petCol.doc(nick).update({points:INC(amount)});
    if(S.myPet?.nick===nick)S.myPet.points=(S.myPet.points||0)+amount;
  }catch(e){console.error(e);}
}

async function checkAndLevelUp(nick){
  try{
    const snap=await petCol.doc(nick).get();
    if(!snap.exists)return;
    const data=snap.data();
    let lv=data.level||1;
    let xp=data.xp||0;
    let leveled=false;
    let levelsGained=0;
    /* ★ 안전장치: 이미 MAX_LV 초과 시 강제 캡 */
    if(lv>MAX_LV){
      await petCol.doc(nick).update({level:MAX_LV,xp:0});
      if(S.myPet?.nick===nick){S.myPet.level=MAX_LV;S.myPet.xp=0;}
      return;
    }
    while(xp>=XP_PER_LV && lv<MAX_LV){
      lv++;xp-=XP_PER_LV;leveled=true;levelsGained++;
    }
    /* ★ 안전장치: while 이후에도 캡 보장 */
    lv=Math.min(lv,MAX_LV);
    if(leveled){
      await petCol.doc(nick).update({level:lv, xp:xp});
      if(S.myPet?.nick===nick){S.myPet.level=lv;S.myPet.xp=xp;}
      if(S.myEntry?.nick===nick){
        alert(
          `🎉 레벨 업! Lv.${lv} 달성!`+
          (levelsGained>1?` (${levelsGained}단계 연속 상승! 🔥)`:"")+
          (lv===MAX_LV?"\n✨ 성체 달성!":"")
        );
      }
    }
  }catch(e){console.error(e);}
}

/* ★ 애정도 시스템 (신규) - affectionMap 상호 적립 */
async function growAffection(myNick, targetNick, amount){
  try{
    await petCol.doc(myNick).update({[`affectionMap.${targetNick}`]:INC(amount)});
    await petCol.doc(targetNick).update({[`affectionMap.${myNick}`]:INC(amount)});
    if(S.myPet?.nick===myNick){
      if(!S.myPet.affectionMap)S.myPet.affectionMap={};
      S.myPet.affectionMap[targetNick]=(S.myPet.affectionMap[targetNick]||0)+amount;
    }
  }catch(e){console.error(e);}
}

async function feedPet(itemId, targetNick = null){
  const item=MARKET_ITEMS.find(i=>i.id===itemId);
  if(!item)return;
  const myNick=S.myPet?.nick||S.myEntry?.nick;
  if(!myNick){alert("MBTI 검사를 완료 후 이용해주세요!");return;}
  if(!S.myPet){alert("먼저 러브몬을 생성해주세요!");return;}
  if((S.myPet.points||0)<item.cost){alert(`포인트가 부족합니다! (필요: ${item.cost}P, 보유: ${S.myPet.points||0}P)`);return;}

  const isSelf=!targetNick||targetNick===myNick;
  const feedTarget=isSelf?myNick:targetNick;

  if(!confirm(`${item.emoji} ${item.name}을(를) ${isSelf?'내':'상대방'} 펫에게 주시겠습니까? (-${item.cost}P)${!isSelf?' — 호감도 +10도 올라요! 💕':''}`))return;

  try{
    await petCol.doc(myNick).update({points:INC(-item.cost)});
    S.myPet.points=(S.myPet.points||0)-item.cost;
    if(item.xp>0){
      await petCol.doc(feedTarget).update({xp:INC(item.xp)});
      if(isSelf){S.myPet.xp=(S.myPet.xp||0)+item.xp;}
      await checkAndLevelUp(feedTarget);
    }
    await feedLogCol.add({from:myNick,to:feedTarget,item:item.name,emoji:item.emoji,xp:item.xp,timestamp:TS()});
    /* ★ 다른 펫에게 먹이 줄 때 호감도 +10 */
    if(!isSelf){
      await growAffection(myNick, feedTarget, 10);
      /* ★ 선물 알림 */
      await sendGiftNotification(feedTarget,'feed',item.name,item.emoji);
    }
    const msg=isSelf?`${item.emoji} ${item.name} 급여 완료! XP +${item.xp}`:`${item.emoji} ${targetNick}님 펫에게 ${item.name}을 선물했습니다! 호감도 +10 🎁`;
    alert(msg);render();
  }catch(e){console.error(e);alert("오류가 발생했습니다.");}
}

/* ★ 2세 액티비티 (부화 후) */
async function doBabyActivity(babyId, actId){
  const myNick=S.myEntry?.nick;
  if(!myNick||!S.myPet){alert("MBTI 검사 완료 후 이용해주세요!");return;}
  const act=BABY_ACTIVITIES.find(a=>a.id===actId);
  if(!act)return;
  const baby=S.babyPets.find(b=>b.id===babyId);
  if(!baby){alert("아기 러브몬을 찾을 수 없어요.");return;}
  if((S.myPet.points||0)<act.cost){alert(`포인트 부족! (필요: ${act.cost}P, 보유: ${S.myPet.points||0}P)`);return;}
  if(!confirm(`${act.emoji} ${act.label}\n${act.desc}\n(-${act.cost}P)`))return;
  try{
    /* 포인트 차감 */
    await petCol.doc(myNick).update({points:INC(-act.cost)});
    S.myPet.points=(S.myPet.points||0)-act.cost;

    let newXp=(baby.babyXp||0)+(act.xp||0);
    let newLv=baby.babyLevel||1;
    let leveled=false;
    while(newXp>=XP_PER_LV&&newLv<MAX_LV){newLv++;newXp-=XP_PER_LV;leveled=true;}

    const babyUpdate={babyXp:newXp,babyLevel:newLv};
    let resultMsg=`${act.emoji} ${act.label} 완료!${act.xp?` XP +${act.xp}`:''}`;

    /* 타입별 추가 효과 */
    if(act.type==='hp'){
      const newHp=(baby.babyStats?.maxHp||0)+(act.val||10);
      babyUpdate['babyStats.maxHp']=newHp;
      resultMsg+=`\n💗 최대 HP 영구 +${act.val}!`;
    } else if(act.type==='stat'){
      const statNames=['힘','마력','민첩','지능','매력'];
      const rStat=statNames[Math.floor(Math.random()*statNames.length)];
      const curVal=(baby.babyStats?.[rStat]||10)+(act.val||5);
      babyUpdate[`babyStats.${rStat}`]=curVal;
      resultMsg+=`\n📊 ${rStat} 영구 +${act.val}!`;
    } else if(act.type==='drop'){
      const bonus=Math.floor(Math.random()*100)+50;
      await petCol.doc(myNick).update({points:INC(bonus)});
      S.myPet.points+=bonus;
      resultMsg+=`\n💰 산책 중 ${bonus}P 발견!`;
    } else if(act.type==='bond'){
      /* 부모 양쪽 애정도 +5 */
      const partner=baby.parent1Nick===myNick?baby.parent2Nick:baby.parent1Nick;
      if(partner)await growAffection(myNick,partner,5);
      resultMsg+=`\n💕 ${partner}님과 애정도 +5!`;
    }

    /* 로그 추가 */
    const feedLog=[...(baby.feedLog||[])];
    feedLog.push({nick:shortNick(myNick),activity:act.label,xp:act.xp||0,time:Date.now()});
    babyUpdate.feedLog=feedLog.slice(-30);

    await babyPetCol.doc(babyId).update(babyUpdate);
    if(baby){baby.babyXp=newXp;baby.babyLevel=newLv;}

    if(leveled)resultMsg+=`\n🎉 레벨업! Lv.${newLv} 달성!`;
    alert(resultMsg);render();
  }catch(e){console.error(e);alert("오류가 발생했습니다.");}
}
function rollDiceStats(){
  /* ★ 환생 횟수당 +20 보너스 */
  const rb=(S.myPet?.rebirthCount||0)*REBIRTH_DICE_BONUS;
  return{
    hp:  Math.floor(Math.random()*151)+50+rb,
    mp:  Math.floor(Math.random()*121)+30+rb,
    atk: Math.floor(Math.random()*41)+10+rb,
    def: Math.floor(Math.random()*26)+5+rb,
    eva: Math.min(40,Math.floor(Math.random()*21)+5+Math.floor(rb/4)),
  };
}
function getScaledStats(pet){
  const d=pet.diceStats||{hp:80,mp:50,atk:15,def:8,eva:10};
  const lv=pet.level||1;
  return{
    maxHp: Math.round(d.hp+(lv-1)*12),
    maxMp: Math.round(d.mp+(lv-1)*6),
    atk:   Math.round(d.atk+(lv-1)*3),
    def:   Math.round(d.def+(lv-1)*2),
    eva:   Math.min(75,Math.round(d.eva+(lv-1)*0.5)),
    maxSp: 100,
  };
}
/* ★ 장착 아이템 포함 최종 스탯 */
function getEquippedStats(pet){
  const base=getScaledStats(pet);
  const eq=pet.equipment||{};
  Object.values(eq).forEach(item=>{
    if(!item?.stats)return;
    if(item.stats.atk) base.atk   +=item.stats.atk;
    if(item.stats.def) base.def   +=item.stats.def;
    if(item.stats.hp)  base.maxHp +=item.stats.hp;
    if(item.stats.mp)  base.maxMp +=item.stats.mp;
    if(item.stats.eva) base.eva=Math.min(75,base.eva+item.stats.eva);
  });
  return base;
}
async function rerollDice(){
  const myNick=S.myEntry?.nick;
  if(!myNick||!S.myPet){alert("MBTI 검사 완료 후 이용해주세요!");return;}
  const isFirst=!S.myPet.diceStats;
  const cost=isFirst?0:500; /* ★ 500P로 변경 */
  if(cost>0&&(S.myPet.points||0)<cost){alert("포인트가 부족합니다! (필요: 500P)");return;}
  if(!confirm(`🎲 주사위를 굴려 기본 스탯을 결정합니다!\n${isFirst?'첫 번째 굴림은 무료예요! 🎁':'추가 굴림은 500P 차감됩니다.'}\n\n결과는 랜덤이며 레벨에 비례해 성장합니다.`))return;
  const newStats=rollDiceStats();
  const scaled=getScaledStats({...S.myPet,diceStats:newStats});

  /* ★ DB용(INC 포함)과 로컬용(순수 숫자)을 분리 → points가 NaN되는 버그 수정 */
  const dbData={
    diceStats:newStats,
    currentHp:scaled.maxHp,
    currentMp:scaled.maxMp,
    currentSp:100,
    inventory:S.myPet.inventory||{},
  };
  if(cost>0) dbData.points=INC(-cost); /* Firestore 전용 — 로컬에 spread 금지 */

  try{
    await petCol.doc(myNick).update(dbData);
    /* 로컬 S.myPet은 INC 객체 없이 직접 숫자로 갱신 */
    S.myPet.diceStats=newStats;
    S.myPet.currentHp=scaled.maxHp;
    S.myPet.currentMp=scaled.maxMp;
    S.myPet.currentSp=100;
    if(cost>0) S.myPet.points=(S.myPet.points||0)-cost;
    alert(`🎲 주사위 결과!\nHP ${newStats.hp} · MP ${newStats.mp} · ATK ${newStats.atk} · DEF ${newStats.def} · EVA ${newStats.eva}%\n(레벨 성장으로 추가 증가해요 📈)`);
    render();
  }catch(e){console.error(e);alert("오류가 발생했습니다.");}
}

  const item=POTION_ITEMS.find(i=>i.id===itemId);

  const myNick=S.myEntry?.nick;
  if(!myNick||!S.myPet){alert("MBTI 검사 완료 후 이용해주세요!");return;}
  if((S.myPet.points||0)<item.cost){alert(`포인트가 부족합니다! (필요: ${item.cost}P)`);return;}
  if(!confirm(`${item.emoji} ${item.name}을 구입하겠습니까? (-${item.cost}P)`))return;
  try{
    const inv=S.myPet.inventory||{};
    inv[itemId]=(inv[itemId]||0)+1;
    await petCol.doc(myNick).update({points:INC(-item.cost),inventory:inv});
    S.myPet.points=(S.myPet.points||0)-item.cost;
    S.myPet.inventory=inv;
    alert(`${item.emoji} ${item.name} 구입 완료! (보유: ${inv[itemId]}개)`);
    render();
  }catch(e){console.error(e);}
}

function startDungeon(floorIdx, mobIdx){
  const myPet=S.myPet;
  if(!myPet){alert("펫이 없어요!");return;}
  if(!myPet.diceStats){alert("먼저 주사위를 굴려 기본 스탯을 설정해주세요! 🎲");return;}
  /* ★ 쿨타임 체크 (5층 전부 클리어 후 시작) */
  const cooldownStart=myPet.dungeonCooldownStart||0;
  const cooldownEnd=cooldownStart+DUNGEON_COOLDOWN_MS;
  if(Date.now()<cooldownEnd){
    const rem=cooldownEnd-Date.now();
    alert(`⏳ 던전 쿨타임 중!\n1~5층을 모두 클리어해서 발동된 쿨타임이에요.\n${Math.ceil(rem/60000)}분 ${Math.ceil((rem%60000)/1000)}초 후 다시 입장 가능합니다.`);
    return;
  }
  /* ★ 해당 층 이미 클리어했는지 체크 */
  const kills=myPet.dungeonKills||{};
  const floorNum=floorIdx+1;
  if(kills[floorNum]){
    if(!confirm(`${floor.emoji} ${floorNum}층은 이번 라운드에 이미 클리어했어요!\n\n🏆 클리어 현황: ${DUNGEON_ALL_FLOORS.map(f=>`${f}층 ${kills[f]?'✅':'❌'}`).join(' ')}\n\n다시 입장하겠습니까? (기록에는 반영되지 않아요)`))return;
  }
  const floor=DUNGEON_FLOORS[floorIdx];
  const mob={...floor.mobs[mobIdx]};
  /* ★ 장착 아이템 포함 스탯 */
  const scaled=getEquippedStats(myPet);
  const curHp=Math.min(myPet.currentHp??scaled.maxHp,scaled.maxHp);
  const curMp=Math.min(myPet.currentMp??scaled.maxMp,scaled.maxMp);
  const curSp=myPet.currentSp??100;
  const myNick=S.myEntry?.nick;
  const hatchedBaby=S.babyPets.find(b=>b.hatched&&(b.parent1Nick===myNick||b.parent2Nick===myNick));
  /* ★ 쿨타임 기록 제거 (finalizeDungeon에서 처리) */
  S.dungeonState={
    active:true,floorIdx,mobIdx,
    floorName:floor.name,floorEmoji:floor.emoji,
    mob:{...mob},mobCurrentHp:mob.hp,
    playerHp:curHp,playerMaxHp:scaled.maxHp,
    playerMp:curMp,playerMaxMp:scaled.maxMp,
    playerSp:curSp,playerMaxSp:100,
    defBoost:1,evaBoost:1,
    log:[`⚔️ ${floor.emoji} ${floor.name} ${floorIdx+1}층에 입장!`,`👾 ${mob.emoji} ${mob.name} 등장! (HP ${mob.hp})`],
    turn:1,won:false,lost:false,totalXp:0,totalPts:0,
    baby:hatchedBaby,babyCooldown:0,
    inventory:{...myPet.inventory||{}},
  };
  render();
}

function calcDmg(atk, def, mult=1){
  /* DEF가 아무리 높아도 ATK의 28%는 항상 관통
     DEF는 68%만 방어력으로 작용 (나머지는 관통)
     ±5 랜덤 변동 */
  const minDmg=Math.max(1,Math.round(atk*0.28*mult));
  const rawDmg=Math.round((atk-def*0.68)*mult+(Math.random()*10-5));
  return Math.max(minDmg,rawDmg);
}
function checkEva(eva){ return Math.random()*100 < eva; }

function dungeonAction(actionType, skillId){
  const ds=S.dungeonState;
  if(!ds||ds.won||ds.lost)return;
  const myPet=S.myPet;
  const scaled=getScaledStats(myPet);
  let log=[];
  let defBoostNext=1, evaBoostNext=1;

  /* ── 플레이어 행동 ── */
  if(actionType==='attack'){
    const skill=ATK_SKILLS.find(s=>s.id===skillId)||ATK_SKILLS[0];
    /* MP 체크 */
    const mpCost=skill.mp||0;
    if(mpCost>0&&ds.playerMp<mpCost){
      alert(`MP가 부족합니다! (필요: ${mpCost}MP, 보유: ${ds.playerMp}MP)`);return;
    }
    ds.playerMp=Math.max(0,ds.playerMp-mpCost);

    /* 크리티컬 확정 or 랜덤 */
    const isCrit=skill.id==='crit'||Math.random()<0.12;
    const mult=skill.dmgMult*(isCrit&&skill.id!=='crit'?1.5:1);
    const dmg=calcDmg(scaled.atk, ds.mob.def, mult);
    ds.mobCurrentHp=Math.max(0,ds.mobCurrentHp-dmg);
    log.push(`${skill.emoji} ${skill.name}! ${ds.mob.emoji}에게 ${dmg} 피해${isCrit&&skill.id!=='crit'?' ⚡크리!':''} (남은 HP: ${ds.mobCurrentHp})`);
  }
  else if(actionType==='defense'){
    const skill=DEF_SKILLS.find(s=>s.id===skillId);
    if(!skill)return;
    const mpCost=skill.mp||0;
    if(mpCost>0&&ds.playerMp<mpCost){alert(`MP 부족! (필요 ${mpCost}MP, 보유 ${ds.playerMp}MP)`);return;}
    ds.playerMp=Math.max(0,ds.playerMp-mpCost);

    if(skill.id==='guard'){defBoostNext=skill.defMult;log.push(`${skill.emoji} 철벽 가드! 방어력 ${skill.defMult}배 (이번 턴)`);}
    else if(skill.id==='dodge'){evaBoostNext=skill.evaMult;log.push(`${skill.emoji} 회피 강화! 회피율 ${skill.evaMult}배 (이번 턴)`);}
    else if(skill.id==='heal'){
      const healAmt=Math.round(ds.playerMaxHp*skill.healPct);
      ds.playerHp=Math.min(ds.playerMaxHp,ds.playerHp+healAmt);
      log.push(`${skill.emoji} 자가 치유! HP +${healAmt} (현재 ${ds.playerHp}/${ds.playerMaxHp})`);
    }
  }
  else if(actionType==='potion'){
    const item=POTION_ITEMS.find(i=>i.id===skillId);
    if(!item)return;
    const cnt=ds.inventory[skillId]||0;
    if(cnt<=0){alert("물약이 없어요! 상점에서 구입해주세요 🧪");return;}
    ds.inventory[skillId]=cnt-1;
    if(item.hp){ds.playerHp=Math.min(ds.playerMaxHp,ds.playerHp+item.hp);log.push(`${item.emoji} HP +${item.hp} 회복! (현재 ${ds.playerHp}/${ds.playerMaxHp})`);}
    if(item.mp){ds.playerMp=Math.min(ds.playerMaxMp,ds.playerMp+item.mp);log.push(`${item.emoji} MP +${item.mp} 회복! (현재 ${ds.playerMp}/${ds.playerMaxMp})`);}
  }
  else if(actionType==='baby'){
    /* 2세 펫 지원 */
    if(ds.babyCooldown>0){alert(`2세 펫은 ${ds.babyCooldown}턴 후 다시 지원 가능해요!`);return;}
    const baby=ds.baby;
    if(!baby){alert("지원 가능한 2세 펫이 없어요!");return;}
    const babyAtk=(baby.babyStats?.힘||10)+(baby.babyLevel||1)*2;
    const babyDmg=calcDmg(babyAtk,ds.mob.def,1.2);
    ds.mobCurrentHp=Math.max(0,ds.mobCurrentHp-babyDmg);
    const babyHeal=Math.round(ds.playerMaxHp*0.08);
    ds.playerHp=Math.min(ds.playerMaxHp,ds.playerHp+babyHeal);
    ds.babyCooldown=3;
    log.push(`🍼 ${baby.babyEmoji||'🐣'} 2세 지원! 적 ${babyDmg} 피해 + HP +${babyHeal} 회복!`);
  }
  else if(actionType==='flee'){
    if(!confirm("던전에서 도망칩니다. 이번 전투 보상은 없어요."))return;
    S.dungeonState=null;render();return;
  }

  /* ── 몹이 죽었는지 체크 ── */
  if(ds.mobCurrentHp<=0){
    ds.won=true;
    ds.totalXp+=ds.mob.xp;
    ds.totalPts+=ds.mob.pts;
    log.push(`🎉 ${ds.mob.emoji} ${ds.mob.name} 처치! XP +${ds.mob.xp} · 포인트 +${ds.mob.pts}`);
    ds.log=[...ds.log,...log];
    setTimeout(()=>finalizeDungeon(true),800);
    render();return;
  }

  /* ── 몹 공격 턴 ── */
  const defEff=Math.round(scaled.def*defBoostNext);
  const evaEff=Math.min(75,Math.round(scaled.eva*evaBoostNext));
  if(checkEva(evaEff)){
    log.push(`💨 회피 성공! ${ds.mob.emoji}의 공격을 피했어요!`);
  }else{
    const mobDmg=calcDmg(ds.mob.atk, defEff);
    ds.playerHp=Math.max(0,ds.playerHp-mobDmg);
    log.push(`${ds.mob.emoji} ${ds.mob.name} 공격! ${mobDmg} 피해 (남은 HP: ${ds.playerHp}/${ds.playerMaxHp})`);
  }

  /* 2세 쿨다운 감소 */
  if(ds.babyCooldown>0)ds.babyCooldown--;

  /* ── 플레이어가 죽었는지 체크 ── */
  if(ds.playerHp<=0){
    ds.lost=true;
    log.push(`💀 ${myPet.petName}이(가) 쓰러졌어요...`);
    ds.log=[...ds.log,...log];
    setTimeout(()=>finalizeDungeon(false),800);
    render();return;
  }

  ds.turn++;
  ds.log=[...ds.log,...log];
  if(ds.log.length>30)ds.log=ds.log.slice(-30);
  render();
}

async function finalizeDungeon(won){
  const ds=S.dungeonState;
  const myNick=S.myEntry?.nick;
  if(!myNick||!S.myPet)return;
  try{
    if(won){
      /* 보상: XP + 포인트 적립, 현재 HP/MP/SP 저장 */
      let newXp=(S.myPet.xp||0)+ds.totalXp;
      let newLv=S.myPet.level||1;
      let leveled=false;
      while(newXp>=XP_PER_LV&&newLv<MAX_LV){newLv++;newXp-=XP_PER_LV;leveled=true;}
      /* ★ 층별 킬 기록 */
      const kills={...(S.myPet.dungeonKills||{})};
      const floorNum=ds.floorIdx+1;
      kills[floorNum]=true;
      const allCleared=DUNGEON_ALL_FLOORS.every(f=>kills[f]);
      const dbUpdate={
        xp:newXp,level:newLv,points:INC(ds.totalPts),
        currentHp:ds.playerHp,currentMp:ds.playerMp,currentSp:ds.playerSp,
        inventory:ds.inventory,dungeonKills:kills,
      };
      if(allCleared){
        /* 전 층 클리어 → 쿨타임 시작 + 킬 초기화 */
        dbUpdate.dungeonKills={};
        dbUpdate.dungeonCooldownStart=Date.now();
        S.myPet.dungeonKills={};
        S.myPet.dungeonCooldownStart=Date.now();
      }else{
        S.myPet.dungeonKills=kills;
      }
      await petCol.doc(myNick).update(dbUpdate);
      S.myPet={...S.myPet,xp:newXp,level:newLv,
        points:(S.myPet.points||0)+ds.totalPts,
        currentHp:ds.playerHp,currentMp:ds.playerMp,currentSp:ds.playerSp,inventory:ds.inventory};
      const clearedStr=DUNGEON_ALL_FLOORS.map(f=>`${f}층 ${kills[f]?'✅':'❌'}`).join(' ');
      alert(`🏆 전투 승리!\n획득: XP +${ds.totalXp} · 포인트 +${ds.totalPts}${leveled?`\n🎉 레벨업! Lv.${newLv} 달성!`:''}\n\n📊 클리어 현황: ${clearedStr}${allCleared?'\n\n🔥 전 층 클리어! 5분 쿨타임 시작!':''}`);
    }else{
      /* 패배: XP -100, 포인트 -1000, HP 1로 부활 */
      const penaltyXp=Math.min(100,S.myPet.xp||0);
      const newXp=Math.max(0,(S.myPet.xp||0)-penaltyXp);
      await petCol.doc(myNick).update({
        xp:newXp, points:INC(-1000),
        currentHp:1, currentMp:ds.playerMp,
        currentSp:ds.playerSp,
      });
      S.myPet={...S.myPet,xp:newXp,
        points:Math.max(0,(S.myPet.points||0)-1000),
        currentHp:1,currentMp:ds.playerMp,currentSp:ds.playerSp};
      alert(`💀 전투 패배...\n페널티: XP -${penaltyXp} · 포인트 -1000\nHP 1로 부활했어요. 물약을 사용해 회복하세요!`);
    }
  }catch(e){console.error(e);}
  S.dungeonState=null;
  render();
}

async function equipItem(slot,itemId){
  const myNick=S.myEntry?.nick;if(!myNick||!S.myPet)return;

  const item=inv.find(i=>i.id===itemId&&i.slot===slot);if(!item)return;
  const eq={...(S.myPet.equipment||{})};

  S.myPet.equipment=eq;S.myPet.petInventory=newInv;
  alert(`✅ ${item.emoji} ${item.name} 장착!`);render();

  const item=eq[slot];
  const newInv=[...(S.myPet.petInventory||[]),item];

/* ═══════════════════════════════════════

class HouseRenderer3D{
  constructor(containerId,houseData,petEmoji){
    this.container=document.getElementById(containerId);
    if(!this.container||!window.THREE){return;}
    this.houseData=houseData;this.petEmoji=petEmoji||'🐾';
    this.meshes=[];this.isAlive=true;this.theta=0.3;this.isDrag=false;this.lastX=0;
    this.init();
  }
  emojiTexture(emoji,bg='#FDEEF4'){
    const c=document.createElement('canvas');c.width=c.height=128;
    const ctx=c.getContext('2d');
    ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(0,0,128,128,16);ctx.fill();
    ctx.font='72px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(emoji,64,68);
    return new THREE.CanvasTexture(c);
  }
  init(){
    const W=this.container.clientWidth||340,H=360;
    this.scene=new THREE.Scene();
    this.scene.background=new THREE.Color(0x1a1a2e);
    this.camera=new THREE.PerspectiveCamera(55,W/H,0.1,200);
    this.camera.position.set(0,7,14);this.camera.lookAt(0,1,0);
    this.renderer=new THREE.WebGLRenderer({antialias:true});
    this.renderer.setSize(W,H);this.renderer.shadowMap.enabled=true;
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    this.container.appendChild(this.renderer.domElement);
    this.addLighting();this.buildRoom();this.placeFurniture3D();this.addPet3D();this.addOrbit();this.animate();
  }
  addLighting(){
    this.scene.add(new THREE.AmbientLight(0xfff0f5,0.9));
    const dl=new THREE.DirectionalLight(0xffffff,0.8);
    dl.position.set(8,12,8);dl.castShadow=true;
    dl.shadow.mapSize.width=dl.shadow.mapSize.height=512;
    this.scene.add(dl);
    const pl=new THREE.PointLight(0xFF9AA2,0.6,25);pl.position.set(0,5,0);this.scene.add(pl);
  }
  buildRoom(){
    const wp=WALLPAPERS[this.houseData?.wallpaper||'rose'];
    const fl=FLOORS[this.houseData?.floor||'wood'];
    const wc=wp?.threeColor||0xFDEEF4;const fc=fl?.threeColor||0xD4A574;
    const wm=new THREE.MeshLambertMaterial({color:wc});
    const fm=new THREE.MeshLambertMaterial({color:fc});
    /* 바닥 */const floor=new THREE.Mesh(new THREE.BoxGeometry(12,0.25,10),fm);floor.position.set(0,-0.12,0);floor.receiveShadow=true;this.scene.add(floor);
    /* 뒷벽 */const bw=new THREE.Mesh(new THREE.BoxGeometry(12,6,0.25),wm);bw.position.set(0,3,-5);this.scene.add(bw);
    /* 왼벽 */const lw=new THREE.Mesh(new THREE.BoxGeometry(0.25,6,10),wm);lw.position.set(-6,3,0);this.scene.add(lw);
    /* 천장 약간 */const ceil=new THREE.Mesh(new THREE.BoxGeometry(12,0.2,10),new THREE.MeshLambertMaterial({color:0xffffff}));ceil.position.set(0,6,0);this.scene.add(ceil);
  }
  placeFurniture3D(){
    const FH={sofa:[2,0.7,0.9,0xE8537A],bed:[2,0.8,1,0xF8BBD9],plant:[0.6,1,0.6,0x4CAF50],lamp:[0.3,1.5,0.3,0xFFD700],desk:[1,0.7,0.8,0x8D6E63],aquarium:[2,1,0.5,0x29B6F6],fireplace:[2,1.5,0.5,0xBF360C],library:[2,2,0.5,0x5D4037],fountain:[1.5,1.5,1.5,0x29B6F6],sofa2:[2,0.7,0.9,0xF06292],statue:[0.8,2,0.8,0x9E9E9E],frame:[0.8,1,0.15,0xBCAAA4],flag:[0.3,2,0.3,0xFF1744]};
    const furniture=this.houseData?.furniture||[];
    const cols=3;
    furniture.slice(0,9).forEach((item,i)=>{
      const cfg=FH[item.type]||[1,1,1,0xCCCCCC];
      const[w,h,d,col]=cfg;
      const materials=[new THREE.MeshLambertMaterial({color:col}),new THREE.MeshLambertMaterial({color:col}),new THREE.MeshLambertMaterial({map:this.emojiTexture(item.emoji)}),new THREE.MeshLambertMaterial({color:col-0x111111}),new THREE.MeshLambertMaterial({color:col}),new THREE.MeshLambertMaterial({color:col-0x222222})];
      const mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),materials);
      const px=(i%cols)*3.5-3.5;const pz=Math.floor(i/cols)*3-3;
      mesh.position.set(px,h/2,pz);mesh.castShadow=true;mesh.receiveShadow=true;
      this.scene.add(mesh);this.meshes.push(mesh);
    });
  }
  addPet3D(){
    const tex=this.emojiTexture(this.petEmoji,'#FDEEF4');
    const mats=[new THREE.MeshLambertMaterial({color:0xFDEEF4}),new THREE.MeshLambertMaterial({color:0xFDEEF4}),new THREE.MeshLambertMaterial({color:0xFDEEF4}),new THREE.MeshLambertMaterial({color:0xFDEEF4}),new THREE.MeshLambertMaterial({map:tex}),new THREE.MeshLambertMaterial({color:0xFDEEF4})];
    this.pet=new THREE.Mesh(new THREE.BoxGeometry(1.2,1.2,1.2),mats);
    this.pet.position.set(0,0.6,1);this.pet.castShadow=true;this.scene.add(this.pet);
  }
  addOrbit(){
    const c=this.renderer.domElement;const R=16;
    c.addEventListener('mousedown',e=>{this.isDrag=true;this.lastX=e.clientX;});
    c.addEventListener('mouseup',()=>{this.isDrag=false;});
    c.addEventListener('mousemove',e=>{if(!this.isDrag)return;this.theta+=(e.clientX-this.lastX)*0.012;this.lastX=e.clientX;this.camera.position.x=R*Math.sin(this.theta);this.camera.position.z=R*Math.cos(this.theta);this.camera.lookAt(0,1,0);});
    c.addEventListener('touchstart',e=>{this.isDrag=true;this.lastX=e.touches[0].clientX;});
    c.addEventListener('touchend',()=>{this.isDrag=false;});
    c.addEventListener('touchmove',e=>{if(!this.isDrag)return;this.theta+=(e.touches[0].clientX-this.lastX)*0.012;this.lastX=e.touches[0].clientX;this.camera.position.x=R*Math.sin(this.theta);this.camera.position.z=R*Math.cos(this.theta);this.camera.lookAt(0,1,0);});
  }
  animate(){
    if(!this.isAlive)return;
    requestAnimationFrame(()=>this.animate());
    if(this.pet){this.pet.position.y=0.6+Math.sin(Date.now()*0.002)*0.15;this.pet.rotation.y+=0.008;}
    this.renderer.render(this.scene,this.camera);
  }
  destroy(){this.isAlive=false;if(this.renderer){this.renderer.dispose();if(this.container)this.container.innerHTML='';}}
}

/* ═══════════════════════════════════════
   ⚔️ PvP 시스템 (12시간 쿨타임)
═══════════════════════════════════════ */
const PVP_COOLDOWN_MS = 12 * 60 * 60 * 1000; /* 12시간 */
const PVP_STEAL_RATE  = 0.10; /* 포인트 10% 탈취 */
const PVP_MIN_STEAL   = 50;
const PVP_MAX_STEAL   = 2000;

function simulatePvP(myPet, targetPet){
  const mySt  = getEquippedStats(myPet);
  const tgSt  = getEquippedStats(targetPet);
  let myHp    = mySt.maxHp;
  let tgHp    = tgSt.maxHp;
  const log   = [];

  for(let t=0; t<30 && myHp>0 && tgHp>0; t++){
    /* 내 공격 */
    if(!checkEva(tgSt.eva)){
      const dmg=calcDmg(mySt.atk,tgSt.def,1+(t===0?0.1:0)); /* 첫 턴 선공 보정 */
      tgHp=Math.max(0,tgHp-dmg);
      log.push(`⚔️ ${myPet.petEmoji}${shortNick(myPet.nick)} → ${dmg}피해 (상대HP ${tgHp})`);
    }else{log.push(`💨 ${targetPet.petEmoji}${shortNick(targetPet.nick)} 회피!`);}
    if(tgHp<=0)break;
    /* 상대 반격 */
    if(!checkEva(mySt.eva)){
      const dmg=calcDmg(tgSt.atk,mySt.def);
      myHp=Math.max(0,myHp-dmg);
      log.push(`💥 ${targetPet.petEmoji}${shortNick(targetPet.nick)} → ${dmg}피해 (내HP ${myHp})`);
    }else{log.push(`💨 ${myPet.petEmoji}${shortNick(myPet.nick)} 회피!`);}
  }
  return{winner:myHp>=tgHp?'me':'target', myHpLeft:myHp, tgHpLeft:tgHp, log:log.slice(-8)};
}

async function startPvP(targetNick){
  const myNick=S.myEntry?.nick;
  if(!myNick||!S.myPet){alert("MBTI 검사 완료 후 이용해주세요!");return;}
  if(!S.myPet.diceStats){alert("먼저 주사위를 굴려 스탯을 설정해주세요! 🎲");return;}

  /* 12시간 쿨타임 체크 */
  const last=S.myPet.pvpCooldown||0;
  const coolEnd=last+PVP_COOLDOWN_MS;
  if(Date.now()<coolEnd){
    const rem=coolEnd-Date.now();
    alert(`⚔️ PvP 쿨타임 중!\n${msToHM(rem)} 후 다시 도전 가능합니다.`);
    return;
  }

  const target=S.petEntries.find(p=>p.nick===targetNick);
  if(!target){alert("상대 펫을 찾을 수 없어요!");return;}
  if(!target.diceStats){alert("상대방이 아직 주사위 스탯을 설정하지 않았어요!");return;}

  const mySt=getEquippedStats(S.myPet);
  const tgSt=getEquippedStats(target);
  const stealAmt=Math.min(PVP_MAX_STEAL,Math.max(PVP_MIN_STEAL,Math.round((target.points||0)*PVP_STEAL_RATE)));
  const loseAmt =Math.min(PVP_MAX_STEAL,Math.max(PVP_MIN_STEAL,Math.round((S.myPet.points||0)*PVP_STEAL_RATE)));

  if(!confirm(
    `⚔️ PvP 도전!\n\n상대: ${target.petEmoji}${target.petName} Lv.${target.level||1} (${targetNick})\n\n` +
    `내 스탯 — ATK:${mySt.atk} DEF:${mySt.def} HP:${mySt.maxHp}\n` +
    `상대 스탯 — ATK:${tgSt.atk} DEF:${tgSt.def} HP:${tgSt.maxHp}\n\n` +
    `🏆 승리 시 +${stealAmt}P 탈취\n💀 패배 시 -${loseAmt}P 손실\n\n⏰ 12시간 쿨타임 발동`
  ))return;

  const result=simulatePvP(S.myPet,target);
  const iWon=result.winner==='me';
  const myDelta=iWon?+stealAmt:-loseAmt;
  const tgDelta=iWon?-stealAmt:+stealAmt;

  try{
    /* 내 펫 업데이트 */
    await petCol.doc(myNick).update({
      points:INC(myDelta),
      pvpCooldown:Date.now(),
      [`pvpRecord.${iWon?'win':'lose'}`]:INC(1),
      pvpLastBattle:{
        vs:targetNick, vsEmoji:target.petEmoji, vsName:target.petName,
        result:iWon?'win':'lose', pointDelta:myDelta, at:Date.now()
      }
    });
    /* 상대 펫 업데이트 */
    await petCol.doc(targetNick).update({
      points:INC(tgDelta),
      [`pvpRecord.${iWon?'lose':'win'}`]:INC(1),
    });
    S.myPet.points=(S.myPet.points||0)+myDelta;
    S.myPet.pvpCooldown=Date.now();

    const battleLog=result.log.join('\n');
    alert(
      `${iWon?'🏆 승리!':'💀 패배...'}\n\n` +
      `${iWon?`+${stealAmt}P 탈취!`:`-${loseAmt}P 손실`}\n\n` +
      `📊 전투 로그:\n${battleLog}`
    );
    render();
  }catch(e){console.error(e);alert("PvP 처리 중 오류가 발생했습니다.");}
}
async function startCatchmindRound(forcedDrawerNick){
  const myNick=S.myEntry?.nick;
  if(!myNick){alert("MBTI 검사 완료 후 이용해주세요!");return;}
  /* 출제자 선정 */
  let drawerNick=forcedDrawerNick||null;
  if(!drawerNick){
    const players=S.petEntries.filter(p=>p.nick&&p.nick!==myNick);
    players.push({nick:myNick});
    drawerNick=players[Math.floor(Math.random()*players.length)].nick;
  }
  const word=CM_WORDS[Math.floor(Math.random()*CM_WORDS.length)];
  const prevWord=S.catchmindState?.word;
  /* 연속 같은 단어 방지 */
  const finalWord=(word===prevWord&&CM_WORDS.length>1)?
    CM_WORDS[(CM_WORDS.indexOf(word)+1)%CM_WORDS.length]:word;

  await gameStateCol.doc("catchmind").set({
    status:'drawing',drawerNick,word:finalWord,
    round:(S.catchmindState?.round||0)+1,
    startedAt:Date.now(), roundTime:90,
    solvedBy:null,solvedAt:null,timestamp:TS()
  });
  /* 스트로크 전체 삭제 */
  await clearCMStrokes();
}

/* ═══ 캐치마인드 캔버스 클래스 ═══ */
class CatchmindCanvas{
  constructor(canvasId,isDrawer,tool){
    this.el=document.getElementById(canvasId);
    if(!this.el)return;
    this.ctx=this.el.getContext('2d');
    this.isDrawer=isDrawer;
    this.tool=tool||{color:'#000000',width:5,eraser:false};
    this.isDown=false;
    this.curPoints=[];
    this.setupSize();
    this.clearCanvas();
    if(isDrawer)this.setupEvents();
  }
  setupSize(){
    const w=this.el.offsetWidth||340;
    const h=this.el.offsetHeight||260;
    const dpr=Math.min(window.devicePixelRatio||1,2);
    this.el.width=w*dpr;this.el.height=h*dpr;
    this.ctx.scale(dpr,dpr);
    this.W=w;this.H=h;
  }
  clearCanvas(){
    this.ctx.fillStyle='#FFFFFF';
    this.ctx.fillRect(0,0,this.W,this.H);
  }
  norm(x,y){return{x:x/this.W,y:y/this.H};}
  denorm(nx,ny){return{x:nx*this.W,y:ny*this.H};}
  drawStroke(s){
    if(!s.points||s.points.length<1)return;
    const ctx=this.ctx;
    ctx.beginPath();
    ctx.strokeStyle=s.eraser?'#FFFFFF':s.color||'#000000';
    ctx.lineWidth=s.width||5;
    ctx.lineCap='round';ctx.lineJoin='round';
    const p0=this.denorm(s.points[0].x,s.points[0].y);
    ctx.moveTo(p0.x,p0.y);
    if(s.points.length===1){
      ctx.arc(p0.x,p0.y,(s.width||5)/2,0,Math.PI*2);
      ctx.fillStyle=s.eraser?'#FFFFFF':s.color||'#000000';
      ctx.fill();return;
    }
    s.points.forEach((p,i)=>{if(i===0)return;const d=this.denorm(p.x,p.y);ctx.lineTo(d.x,d.y);});
    ctx.stroke();
  }
  redrawAll(strokes){
    this.clearCanvas();
    strokes.forEach(s=>this.drawStroke(s));
  }
  getPos(e){
    const rect=this.el.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return{x:src.clientX-rect.left,y:src.clientY-rect.top};
  }
  setupEvents(){
    const el=this.el;
    el.style.cursor='crosshair';
    el.addEventListener('mousedown',e=>{
      this.isDown=true;
      const pos=this.getPos(e);
      this.curPoints=[this.norm(pos.x,pos.y)];
    });
    el.addEventListener('mousemove',e=>{
      if(!this.isDown)return;
      const pos=this.getPos(e);
      this.curPoints.push(this.norm(pos.x,pos.y));
      /* 실시간 로컬 그리기 */
      const pts=this.curPoints;
      if(pts.length>=2){
        const ctx=this.ctx;
        ctx.beginPath();
        ctx.strokeStyle=this.tool.eraser?'#FFFFFF':this.tool.color;
        ctx.lineWidth=this.tool.width;
        ctx.lineCap='round';ctx.lineJoin='round';
        const a=this.denorm(pts[pts.length-2].x,pts[pts.length-2].y);
        const b=this.denorm(pts[pts.length-1].x,pts[pts.length-1].y);
        ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
      }
    });
    el.addEventListener('mouseup',()=>this.saveStroke());
    el.addEventListener('mouseleave',()=>{if(this.isDown)this.saveStroke();});
    el.addEventListener('touchstart',e=>{e.preventDefault();this.isDown=true;const pos=this.getPos(e);this.curPoints=[this.norm(pos.x,pos.y)];},{passive:false});
    el.addEventListener('touchmove',e=>{e.preventDefault();if(!this.isDown)return;const pos=this.getPos(e);this.curPoints.push(this.norm(pos.x,pos.y));const pts=this.curPoints;if(pts.length>=2){const ctx=this.ctx;ctx.beginPath();ctx.strokeStyle=this.tool.eraser?'#FFFFFF':this.tool.color;ctx.lineWidth=this.tool.width;ctx.lineCap='round';const a=this.denorm(pts[pts.length-2].x,pts[pts.length-2].y);const b=this.denorm(pts[pts.length-1].x,pts[pts.length-1].y);ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}},{passive:false});
    el.addEventListener('touchend',e=>{e.preventDefault();this.saveStroke();},{passive:false});
  }
  async saveStroke(){
    if(!this.isDown)return;
    this.isDown=false;
    if(!this.curPoints.length)return;
    const pts=[...this.curPoints];
    this.curPoints=[];
    await cmStrokesCol.add({
      points:pts,
      color:this.tool.eraser?'#FFFFFF':this.tool.color,
      width:this.tool.width,
      eraser:this.tool.eraser||false,
      timestamp:TS()
    }).catch(()=>{});
  }
  updateTool(t){this.tool={...this.tool,...t};}
}

function initCatchmindCanvas(){
  const myNick=S.myEntry?.nick;
  const state=S.catchmindState;
  const isDrawer=state?.status==='drawing'&&state?.drawerNick===myNick;
  if(window.__cmCanvas){
    window.__cmCanvas.isDrawer=isDrawer;
    window.__cmCanvas.redrawAll(S.cmStrokes);
    return;
  }
  const inst=new CatchmindCanvas('cm_canvas',isDrawer,S.cmTool);
  if(inst.el){
    window.__cmCanvas=inst;
    inst.redrawAll(S.cmStrokes);
    /* 타이머 인터벌 */
    if(window.__cmTimer)clearInterval(window.__cmTimer);
    window.__cmTimer=setInterval(()=>{
      const timerEl=document.getElementById('cm_timer');
      if(!timerEl)return;
      const st=S.catchmindState;
      if(!st||st.status!=='drawing'){timerEl.textContent='';return;}
      const elapsed=(Date.now()-(st.startedAt||0))/1000;
      const rem=Math.max(0,Math.ceil((st.roundTime||90)-elapsed));
      timerEl.textContent=rem+'초';
      timerEl.style.color=rem<=10?'#C62828':rem<=30?'#FF5722':'var(--text1)';
      if(rem===0&&!st.solvedBy){
        timerEl.textContent='⏰ 시간 초과!';
        clearInterval(window.__cmTimer);window.__cmTimer=null;
      }
    },500);
  }
}

/* 퀴즈 시작 - 랜덤 문제 선택 */
async function startQuizQuestion(type, lastAns){
  type=type||'chosung';
  let pool,q,docData;
  if(type==='chosung'){
    pool=CHOSUNG_QS;
    q=pool[Math.floor(Math.random()*pool.length)];
    /* 연속 같은 문제 방지 */
    if(lastAns&&pool.length>1){let t=q;while(t.ans===lastAns)t=pool[Math.floor(Math.random()*pool.length)];q=t;}
    docData={type,genre:q.genre,chosung:q.cho,answer:q.ans,hint:q.hint,
      solvedBy:null,solvedAt:null,startedAt:TS()};
  } else if(type==='ox'){
    pool=OX_QUESTIONS;
    q=pool[Math.floor(Math.random()*pool.length)];
    if(lastAns&&pool.length>1){let t=q;while(t.ans===lastAns)t=pool[Math.floor(Math.random()*pool.length)];q=t;}
    docData={type,question:q.q,answer:q.ans,explain:q.explain,
      solvedBy:null,solvedAt:null,startedAt:TS()};
  } else if(type==='nonsense'){
    pool=NONSENSE_QUESTIONS;
    q=pool[Math.floor(Math.random()*pool.length)];
    if(lastAns&&pool.length>1){let t=q;while(t.ans===lastAns)t=pool[Math.floor(Math.random()*pool.length)];q=t;}
    docData={type,question:q.q,answer:q.ans,hint:q.hint,explain:q.explain,
      solvedBy:null,solvedAt:null,startedAt:TS()};
  } else { /* short */
    pool=SHORT_QUESTIONS;
    q=pool[Math.floor(Math.random()*pool.length)];
    if(lastAns&&pool.length>1){let t=q;while(t.ans===lastAns&&t.ans[0]===lastAns)t=pool[Math.floor(Math.random()*pool.length)];q=t;}
    docData={type,question:q.q,answers:q.ans,explain:q.explain,
      solvedBy:null,solvedAt:null,startedAt:TS()};
  }
  await gameStateCol.doc("chosung_current").set(docData);
}

/* 답변 제출 (모든 퀴즈 타입) */
async function submitQuizAnswer(){
  const inputEl=document.getElementById("lm_chosung_input");
  if(!inputEl)return;
  const val=inputEl.value.trim();
  if(!val)return;
  const myNick=S.myEntry?.nick||S.myPet?.nick;
  if(!myNick){alert("MBTI 검사를 완료 후 참여해주세요!");inputEl.value="";return;}
  const state=S.chosungState;
  if(!state){inputEl.value="";return;}
  if(state.solvedBy){alert("이미 정답이 나왔어요! 다음 문제를 기다려주세요 ⏳");inputEl.value="";return;}

  let isCorrect=false;
  const type=state.type||'chosung';

  if(type==='chosung'){
    isCorrect=(val===state.answer);
  } else if(type==='ox'){
    isCorrect=(val.toUpperCase()===state.answer||val==='O'&&state.answer==='O'||val==='X'&&state.answer==='X');
  } else if(type==='nonsense'){
    /* 공백 제거 후 비교 */
    const clean=val.replace(/\s/g,'').toLowerCase();
    const ansClean=(state.answer||'').replace(/\s/g,'').toLowerCase();
    isCorrect=(clean===ansClean||clean.includes(ansClean)||ansClean.includes(clean));
  } else { /* short */
    const answers=state.answers||[];
    const clean=val.replace(/\s/g,'').toLowerCase();
    isCorrect=answers.some(a=>clean===a.replace(/\s/g,'').toLowerCase()||clean.includes(a.replace(/\s/g,'').toLowerCase()));
  }

  /* 채팅 로그 */
  await chatCol.add({nick:shortNick(myNick),message:val,isCorrect,type,timestamp:TS()});
  inputEl.value="";S.chosungInput="";

  if(isCorrect){
    /* 보상: 퀴즈 타입별 P + IQ */
    const pReward=type==='chosung'?50:type==='ox'?20:type==='nonsense'?40:30;
    const iqReward=type==='chosung'?3:type==='ox'?1:type==='nonsense'?2:2;
    try{await gameStateCol.doc("chosung_current").update({solvedBy:shortNick(myNick),solvedAt:TS(),explain:state.explain||''});}catch(e){}
    if(S.myPet){
      await addPoints(myNick,pReward);
      await addIQ(myNick,iqReward);
      alert(`⚡ 정답! +${pReward}P +${iqReward}IQ 획득! 🎉`);
    }
  }
}

/* OX 버튼 전용 제출 */
async function submitOXAnswer(choice){
  const myNick=S.myEntry?.nick||S.myPet?.nick;
  if(!myNick){alert("MBTI 검사를 완료 후 참여해주세요!");return;}
  const state=S.chosungState;
  if(!state||state.type!=='ox')return;
  if(state.solvedBy){alert("이미 정답이 나왔어요!");return;}
  const isCorrect=(choice===state.answer);
  await chatCol.add({nick:shortNick(myNick),message:choice,isCorrect,type:'ox',timestamp:TS()});
  if(isCorrect){
    try{await gameStateCol.doc("chosung_current").update({solvedBy:shortNick(myNick),solvedAt:TS()});}catch(e){}
    if(S.myPet){
      await addPoints(myNick,20);
      await addIQ(myNick,1);
      alert(`${choice} 정답! +20P +1IQ! 🎉`);
    }
  }else{
    alert(`${choice} 오답! 힌트: ${state.explain||'다시 생각해봐요!'}`);
  }
}

  const q=BQ[S.balIdx];const pct=Math.round((S.balIdx/BQ.length)*100);
  return`<div style="max-width:480px;margin:0 auto;padding:.5rem 0" class="fadein">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <button class="btn" style="padding:6px 10px" data-a="balBack">←</button>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;font-size:11.5px;color:var(--text2);margin-bottom:4px">
          <span>⚖️ 밸런스 게임 ${S.balIdx+1} / ${BQ.length}</span>
        </div>
        <div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>
    </div>
    <div class="card card-rose" style="text-align:center;padding:1.2rem;margin-bottom:16px">
      <p style="font-size:12px;color:var(--text3);margin:0 0 6px">Q${q.id} · 둘 중 하나만 골라야 한다면?</p>
      <p style="font-size:17px;font-weight:700;color:var(--text1)">${q.a} <span style="color:var(--rose);margin:0 6px">VS</span> ${q.b}</p>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="ans" style="font-size:15.5px;padding:22px;font-weight:500;border-color:var(--rose)" data-a="balAns" data-v="A">${q.a}</button>
      <div style="text-align:center;font-size:12px;color:var(--text3);font-weight:600;letter-spacing:2px">VS</div>
      <button class="ans" style="font-size:15.5px;padding:22px;font-weight:500;border-color:var(--rose)" data-a="balAns" data-v="B">${q.b}</button>

}

  return`<div style="max-width:480px;margin:0 auto;padding:.5rem 0" class="fadein">
    <div class="card card-rose" style="text-align:center;margin-bottom:12px">

      <p style="font-size:13px;color:var(--text2);margin:0 0 18px">${esc(shortNick(e.nick))} 님의 선택이 저장됐어요</p>
      <div style="display:flex;justify-content:center;gap:32px;margin-bottom:16px">
        <div style="text-align:center"><div style="font-size:36px;font-weight:700;color:var(--rose)">${aC}</div><div style="font-size:11px;color:var(--text3)">왼쪽 선택</div></div>
        <div style="text-align:center"><div style="font-size:36px;font-weight:700;color:var(--plum)">${bC}</div><div style="font-size:11px;color:var(--text3)">오른쪽 선택</div></div>

/* ─── BOARD WRAPPER (탭 확장) ─── */
function rBoard(){
  const myNick=S.myEntry?.nick;
  /* ★ 2세 육아 탭: 부화 여부 관계없이 부모면 표시 (trim 비교로 공백 버그 방지) */
  const myActiveBaby=S.babyPets.find(b=>{
    if(!myNick)return false;
    const p1=(b.parent1Nick||'').trim();
    const p2=(b.parent2Nick||'').trim();
    return p1===myNick.trim()||p2===myNick.trim();
  });

  const tabs=[
    {id:"board",  label:"👥\n참여자"},
    {id:"compat", label:"💘\n궁합"},
    {id:"rose",   label:"🌹\n장미꽃"},
    {id:"lm_pet", label:"🐾\n러브몬"},
    {id:"lm_plaza",label:"⚡\n광장"},
    {id:"lm_catchmind",label:"🎨\n캐치마인드"},
    {id:"lm_dungeon",label:"⚔️\n던전"},
    {id:"lm_house",label:"🏠\n하우스"},
    {id:"lm_gifts",label:`📬\n선물함${S.unreadGifts>0?`(${S.unreadGifts})`:''}` },
    {id:"lm_colors",label:"🎨\n색상표"},
    {id:"admin",  label:"⚙️\n관리"},
  ];
  if(myActiveBaby){
    const babyLabel=myActiveBaby.hatched?'🐣\n2세육아':'🥚\n2세육아';
    tabs.splice(4,0,{id:'lm_baby',label:babyLabel});
  }

  let content="";
  if(S.tab==="board")      content=rBoardTab();
  else if(S.tab==="compat")content=rCompatTab();
  else if(S.tab==="rose")  content=rRoseTab();
  else if(S.tab==="lm_pet")content=rLovemonTab();
  else if(S.tab==="lm_baby")content=rBabyTab();
  else if(S.tab==="lm_plaza")content=rPlazaTab();
  else if(S.tab==="lm_catchmind"){
    content=rCatchmindTab();
    setTimeout(()=>initCatchmindCanvas(),80);
  }
  else if(S.tab==="lm_dungeon")content=rDungeonTab();
  else if(S.tab==="lm_house"){
    content=rHouseTab();
    setTimeout(()=>{
      const hn=S.visitingHouse?S.visitingHouse:myNick;
      const h=S.visitingHouse?S.houseEntries.find(h=>h.nick===hn):S.myHouse;
      const pet=S.petEntries.find(p=>p.nick===hn)||S.myPet;
      if(h)initHouse3D('house3d-canvas',h,pet?.petEmoji||'🐾');
    },80);
  }
  else if(S.tab==="lm_gifts"){markGiftsRead();content=rGiftsTab();}
  else if(S.tab==="lm_colors")content=rColorTab();
  else if(S.tab==="admin") content=rAdminTab();

  return`<div class="fadein">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button class="btn" style="padding:6px 10px" data-a="goHome">←</button>
      <span class="title-deco" style="font-size:18px;color:var(--rose2)">💕 연애 커뮤니티</span>
      <span style="font-size:12px;color:var(--text3)">${S.entries.length}명 참여</span>
    </div>
    <div class="tabs">${tabs.map(t=>`<button class="tab ${S.tab===t.id?"on":""}" data-a="tab" data-v="${t.id}">${t.label}</button>`).join("")}</div>
    ${content}
  </div>`;
}

/* ─── COMMUNITY BOARD TAB ─── */
/* ★ 참여자 정보 노출 제한: isAdminChecked 여부에 따라 상세/대기 카드 분기 */
function rBoardTab(){
  if(S.loading)return`<p style="text-align:center;color:var(--text3);padding:3rem">불러오는 중... 💕</p>`;
  if(!S.entries.length)return`<div style="text-align:center;padding:3rem 0"><div style="font-size:40px;margin-bottom:12px">💌</div><p style="color:var(--text2);margin-bottom:16px">참여자가 없어요. 첫 번째로 검사해보세요!</p><button class="btn btn-primary" style="padding:10px 22px" data-a="goHome">시작하기</button></div>`;

  const today=todayStr();
  const myNick=S.myEntry?.nick;

  /* ★ 핵심 로직: 보는 사람(뷰어) 본인이 승인됐는지 체크
     - 관리자 → 항상 열람 가능
     - 내 항목의 isAdminChecked === true → 열람 가능
     - 그 외(신규 가입자 등) → 전체 잠금 화면 표시 */
  const myEntry=S.entries.find(e=>e.nick===myNick);
  const viewerApproved=S.isAdmin||(myEntry?.isAdminChecked===true);

  if(!viewerApproved){
    return`<div class="card" style="text-align:center;padding:2.5rem 1.5rem;margin-bottom:10px">
      <div style="font-size:56px;margin-bottom:16px" class="float">🔒</div>
      <p style="font-size:17px;font-weight:700;color:var(--text1);margin-bottom:8px">승인 대기 중이에요</p>
      <p style="font-size:13px;color:var(--text3);line-height:1.75;margin-bottom:20px">
        관리자 승인 후 참여자 프로필을<br>열람할 수 있어요.<br>
        <span style="color:var(--gold);font-size:12px">✨ 승인되면 모든 기능이 활성화됩니다!</span>
      </p>
      <div style="background:linear-gradient(135deg,rgba(212,168,83,.08),rgba(212,168,83,.04));border:1px solid rgba(212,168,83,.25);border-radius:12px;padding:14px;text-align:left">
        <p style="font-size:12px;font-weight:700;color:var(--gold);margin:0 0 8px">📋 승인 대기 안내</p>
        <div style="display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--text2)">
          <span>• MBTI 검사 완료 후 관리자가 승인합니다</span>
          <span>• 승인 전까지는 커뮤니티 열람이 제한됩니다</span>
          <span>• 러브몬 펫 육성은 승인 전에도 가능해요 🐾</span>
        </div>
      </div>
      ${myNick?`<p style="font-size:11.5px;color:var(--text3);margin-top:16px">닉네임: <b>${esc(myNick)}</b> · 승인 요청 완료</p>`:''}
    </div>`;
  }

  /* 뷰어가 승인된 경우 → 전체 참여자 프로필 정상 출력 */
  return S.entries.map(e=>{
    const isMe=e.nick===myNick;
    const roseCount=S.roseEntries.filter(r=>r.receiver===e.nick&&r.date===today).length;
    const hasBal=S.balEntries.some(b=>b.nick===e.nick);
    const hasDat=S.datEntries.some(d=>d.nick===e.nick);
    const pet=S.petEntries.find(p=>p.nick===e.nick);
    return`<div class="card" style="margin-bottom:8px;display:flex;align-items:flex-start;gap:12px">
      <div style="position:relative;flex-shrink:0">
        <div style="width:46px;height:46px;border-radius:50%;background:${e.gender==="남성"?"linear-gradient(135deg,#BBDEFB,#64B5F6)":"linear-gradient(135deg,#FCE4EC,#F06292)"};display:flex;align-items:center;justify-content:center;font-size:22px;margin-top:2px">${e.gender==="남성"?"👨":"👩"}</div>
        ${pet?`<div style="position:absolute;bottom:-2px;right:-4px;font-size:16px">${getVisualEmoji(pet)}</div>`:''}
      </div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">
          <span style="font-weight:600;font-size:14.5px">${esc(e.nick)}</span>
          ${isMe?`<span style="font-size:10px;background:rgba(232,83,122,.12);color:var(--rose2);padding:1px 7px;border-radius:99px">나</span>`:''}
          ${e.isAdminChecked?`<span style="font-size:10px;background:#E8F5E9;color:#2E7D32;padding:1px 7px;border-radius:99px">✅</span>`:''}
          <span style="font-size:11px;color:var(--text3)">${esc(e.area||"미정")} · ${e.gender}${e.height?" · "+esc(e.height):""}</span>
        </div>
        <div style="font-size:11.5px;color:var(--text2);display:flex;flex-direction:column;gap:2px">
          ${e.freeTime?`<span>⏰ ${esc(e.freeTime)}</span>`:""}
          ${e.idealType?`<span>💝 ${esc(e.idealType)}</span>`:""}
          ${e.appeal?`<span>✨ ${esc(e.appeal)}</span>`:""}
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px">
          ${hasBal?`<span class="chip" style="background:#E8F5E9;color:#2E7D32">⚖️ 밸런스</span>`:""}
          ${hasDat?`<span class="chip" style="background:#F3E5F5;color:#6A1B9A">💕 연애성향</span>`:""}
          ${pet?`<span class="chip" style="background:rgba(212,168,83,.12);color:#8B6914">🐾 Lv.${pet.level||1}</span>`:""}
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-weight:700;font-size:15px;color:var(--rose2);letter-spacing:1.5px">${esc(e.mbti)}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:1px">${esc(e.giDol||"")}</div>
        ${roseCount>0?`<div class="rose-badge" style="margin-top:4px">🌹 ×${roseCount}</div>`:""}
        ${pet&&(pet.points||0)>0?`<div style="font-size:10px;color:var(--gold);margin-top:2px">💰${pet.points}P</div>`:""}
      </div>
    </div>`;
  }).join("");
}

/* ─── COMPATIBILITY TAB ─── */
function rCompatTab(){
  const males=S.entries.filter(e=>e.gender==="남성");
  const females=S.entries.filter(e=>e.gender==="여성");
  const mList=males.length===0?`<p style="font-size:12px;color:var(--text3);padding:6px">남성 참여자 없음</p>`:males.map(e=>`<button class="btn ${S.selM?.id===e.id?"btn-sel":""}" style="padding:8px 10px;text-align:left;width:100%;font-size:12.5px" data-a="selM" data-id="${e.id}"><span style="font-weight:500">${esc(shortNick(e.nick))}</span><span style="font-size:11px;margin-left:4px;opacity:.7">${esc(e.mbti)}</span></button>`).join("");
  const fList=females.length===0?`<p style="font-size:12px;color:var(--text3);padding:6px">여성 참여자 없음</p>`:females.map(e=>`<button class="btn ${S.selF?.id===e.id?"btn-sel":""}" style="padding:8px 10px;text-align:left;width:100%;font-size:12.5px" data-a="selF" data-id="${e.id}"><span style="font-weight:500">${esc(shortNick(e.nick))}</span><span style="font-size:11px;margin-left:4px;opacity:.7">${esc(e.mbti)}</span></button>`).join("");
  let resultHTML=`<div class="card" style="text-align:center;padding:2rem"><div style="font-size:36px;margin-bottom:8px">💘</div><p style="color:var(--text2);font-size:13.5px">남성과 여성을 선택하면<br>MBTI · 밸런스 · 연애성향 궁합을 모두 볼 수 있어요</p></div>`;
  if(S.selM&&S.selF){
    const mbtiCl=getMBTICompat(S.selM.mbti,S.selF.mbti);const mbtiInfo=mbtiCl?CM[mbtiCl]:null;
    const mBal=S.balEntries.find(e=>e.nick===S.selM.nick);const fBal=S.balEntries.find(e=>e.nick===S.selF.nick);
    const balPct=(mBal&&fBal)?calcPctCompat(mBal,fBal,BQ):null;
    const mDat=S.datEntries.find(e=>e.nick===S.selM.nick);const fDat=S.datEntries.find(e=>e.nick===S.selF.nick);
    const datPct=(mDat&&fDat)?calcPctCompat(mDat,fDat,DQ):null;
    const scores=[mbtiInfo?mbtiInfo.score:null,balPct,datPct].filter(v=>v!==null);
    const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;
    const mbtiRow=mbtiInfo?`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px;color:var(--text2);flex:1">🧠 MBTI (${esc(S.selM.mbti)} × ${esc(S.selF.mbti)})</span><div class="sbar"><div class="sbar-fill" style="width:${mbtiInfo.score}%"></div></div><span style="font-size:13px;font-weight:700;color:var(--rose2);width:38px;text-align:right">${mbtiInfo.score}점</span></div><p style="font-size:12px;color:var(--text3);margin:3px 0 6px">${mbtiInfo.label}</p>`:`<p style="font-size:12px;color:var(--text3);padding:8px 0;border-bottom:1px solid var(--border)">🧠 MBTI — 두 분 모두 검사 필요</p>`;
    const balRow=balPct!==null?`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px;color:var(--text2);flex:1">⚖️ 밸런스 게임</span><div class="sbar"><div class="sbar-fill" style="width:${balPct}%"></div></div><span style="font-size:13px;font-weight:700;color:var(--rose2);width:38px;text-align:right">${balPct}%</span></div><p style="font-size:12px;color:var(--text3);margin:3px 0 6px">${pctLabel(balPct)}</p>`:`<p style="font-size:12px;color:var(--text3);padding:8px 0;border-bottom:1px solid var(--border)">⚖️ 밸런스 — 두 분 모두 참여 필요</p>`;
    const datRow=datPct!==null?`<div style="display:flex;align-items:center;gap:10px;padding:10px 0"><span style="font-size:13px;color:var(--text2);flex:1">💕 연애 성향</span><div class="sbar"><div class="sbar-fill" style="width:${datPct}%"></div></div><span style="font-size:13px;font-weight:700;color:var(--rose2);width:38px;text-align:right">${datPct}%</span></div><p style="font-size:12px;color:var(--text3);margin:3px 0">${pctLabel(datPct)}</p>`:`<p style="font-size:12px;color:var(--text3);padding:8px 0">💕 연애 성향 — 두 분 모두 참여 필요</p>`;
    resultHTML=`<div class="card card-rose" style="margin-bottom:8px">
      <p style="font-size:13px;color:var(--text2);margin:0 0 12px;text-align:center"><b>${esc(shortNick(S.selM.nick))}</b> × <b>${esc(shortNick(S.selF.nick))}</b></p>
      ${avg!==null?`<div style="text-align:center;margin-bottom:14px"><div style="font-size:52px;font-weight:700;background:linear-gradient(135deg,var(--rose),var(--plum));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1">${avg}<span style="font-size:24px">점</span></div><p style="font-size:12px;color:var(--text3);margin:4px 0 10px">종합 궁합 점수</p><div class="prog" style="height:8px;margin-bottom:4px"><div class="prog-fill" style="width:${avg}%"></div></div></div>`:""}
      ${mbtiRow}${balRow}${datRow}
    </div>`;
  }
  return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">

       ${S.mutualRoses.map(m=>{

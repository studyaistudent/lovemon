<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 너를 담아 연애 미니게임</title>
<meta property="og:title" content="💕 너를 담아 연애 미니게임">
<meta property="og:description" content="MBTI · 밸런스게임 · 연애성향 · 장미꽃 · 러브몬 육성 · 초성광장 · 캐치마인드 등">

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');
:root {
  --rose:       #E8537A;
  --rose2:      #C73B65;
  --rose-lt:    #FDEEF4;
  --rose-pale:  #FFF6FA;
  --plum:       #7C3F7E;
  --gold:       #D4A853;
  --cream:      #FDF8F2;
  --text1:      #2A1A2E;
  --text2:      #6B4870;
  --text3:      #B89CB8;
  --border:     rgba(232,83,122,.18);
  --border2:    rgba(232,83,122,.35);
  --shadow:     0 4px 24px rgba(232,83,122,.12);
  --r:          14px;
  --r-sm:       10px;
  --mint:       #2EC4B6;
  --mint-lt:    #E8F8F7;
  --lm-gold:    #F0A500;
  --lm-purple:  #9B59B6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:#FDF0F6;
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 10%,rgba(232,83,122,.10) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 80%,rgba(124,63,126,.08) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%,rgba(212,168,83,.05) 0%,transparent 60%);
  min-height:100vh;color:var(--text1);
}
body::before{
  content:'💕 🌹 💗 🌸 💘 ✨ 🐾 🥚 💕 🌹';
  position:fixed;top:0;left:0;width:100%;
  font-size:11px;letter-spacing:26px;
  color:rgba(232,83,122,.06);
  pointer-events:none;z-index:0;
  line-height:30px;word-spacing:18px;
  white-space:nowrap;overflow:hidden;
}
#app{max-width:560px;margin:0 auto;padding:1rem;position:relative;z-index:1;}
/* ── Card ── */
.card{background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;box-shadow:var(--shadow);}
.card-rose{background:linear-gradient(135deg,rgba(253,238,244,.95),rgba(253,245,250,.95));border-color:var(--border2);}
.card-mint{background:linear-gradient(135deg,rgba(232,248,247,.95),rgba(240,253,252,.95));border-color:rgba(46,196,182,.3);}
.card-gold{background:linear-gradient(135deg,rgba(253,248,230,.95),rgba(255,252,240,.95));border-color:rgba(212,168,83,.3);}
/* ── Buttons ── */
.btn{border:1.5px solid var(--border2);border-radius:var(--r-sm);padding:10px 16px;cursor:pointer;font-size:13.5px;font-family:'Noto Sans KR',sans-serif;background:white;color:var(--text1);transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:5px;}
.btn:hover{background:var(--rose-lt);}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(135deg,var(--rose),var(--rose2)) !important;color:white !important;border:none !important;font-weight:500;box-shadow:0 3px 12px rgba(232,83,122,.35);}
.btn-primary:hover{opacity:.88;box-shadow:0 5px 18px rgba(232,83,122,.45);}
.btn-sel{background:linear-gradient(135deg,var(--rose),var(--rose2)) !important;color:white !important;border-color:transparent !important;}
.btn-plum{background:linear-gradient(135deg,var(--plum),#9C27B0) !important;color:white !important;border:none !important;box-shadow:0 3px 12px rgba(124,63,126,.3);}
.btn-mint{background:linear-gradient(135deg,var(--mint),#1A9E95) !important;color:white !important;border:none !important;box-shadow:0 3px 12px rgba(46,196,182,.3);}
.btn-gold{background:linear-gradient(135deg,var(--gold),#B8860B) !important;color:white !important;border:none !important;box-shadow:0 3px 12px rgba(212,168,83,.3);}
.btn-danger{color:#C62828 !important;border-color:#FFCDD2 !important;}
/* ── Inputs ── */
.inp{width:100%;padding:10px 14px;border:1.5px solid var(--border2);border-radius:var(--r-sm);font-size:13.5px;font-family:'Noto Sans KR',sans-serif;background:white;color:var(--text1);transition:border-color .15s,box-shadow .15s;}
.inp:focus{outline:none;border-color:var(--rose);box-shadow:0 0 0 3px rgba(232,83,122,.12);}
/* ── Progress bar ── */
.prog{height:6px;background:var(--rose-lt);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--rose2));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.prog-mint{background:linear-gradient(90deg,var(--mint),#1A9E95);}
/* ── Tabs ── */
.tabs{display:flex;background:white;border:1px solid var(--border);border-radius:var(--r-sm);overflow-x:auto;margin-bottom:14px;scrollbar-width:none;position:relative;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;min-width:58px;padding:9px 6px;font-size:11px;font-family:'Noto Sans KR',sans-serif;background:transparent;border:none;border-right:1px solid var(--border);cursor:pointer;color:var(--text2);transition:all .15s;line-height:1.3;white-space:pre-line;text-align:center;}
.tab:last-child{border-right:none;}
.tab.on{background:linear-gradient(135deg,var(--rose),var(--rose2));color:white;font-weight:500;}
.tab.on-mint{background:linear-gradient(135deg,var(--mint),#1A9E95);color:white;font-weight:500;}
/* ★ 데스크탑/태블릿(≥480px): 탭이 많아도 줄바꿈으로 한눈에 보이게 */
@media (min-width:480px){
  .tabs{flex-wrap:wrap;overflow-x:visible;}
  .tab{flex:1 0 auto;min-width:70px;border-bottom:1px solid var(--border);}
  .tab:last-child{border-right:none;border-bottom:none;}
}
/* ★ 모바일(<480px): 가로 스크롤 + 우측에 스크롤 가능 힌트 그라데이션 */
@media (max-width:479px){
  .tabs::after{content:'›';position:sticky;right:0;display:flex;align-items:center;justify-content:center;width:22px;background:linear-gradient(to right,transparent,white 50%);color:var(--rose);font-size:18px;font-weight:700;pointer-events:none;flex-shrink:0;margin-left:-22px;animation:livePulse 1.6s infinite;}
}
/* ── Answer buttons ── */
.ans{width:100%;padding:15px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:white;color:var(--text1);cursor:pointer;font-size:14px;font-family:'Noto Sans KR',sans-serif;text-align:center;transition:all .15s;}
.ans:hover{background:var(--rose-lt);border-color:var(--rose);transform:translateY(-1px);}
.ans:active{transform:scale(.98);}
/* ── Scroll list ── */
.slist{max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;}
.slist::-webkit-scrollbar{width:3px;}
.slist::-webkit-scrollbar-thumb{background:var(--rose-lt);border-radius:99px;}
/* ── Animations ── */
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes livePulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.float{animation:float 2.5s ease-in-out infinite;}
.pulse{animation:pulse 1.5s ease-in-out infinite;}
.fadein{animation:fadeIn .4s ease;}
.live-dot{width:7px;height:7px;background:#E8537A;border-radius:50%;display:inline-block;animation:livePulse 1.2s infinite;}
/* ── Score bar ── */
.sbar{height:7px;background:var(--rose-lt);border-radius:99px;overflow:hidden;flex:1;}
.sbar-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--rose2));border-radius:99px;transition:width .6s ease;}
/* ── Title decorative ── */
.title-deco{font-family:'Playfair Display',serif;font-style:italic;letter-spacing:.5px;}
/* ── Badges ── */
.rose-badge{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,#FFE4EF,#FFC8DA);color:var(--rose2);padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid rgba(232,83,122,.3);}
.gold-badge{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,#FFF3CD,#FFE082);color:#8B6914;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid rgba(212,168,83,.4);}
/* ── Heart separator ── */
.sep{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin:6px 0;}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:var(--border);}
.chip{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:500;}
/* ── LoveMon Specific ── */
.lm-pet-card{
  background:linear-gradient(160deg,rgba(253,238,244,.98),rgba(240,230,255,.98));
  border:1.5px solid rgba(155,89,182,.25);
  border-radius:18px;padding:1.4rem;text-align:center;
  box-shadow:0 6px 28px rgba(155,89,182,.12);
}
.lm-xp-bar{height:8px;background:rgba(155,89,182,.12);border-radius:99px;overflow:hidden;}
.lm-xp-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--lm-purple));border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.lm-stat-row{display:flex;justify-content:center;gap:20px;margin:10px 0;}
.lm-stat{text-align:center;}
.lm-stat .val{font-size:22px;font-weight:700;line-height:1;}
.lm-stat .lbl{font-size:10.5px;color:var(--text3);margin-top:2px;}
.lm-cho-char{
  width:50px;height:50px;border-radius:12px;
  border:2px solid rgba(46,196,182,.4);
  background:white;display:inline-flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:700;color:var(--mint);
  box-shadow:0 3px 12px rgba(46,196,182,.15);
  animation:pulse 2s ease-in-out infinite;
}
.lm-market-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.lm-market-item{
  border:1.5px solid var(--border);border-radius:12px;
  background:white;padding:10px 8px;text-align:center;
  cursor:pointer;transition:all .15s;
}
.lm-market-item:hover{border-color:var(--rose);background:var(--rose-lt);transform:translateY(-2px);}
.lm-market-item:active{transform:scale(.97);}
.lm-feed-log{max-height:150px;overflow-y:auto;}
.lm-feed-log::-webkit-scrollbar{width:3px;}
.lm-feed-log::-webkit-scrollbar-thumb{background:var(--rose-lt);}
.lm-chosung-chat{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;}
.lm-chosung-chat::-webkit-scrollbar{width:3px;}
.lm-chosung-chat::-webkit-scrollbar-thumb{background:rgba(46,196,182,.2);}
.lm-chat-msg{padding:5px 8px;border-radius:8px;font-size:13px;display:flex;gap:6px;align-items:baseline;}
.lm-chat-msg.correct{background:rgba(232,83,122,.07);border:1px solid rgba(232,83,122,.2);}
.lm-chat-nick{font-weight:700;font-size:12px;color:var(--rose2);flex-shrink:0;}
.lm-family-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;flex-wrap:wrap;}
.lm-breed-incoming{background:rgba(155,89,182,.07);border:1px solid rgba(155,89,182,.2);border-radius:10px;padding:10px;margin-top:8px;}
.lm-lb-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.lm-lb-rank{font-size:16px;width:26px;text-align:center;}
.lm-lb-pet{font-size:22px;}
.lm-lb-nick{flex:1;font-size:13px;font-weight:600;}
.lm-lb-pts{font-size:13px;font-weight:700;color:var(--gold);}
/* ── 추가된 커스텀 기능 UI ── */
.color-chart-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr); 
  gap: 8px; margin-top: 15px;
}
.color-slot {
  border: 1px solid var(--border); background: var(--cream);
  padding: 12px 5px;
  text-align: center; border-radius: 8px; cursor: pointer;
  transition: all 0.2s ease; box-shadow: 0 2px 4px rgba(232, 83, 122, 0.05);
}
.color-slot:hover {
  background: var(--rose-pale); border-color: var(--rose); transform: translateY(-2px);
}
.color-slot .slot-num { font-size: 0.75rem; color: var(--text3); margin-bottom: 4px;
}
.color-slot .slot-nick { font-size: 0.85rem; font-weight: 500; color: var(--text2); word-break: break-all; }
.color-slot.has-name { background: var(--rose-lt); border-color: var(--rose2);
}
.color-slot.has-name .slot-nick { color: var(--rose2); font-weight: 700; }
.action-btn.premium {
  background: linear-gradient(135deg, var(--gold), #e8c678);
  color: #fff; border: none; padding: 10px;
  border-radius: 8px; width: 100%;
  margin-top: 8px; cursor: pointer; font-weight: bold; font-family:'Noto Sans KR',sans-serif;
  box-shadow: 0 3px 10px rgba(212,168,83,.3);
  transition: all 0.2s ease;
}
.action-btn.premium:hover { opacity: 0.9; transform: translateY(-1px); }
.action-btn.premium:active { transform: scale(0.97);
}
/* ── 애정도 바 ── */
.affection-bar{height:5px;background:rgba(232,83,122,.12);border-radius:99px;overflow:hidden;margin-top:3px;}
.affection-fill{height:100%;background:linear-gradient(90deg,#F06292,var(--rose2));border-radius:99px;transition:width .5s ease;}
/* ── 장미꽃 알림판 스크롤 ── */
.mutual-roses-scroll{max-height:320px;overflow-y:auto;padding-right:2px;}
.mutual-roses-scroll::-webkit-scrollbar{width:3px;}
.mutual-roses-scroll::-webkit-scrollbar-thumb{background:var(--rose-lt);border-radius:99px;}
/* ── 2세 육아 케어 그리드 ── */
.baby-care-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.baby-care-item{
  border:1.5px solid var(--border);border-radius:12px;
  background:white;padding:12px 10px;text-align:center;
  cursor:pointer;transition:all .15s;
}
.baby-care-item:hover{border-color:var(--rose);background:var(--rose-lt);transform:translateY(-2px);}
.baby-care-item:active{transform:scale(.97);}
/* ── 던전 / 배틀 UI ── */
.dungeon-floor-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.dungeon-floor-card{border:1.5px solid var(--border);border-radius:12px;background:white;padding:12px 10px;text-align:center;cursor:pointer;transition:all .15s;}
.dungeon-floor-card:hover{border-color:var(--rose);background:var(--rose-lt);transform:translateY(-2px);}
.dungeon-floor-card.locked{opacity:.45;cursor:not-allowed;pointer-events:none;}
.hp-bar{height:10px;background:#FFCDD2;border-radius:99px;overflow:hidden;}
.hp-fill{height:100%;background:linear-gradient(90deg,#EF5350,#E53935);border-radius:99px;transition:width .4s ease;}
.mp-bar{height:10px;background:#BBDEFB;border-radius:99px;overflow:hidden;}
.mp-fill{height:100%;background:linear-gradient(90deg,#42A5F5,#1E88E5);border-radius:99px;transition:width .4s ease;}
.sp-bar{height:8px;background:#E1BEE7;border-radius:99px;overflow:hidden;}
.sp-fill{height:100%;background:linear-gradient(90deg,#AB47BC,#8E24AA);border-radius:99px;transition:width .4s ease;}
.battle-log{max-height:130px;overflow-y:auto;font-size:12px;line-height:1.7;color:var(--text2);padding:6px 8px;background:rgba(0,0,0,.02);border-radius:8px;border:1px solid var(--border);}
.battle-log::-webkit-scrollbar{width:3px;}
.battle-log::-webkit-scrollbar-thumb{background:var(--rose-lt);}
.skill-btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.dice-stat-box{background:white;border:1.5px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.dice-stat-box .val{font-size:20px;font-weight:700;color:var(--rose2);}
.dice-stat-box .lbl{font-size:10.5px;color:var(--text3);margin-top:2px;}
/* ── 등급별 펫 글로우 효과 (3D 퀄리티) ── */
.glow-normal  { box-shadow: 0 0 15px rgba(158,158,158,.3), var(--shadow); }
.glow-rare    { box-shadow: 0 0 25px rgba(33,150,243,.5), 0 0 60px rgba(33,150,243,.15), var(--shadow); }
.glow-epic    { box-shadow: 0 0 30px rgba(156,39,176,.6), 0 0 80px rgba(156,39,176,.2), var(--shadow); }
.glow-unique  { box-shadow: 0 0 35px rgba(255,87,34,.7), 0 0 90px rgba(255,87,34,.25), var(--shadow); }
.glow-legend  { box-shadow: 0 0 40px rgba(244,67,54,.8), 0 0 100px rgba(244,67,54,.3), var(--shadow); }
.glow-rebirth { box-shadow: 0 0 50px rgba(255,215,0,1), 0 0 120px rgba(255,165,0,.6), 0 0 200px rgba(255,100,0,.3); animation: rebirthPulse 2s ease-in-out infinite; }
@keyframes rebirthPulse { 0%,100%{box-shadow:0 0 50px rgba(255,215,0,1),0 0 120px rgba(255,165,0,.6);} 50%{box-shadow:0 0 70px rgba(255,215,0,1),0 0 160px rgba(255,165,0,.8),0 0 250px rgba(255,100,0,.5);} }
/* ── 장착 아이템 슬롯 ── */
.equip-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:10px; }
.equip-slot { border:1.5px solid var(--border); border-radius:10px; background:white; padding:8px 6px; text-align:center; cursor:pointer; transition:all .15s; min-height:64px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
.equip-slot:hover { border-color:var(--rose); background:var(--rose-lt); transform:translateY(-2px); }
.equip-slot.filled { background:linear-gradient(135deg,rgba(232,83,122,.06),rgba(155,89,182,.06)); border-color:var(--rose2); }
.equip-slot .slot-emoji { font-size:24px; }
.equip-slot .slot-name { font-size:9px; color:var(--text3); }
.equip-slot .slot-item { font-size:10.5px; font-weight:600; color:var(--text1); }
.grade-normal  { color:#9E9E9E !important; }
.grade-rare    { color:#2196F3 !important; }
.grade-epic    { color:#9C27B0 !important; }
.grade-unique  { color:#FF5722 !important; }
.grade-legend  { color:#F44336 !important; }
.grade-god     { color:#FFD700 !important; }

/* 1. 강화 모달 스타일 */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.6);
  display: flex; justify-content: center; align-items: center;
  z-index: 10000; /* 다른 UI보다 가장 위에 표시 */
  animation: fadeIn .25s ease;
}
.modal-content {
  background: white; padding: 25px; border-radius: 20px;
  width: 88%; max-width: 360px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  text-align: center; color: var(--text1);
}
.modal-content h3 { margin-top: 0; color: var(--rose); }
.modal-btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
.btn-enhance { background: linear-gradient(135deg,var(--rose),var(--rose2)); color: white; border: none; padding: 11px 22px; border-radius: 10px; cursor: pointer; font-weight:600; box-shadow:0 3px 12px rgba(232,83,122,.35); transition:all .15s; }
.btn-enhance:hover { opacity:.9; box-shadow:0 5px 18px rgba(232,83,122,.45); }
.btn-enhance:active { transform:scale(.97); }
.btn-cancel { background: #eee; color: #555; border: none; padding: 11px 22px; border-radius: 10px; cursor: pointer; transition:all .15s; }
.btn-cancel:hover { background:#ddd; }

/* 강화 결과 — 성공/실패 연출 */
@keyframes enhanceShake {
  0%, 100% { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
  20%, 40%, 60%, 80% { transform: translateX(8px); }
}
@keyframes enhanceSuccess {
  0% { transform: scale(.5); opacity:0; }
  50% { transform: scale(1.15); opacity:1; }
  100% { transform: scale(1); opacity:1; }
}
@keyframes enhanceBreak {
  0% { transform: scale(1) rotate(0); opacity:1; filter:none; }
  30% { transform: scale(1.1) rotate(-5deg); }
  60% { transform: scale(.9) rotate(8deg); filter:grayscale(.5); }
  100% { transform: scale(.7) rotate(-15deg); opacity:.3; filter:grayscale(1) blur(1px); }
}
.enhance-result-success { animation: enhanceSuccess .6s cubic-bezier(.34,1.56,.64,1); }
.enhance-result-fail { animation: enhanceShake .55s ease; }
.enhance-broken { animation: enhanceBreak 1.1s ease forwards; display:inline-block; }
.stat-arrow { color: var(--mint); font-weight:700; margin:0 4px; }
.stat-after { color: var(--rose2); font-weight:800; }

/* ── 능력치 분석 카드 (장비/칭호 발동 효과) ── */
.stat-card {
  background: linear-gradient(135deg, rgba(253,238,244,.7), rgba(240,230,255,.7));
  border: 1px solid rgba(155,89,182,.22);
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 12px;
  box-shadow: 0 3px 12px rgba(155,89,182,.08);
}
.stat-card-title {
  font-size: 12.5px; font-weight: 700;
  color: var(--plum); margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.stat-section {
  background: rgba(255,255,255,.7);
  border-radius: 10px;
  padding: 8px 10px;
  margin-bottom: 8px;
}
.stat-section:last-child { margin-bottom: 0; }
.stat-section-head {
  font-size: 11px; font-weight: 700;
  color: var(--text2); margin-bottom: 6px;
  display: flex; align-items: center; gap: 5px;
  letter-spacing: .3px;
}
.stat-item-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0; font-size: 11.5px;
  border-bottom: 1px dashed rgba(155,89,182,.12);
}
.stat-item-row:last-child { border-bottom: none; }
.stat-item-row .e { font-size: 18px; flex-shrink:0; }
.stat-item-row .nm { flex: 1; font-weight: 600; min-width: 0; }
.stat-item-row .bn { color: var(--mint); font-weight: 700; white-space: nowrap; font-size: 11px; }
.stat-item-row .enh-badge {
  display:inline-block; padding:1px 6px; border-radius:99px;
  background:linear-gradient(135deg,var(--rose),var(--rose2));
  color:white; font-size:9.5px; font-weight:700; margin-left:4px;
}
.stat-total-row {
  display: flex; justify-content: space-around;
  background: linear-gradient(135deg, rgba(46,196,182,.12), rgba(212,168,83,.12));
  border-radius: 10px; padding: 10px 6px; margin-top: 10px;
  border: 1px solid rgba(46,196,182,.2);
}
.stat-total-cell { text-align: center; flex: 1; }
.stat-total-cell .v {
  font-size: 16px; font-weight: 800;
  color: var(--text1); line-height: 1;
}
.stat-total-cell .l {
  font-size: 9.5px; color: var(--text3);
  margin-top: 2px; letter-spacing: .3px;
}
.stat-total-cell .delta {
  font-size: 9px; color: var(--mint);
  font-weight: 700; display: block; margin-top: 1px;
}
.stat-empty {
  text-align: center; padding: 8px; font-size: 11px;
  color: var(--text3); font-style: italic;
}
.title-chip-mini {
  display:inline-flex; align-items:center; gap:3px;
  padding:2px 8px; border-radius:99px;
  font-size:10px; font-weight:700;
  background:linear-gradient(135deg,#FFF3CD,#FFE082);
  color:#8B6914; border:1px solid rgba(212,168,83,.4);
  margin-left:4px;
}
.title-chip-mini.epic {background:linear-gradient(135deg,#E1BEE7,#CE93D8);color:#4A148C;border-color:rgba(156,39,176,.4);}
.title-chip-mini.unique {background:linear-gradient(135deg,#FFCCBC,#FFAB91);color:#BF360C;border-color:rgba(255,87,34,.5);}
.title-chip-mini.legend {background:linear-gradient(135deg,#FFE082,#FFB300);color:#7B5400;border-color:rgba(255,179,0,.6);box-shadow:0 0 8px rgba(255,179,0,.3);}
.title-chip-mini.rare {background:linear-gradient(135deg,#BBDEFB,#90CAF9);color:#0D47A1;border-color:rgba(33,150,243,.4);}

/* ── 펫 이동 컨트롤 (하우스 탭) ── */
.pet-move-panel {
  background: linear-gradient(135deg, rgba(232,83,122,.06), rgba(155,89,182,.06));
  border: 1.5px solid rgba(232,83,122,.2);
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 14px;
}
.pet-move-title {
  font-size: 12.5px; font-weight: 700;
  color: var(--rose2);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.pet-move-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
.pet-move-row:last-child { margin-bottom: 0; }
.pet-move-label {
  font-size: 11px; font-weight: 600;
  color: var(--text2); width: 56px; flex-shrink: 0;
}
.pet-move-btn {
  width: 28px; height: 28px;
  border-radius: 8px; border: 1px solid var(--border2);
  background: white; color: var(--rose2);
  font-size: 13px; font-weight: 700;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.pet-move-btn:hover { background: var(--rose-lt); }
.pet-move-btn:active { transform: scale(.9); }
.pet-move-slider {
  flex: 1; height: 6px;
  -webkit-appearance: none; appearance: none;
  background: rgba(232,83,122,.15);
  border-radius: 99px; outline: none;
}
.pet-move-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 18px; height: 18px; border-radius: 50%;
  background: linear-gradient(135deg, var(--rose), var(--rose2));
  cursor: pointer; box-shadow: 0 2px 6px rgba(232,83,122,.4);
}
.pet-move-slider::-moz-range-thumb {
  width: 18px; height: 18px; border-radius: 50%;
  background: linear-gradient(135deg, var(--rose), var(--rose2));
  cursor: pointer; border: none;
}
.pet-move-val {
  font-size: 11px; font-weight: 700;
  color: var(--rose2); width: 44px;
  text-align: right; flex-shrink: 0;
}
.pet-move-actions {
  display: flex; gap: 6px; margin-top: 10px;
}
.pet-move-actions .btn { flex: 1; padding: 7px; font-size: 11.5px; }
.pet-move-status {
  font-size: 10.5px; color: var(--text3);
  text-align: center; margin-top: 6px;
  font-style: italic;
}

/* ── 칭호 선택 카드 (My Titles 모달) ── */
.title-card-row {
  display: block;
  width: 100%;
  text-align: left;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  background: white;
  color: var(--text1);
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all .15s;
}
.title-card-row:hover {
  border-color: var(--rose);
  background: var(--rose-pale);
  transform: translateY(-1px);
}
.title-card-row:active { transform: scale(.98); }
.title-card-row.active {
  border-color: var(--mint);
  background: linear-gradient(135deg, rgba(46,196,182,.08), rgba(46,196,182,.03));
  box-shadow: 0 0 0 1px rgba(46,196,182,.3) inset, 0 2px 8px rgba(46,196,182,.15);
}



/* ────────────────────────────────────────
   🏠 하우스 — 인테리어 잡지 감성 UI + 가구 편집기
   ──────────────────────────────────────── */
/* 메인 3D 캔버스 — 깊이감 있는 프레임 */
.house-stage {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  background:
    radial-gradient(ellipse at top, rgba(255,182,193,.15) 0%, transparent 60%),
    linear-gradient(180deg, #1f1a2e 0%, #0d0a18 100%);
  box-shadow:
    0 1px 0 rgba(255,255,255,.08) inset,
    0 24px 60px rgba(232,83,122,.18),
    0 8px 24px rgba(0,0,0,.25);
  border: 1px solid rgba(232,83,122,.2);
}
.house-stage::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(232,83,122,.12), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(124,63,126,.10), transparent 40%);
  pointer-events: none; z-index: 1;
}
.house-canvas-wrap {
  width: 100%;
  height: 420px;
  position: relative;
  z-index: 2;
}
.house-canvas-wrap canvas { display: block; width: 100% !important; height: 100% !important; }
/* 상단 오버레이 */
.house-overlay-top {
  position: absolute;
  top: 14px; left: 14px; right: 14px;
  z-index: 3;
  display: flex; justify-content: space-between; align-items: flex-start;
  pointer-events: none;
}
.house-name-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(232,83,122,.25);
  border-radius: 99px;
  padding: 6px 14px 6px 10px;
  box-shadow: 0 4px 14px rgba(0,0,0,.18);
}
.house-name-badge .emoji { font-size: 18px; }
.house-name-badge .name { font-size: 12.5px; font-weight: 700; color: var(--text1); letter-spacing: .2px; }
.house-name-badge .meta { font-size: 10px; color: var(--text3); margin-left: 2px; }
.house-visitor-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(0,0,0,.5);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,.15);
  color: #fff;
  border-radius: 99px;
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 600;
}
.house-visitor-pill .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #4ADE80;
  box-shadow: 0 0 8px #4ADE80;
}
/* 편집 모드 알림 배지 */
.editing-banner {
  position: absolute;
  bottom: 50px; left: 50%; transform: translateX(-50%);
  z-index: 4;
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, #FFD54F, #FFA726);
  color: #5D4037;
  border-radius: 99px;
  padding: 7px 16px;
  font-size: 12px;
  font-weight: 700;
  box-shadow: 0 6px 20px rgba(255,167,38,.5);
  animation: editPulse 1.5s ease-in-out infinite;
  letter-spacing: .3px;
}
@keyframes editPulse {
  0%,100% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.04); }
}
/* 컨트롤 힌트 */
.house-ctrl-hint {
  position: absolute; bottom: 12px; right: 14px;
  z-index: 3;
  font-size: 10.5px;
  color: rgba(255,255,255,.65);
  background: rgba(0,0,0,.4);
  backdrop-filter: blur(6px);
  padding: 4px 10px;
  border-radius: 99px;
  pointer-events: none;
  letter-spacing: .3px;
}
/* 액션 바 */
.house-action-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(253,238,244,.92));
  border-top: 1px solid var(--border);
}
.house-action-bar .info { font-size: 11.5px; color: var(--text2); }
.house-action-bar .info b { color: var(--text1); font-weight: 700; }
/* 섹션 헤더 */
.deco-section { margin-bottom: 14px; }
.deco-section-head {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 0 2px 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.deco-section-head .title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 17px;
  font-weight: 700;
  color: var(--rose2);
  letter-spacing: .3px;
}
.deco-section-head .sub {
  font-size: 10.5px;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
}
/* 등급 카드 */
.tier-scroll {
  display: flex; gap: 10px;
  overflow-x: auto; scrollbar-width: none;
  padding-bottom: 4px; margin: 0 -4px;
}
.tier-scroll::-webkit-scrollbar { display: none; }
.tier-card-pro {
  flex-shrink: 0; width: 130px;
  border-radius: 14px; background: white;
  border: 1.5px solid var(--border);
  padding: 14px 10px 12px; text-align: center;
  cursor: pointer; transition: all .2s cubic-bezier(.4,0,.2,1);
  position: relative; overflow: hidden;
}
.tier-card-pro:hover {
  transform: translateY(-3px);
  border-color: var(--rose);
  box-shadow: 0 8px 20px rgba(232,83,122,.18);
}
.tier-card-pro.current {
  background: linear-gradient(160deg, var(--rose-lt), white);
  border-color: var(--rose2); border-width: 2px;
}
.tier-card-pro.current::before {
  content: 'NOW LIVING';
  position: absolute; top: 8px; right: -22px;
  background: var(--rose2); color: white;
  font-size: 8.5px; font-weight: 700;
  padding: 2px 24px; transform: rotate(35deg);
  letter-spacing: 1px;
}
.tier-card-pro.locked { opacity: .45; cursor: not-allowed; }
.tier-card-pro .tier-emoji {
  font-size: 38px; margin-bottom: 6px;
  filter: drop-shadow(0 3px 6px rgba(232,83,122,.25));
}
.tier-card-pro .tier-name { font-size: 13px; font-weight: 700; color: var(--text1); margin-bottom: 4px; }
.tier-card-pro .tier-meta { font-size: 10px; color: var(--text3); margin-bottom: 8px; line-height: 1.5; }
.tier-card-pro .tier-cost {
  font-size: 11.5px; font-weight: 700;
  color: var(--gold);
  padding: 4px 10px;
  background: rgba(212,168,83,.1);
  border-radius: 99px; display: inline-block;
}
.tier-card-pro.current .tier-cost { background: var(--rose); color: white; }
/* 벽지/바닥 스워치 */
.swatch-row { display: flex; gap: 8px; flex-wrap: wrap; }
.swatch-card {
  flex: 1; min-width: 88px;
  border-radius: 12px; overflow: hidden;
  cursor: pointer; border: 2px solid transparent;
  transition: all .2s; background: white;
}
.swatch-card:hover { transform: translateY(-2px); }
.swatch-card.active {
  border-color: var(--rose2);
  box-shadow: 0 6px 16px rgba(232,83,122,.25);
}
.swatch-preview { height: 48px; position: relative; }
.swatch-preview::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,.15), transparent 50%);
}
.swatch-info { padding: 6px 8px; text-align: center; }
.swatch-info .name { font-size: 11px; font-weight: 600; color: var(--text1); line-height: 1.2; }
.swatch-info .price { font-size: 10px; color: var(--gold); margin-top: 2px; font-weight: 600; }
.swatch-card.active .swatch-info .name { color: var(--rose2); }
/* 가구 상점 */
.furn-grid-pro { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.furn-card-pro {
  background: white; border-radius: 14px;
  border: 1.5px solid var(--border);
  padding: 14px 10px 10px; text-align: center;
  cursor: pointer; transition: all .2s cubic-bezier(.4,0,.2,1);
  position: relative; overflow: hidden;
}
.furn-card-pro:hover {
  transform: translateY(-3px);
  border-color: var(--rose);
  box-shadow: 0 10px 22px rgba(232,83,122,.18);
}
.furn-card-pro .grade-tag {
  position: absolute; top: 8px; left: 8px;
  font-size: 8.5px; font-weight: 700;
  padding: 2px 7px; border-radius: 99px;
  letter-spacing: .5px; text-transform: uppercase;
}
.furn-card-pro .grade-tag.normal { background: #ECEFF1; color: #607D8B; }
.furn-card-pro .grade-tag.rare   { background: #E3F2FD; color: #1976D2; }
.furn-card-pro .grade-tag.epic   { background: #F3E5F5; color: #8E24AA; }
.furn-card-pro .grade-tag.unique { background: #FFF3E0; color: #F4511E; }
.furn-card-pro .grade-tag.legend { background: linear-gradient(135deg,#FFE082,#FFB74D); color: #E65100; }
.furn-card-pro .furn-emoji {
  font-size: 44px; margin: 8px 0 6px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,.12));
  transition: transform .3s;
}
.furn-card-pro:hover .furn-emoji { transform: scale(1.1) rotate(-3deg); }
.furn-card-pro .furn-name { font-size: 12.5px; font-weight: 700; color: var(--text1); margin-bottom: 6px; line-height: 1.3; }
.furn-card-pro .furn-cost { font-size: 11.5px; font-weight: 700; color: var(--gold); }
/* 가구 칩 */
.furn-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 7px 11px;
  font-size: 12px; font-weight: 600; color: var(--text1);
  cursor: pointer; transition: all .15s;
}
.furn-chip:hover { border-color: var(--rose); background: var(--rose-lt); }
.furn-chip.placed {
  background: linear-gradient(135deg, rgba(232,83,122,.08), rgba(155,89,182,.05));
  border-color: var(--rose2);
}
.furn-chip.editing {
  background: linear-gradient(135deg, #FFD54F, #FFA726) !important;
  border-color: #FF8F00 !important;
  color: #5D4037 !important;
  box-shadow: 0 4px 14px rgba(255,167,38,.4);
}
.furn-chip .chip-emoji { font-size: 18px; }
.furn-chip .chip-edit { color: var(--rose2); font-size: 11px; margin-left: 2px; }
/* ───────────────────────────────────────
   🎯 가구 편집기 패널
   ─────────────────────────────────────── */
.furniture-editor {
  background: linear-gradient(160deg, #FFFBF0 0%, #FFF8E1 100%);
  border: 2px solid #FFB74D;
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 14px;
  box-shadow: 0 8px 26px rgba(255,167,38,.18);
  animation: slideDown .25s ease;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.editor-header {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 12px;
  border-bottom: 1px dashed rgba(255,143,0,.35);
  margin-bottom: 12px;
}
.editor-header .e-emoji {
  font-size: 32px;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,.15));
}
.editor-header .e-name {
  flex: 1;
  font-size: 14px;
  font-weight: 700;
  color: #5D4037;
}
.editor-header .e-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: #FF8F00; color: white;
  border-radius: 99px;
  padding: 3px 10px;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: .3px;
}
/* 편집 도움말 */
.editor-help {
  font-size: 10.5px;
  color: #8D6E63;
  text-align: center;
  background: rgba(255,255,255,.5);
  border-radius: 8px;
  padding: 6px 10px;
  margin-bottom: 10px;
  line-height: 1.5;
}
/* 컨트롤 행 */
.editor-row {
  display: grid;
  grid-template-columns: 50px 30px 1fr 30px 52px;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
}
.editor-row .e-label {
  font-size: 11.5px;
  font-weight: 700;
  color: #6D4C41;
}
.editor-row .e-val {
  font-size: 12.5px;
  font-weight: 700;
  color: #E65100;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.e-step-btn {
  width: 30px; height: 30px;
  border-radius: 8px;
  border: 1.5px solid #FFB74D;
  background: white;
  color: #E65100;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all .12s;
  padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  user-select: none;
}
.e-step-btn:hover { background: #FFE0B2; transform: scale(1.05); }
.e-step-btn:active { transform: scale(.92); }
/* 슬라이더 */
.e-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%; height: 8px;
  background: linear-gradient(90deg, #FFE0B2, #FFB74D);
  border-radius: 99px;
  outline: none;
  cursor: pointer;
}
.e-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FF6F00, #E65100);
  border: 2px solid white;
  box-shadow: 0 3px 8px rgba(230,81,0,.4);
  cursor: pointer;
  transition: transform .1s;
}
.e-slider::-webkit-slider-thumb:hover { transform: scale(1.12); }
.e-slider::-moz-range-thumb {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FF6F00, #E65100);
  border: 2px solid white;
  box-shadow: 0 3px 8px rgba(230,81,0,.4);
  cursor: pointer;
}
/* 회전 프리셋 */
.rot-presets {
  display: flex; gap: 4px;
  margin: 8px 0 12px;
  padding: 4px;
  background: rgba(255,143,0,.08);
  border-radius: 10px;
}
.rot-preset {
  flex: 1;
  padding: 7px 4px;
  border: none;
  background: transparent;
  font-size: 10.5px;
  font-weight: 700;
  color: #6D4C41;
  border-radius: 7px;
  cursor: pointer;
  transition: all .12s;
  font-family: 'Noto Sans KR', sans-serif;
}
.rot-preset:hover { background: white; color: #E65100; }
.rot-preset.active {
  background: linear-gradient(135deg, #FF8F00, #E65100);
  color: white;
  box-shadow: 0 2px 8px rgba(230,81,0,.35);
}
/* 액션 버튼 */
.editor-actions {
  display: flex; gap: 6px;
  padding-top: 10px;
  border-top: 1px dashed rgba(255,143,0,.35);
}
.editor-actions .btn {
  flex: 1;
  padding: 11px 8px;
  font-size: 12.5px;
}

/* ── ✨ 고퀄리티 펫 캐릭터 카드 ── */
.pet-character-card {

@keyframes petBreathe {
  0%, 100% { transform: scale(1) translateY(0); }

  50% { filter: drop-shadow(0 6px 16px rgba(255,87,34,.7)) drop-shadow(0 0 40px rgba(255,87,34,.6)) hue-rotate(15deg); }
  100% { filter: drop-shadow(0 6px 16px rgba(255,215,0,.7)) drop-shadow(0 0 30px rgba(255,215,0,.5)) hue-rotate(0deg); }

.pet-equipment-overlay {

}
@keyframes equipFloat {
  0%, 100% { transform: translateY(0); }

}
.eq-head     { top: -12%; left: 50%; transform: translateX(-50%); font-size: 32px; z-index: 3; }
.eq-weapon   { right: -8%; bottom: 8%; font-size: 28px; transform: rotate(-20deg); z-index: 4; }
.eq-armor    { bottom: -8%; left: 50%; transform: translateX(-50%); font-size: 24px; opacity: .85; z-index: 2; }
.eq-wing     { top: 15%; left: -20%; font-size: 36px; animation: wingFlap 1.5s ease-in-out infinite; z-index: 1; }
@keyframes wingFlap {
  0%, 100% { transform: rotate(-12deg) scale(1, 1); }
  50% { transform: rotate(-20deg) scale(1, 1.1); }
}
.eq-accessory{ top: 10%; right: -10%; font-size: 22px; animation: accessoryPulse 2s ease-in-out infinite; z-index: 4; }
@keyframes accessoryPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.15); opacity: .85; }
}

@keyframes specialOrbit {
  0%   { transform: rotate(0deg) translateX(8px) rotate(0deg); }
  100% { transform: rotate(360deg) translateX(8px) rotate(-360deg); }
}
.pet-shadow {
  position: absolute;
  bottom: -6px;
  left: 50%;
  transform: translateX(-50%);
  width: 70%;
  height: 12px;

  position: absolute;

}

.evo-effect-particles span:nth-child(4) { bottom: 10%; right: 20%; animation-delay: 1.8s; }
@keyframes particleFloat {
  0%, 100% { opacity: 0; transform: translateY(0) scale(.5); }
  50% { opacity: 1; transform: translateY(-15px) scale(1); }

/* ═══════════════════════════════════════

═══════════════════════════════════════ */

@keyframes legendSpin{to{transform:rotate(360deg)}}
.gacha-result-card>*{position:relative;z-index:1;}
.grade-chip{display:inline-block;padding:3px 12px;border-radius:99px;font-size:10.5px;font-weight:700;color:white;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
.grade-chip.normal{background:#9E9E9E;}
.grade-chip.rare{background:#2196F3;}
.grade-chip.epic{background:#FF5722;}
.grade-chip.unique{background:#E91E63;}
.grade-chip.legend{background:linear-gradient(135deg,#FFD700,#FF8C00);box-shadow:0 0 8px rgba(255,215,0,.5);}
.gacha-history{margin-top:14px;}
.gacha-history-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:white;border:1px solid var(--border);border-radius:8px;margin-bottom:5px;font-size:12.5px;}

/* ═══════════════════════════════════════
   👶 2세 네비게이션
═══════════════════════════════════════ */
.baby-nav{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,rgba(155,89,182,.08),rgba(232,83,122,.06));border:1px solid rgba(155,89,182,.2);border-radius:12px;padding:8px 12px;margin-bottom:10px;}
.baby-nav-btn{background:white;border:1.5px solid var(--border2);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--rose2);transition:all .15s;}
.baby-nav-btn:hover:not(:disabled){background:var(--rose-lt);transform:scale(1.08);}
.baby-nav-btn:disabled{opacity:.3;cursor:not-allowed;}
.baby-nav-info{font-size:13px;font-weight:600;color:var(--plum);text-align:center;}
.baby-dots{display:flex;gap:5px;justify-content:center;margin-top:5px;}
.baby-dot{width:7px;height:7px;border-radius:50%;background:rgba(155,89,182,.2);transition:all .2s;}
.baby-dot.active{background:var(--plum);width:18px;border-radius:99px;}

/* ═══════════════════════════════════════
   📝 일일 퀘스트
═══════════════════════════════════════ */
.quest-card{background:linear-gradient(135deg,rgba(255,255,255,.96),rgba(253,238,244,.7));border:1.5px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all .15s;}
.quest-card.done{border-color:var(--mint);background:linear-gradient(135deg,rgba(232,248,247,.9),rgba(240,253,252,.9));}
.quest-card.claimed{opacity:.55;border-style:dashed;}
.quest-icon{font-size:30px;flex-shrink:0;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:rgba(232,83,122,.08);border-radius:12px;}
.quest-card.done .quest-icon{background:rgba(46,196,182,.15);}
.quest-body{flex:1;min-width:0;}
.quest-title{font-size:13.5px;font-weight:700;color:var(--text1);margin-bottom:4px;}
.quest-progress-bar{height:5px;background:rgba(0,0,0,.06);border-radius:99px;overflow:hidden;}
.quest-progress-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--rose2));border-radius:99px;transition:width .4s ease;}
.quest-card.done .quest-progress-fill{background:linear-gradient(90deg,var(--mint),#1A9E95);}
.quest-progress-text{font-size:10.5px;color:var(--text3);margin-top:3px;}
.quest-claim-btn{padding:7px 14px;font-size:12px;font-weight:700;border:none;border-radius:8px;cursor:pointer;background:linear-gradient(135deg,var(--gold),#B8860B);color:white;flex-shrink:0;box-shadow:0 2px 8px rgba(212,168,83,.35);}
.quest-claim-btn:hover{opacity:.9;transform:scale(1.04);}
.quest-claim-btn:disabled{background:#ccc;cursor:not-allowed;box-shadow:none;}
.quest-header{background:linear-gradient(135deg,rgba(232,83,122,.08),rgba(124,63,126,.06));border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;text-align:center;}

/* ═══════════════════════════════════════
   💰 되팔기 버튼
═══════════════════════════════════════ */
.sell-btn{padding:4px 8px;font-size:10.5px;border:1px solid #FFB74D;background:linear-gradient(135deg,#FFE082,#FFCA28);color:#5D4037;border-radius:6px;cursor:pointer;font-weight:700;margin-left:4px;}
.sell-btn:hover{background:linear-gradient(135deg,#FFD54F,#FFA000);}

/* ═══════════════════════════════════════
   🎴 펫 카드 스킨
═══════════════════════════════════════ */
.lm-pet-card[data-skin="mint"]{background:linear-gradient(160deg,rgba(232,248,247,.98),rgba(200,230,225,.95));border-color:rgba(46,196,182,.4);}

.lm-pet-card[data-skin="royal"]{background:linear-gradient(160deg,#FFF8E1,#FFE082,#FFD54F);border:3px solid #FFD700;box-shadow:0 8px 32px rgba(255,215,0,.35);}

.lm-pet-card[data-skin="phantom"]{background:linear-gradient(160deg,#1a0e2e,#2d1b4e,#3a1854);border:2px solid #BA68C8;color:#E1BEE7;box-shadow:0 0 30px rgba(186,104,200,.35);position:relative;overflow:hidden;}

/* ═══════════════════════════════════════

═══════════════════════════════════════ */

/* 1. 크리스탈 — 다이아몬드 패턴 */
.lm-pet-card[data-skin="crystal"]{

  background-size:200% 200%;
  border:2.5px solid rgba(255,255,255,.9);
  box-shadow:0 8px 26px rgba(180,200,220,.4),inset 0 0 40px rgba(255,255,255,.5);
  position:relative;overflow:hidden;
  animation:mirrorShine 5s ease-in-out infinite;
}
@keyframes mirrorShine{0%,100%{background-position:0% 0%}50%{background-position:100% 100%}}
.lm-pet-card[data-skin="mirror"]::after{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:linear-gradient(45deg,transparent 40%,rgba(255,255,255,.6) 50%,transparent 60%);
  animation:mirrorReflect 4s ease-in-out infinite;pointer-events:none;
}
@keyframes mirrorReflect{0%{transform:translate(-50%,-50%) rotate(0)}100%{transform:translate(50%,50%) rotate(360deg)}}

/* 18. 홀로그램 */
.lm-pet-card[data-skin="holographic"]{
  background:linear-gradient(135deg,
    #FF1493 0%,#FF69B4 14%,#FFD700 28%,#00FF7F 42%,
    #00CED1 56%,#9370DB 70%,#FF1493 84%,#FF69B4 100%);
  background-size:400% 400%;border:2.5px solid white;color:white;
  box-shadow:0 0 40px rgba(255,20,147,.5),0 0 60px rgba(0,255,127,.3);
  animation:holographicShift 5s ease infinite;position:relative;overflow:hidden;
  text-shadow:0 1px 4px rgba(0,0,0,.5);
}
@keyframes holographicShift{0%,100%{background-position:0% 50%;filter:hue-rotate(0deg)}50%{background-position:100% 50%;filter:hue-rotate(45deg)}}
.lm-pet-card[data-skin="holographic"]::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0,transparent 2px,rgba(255,255,255,.1) 2px,rgba(255,255,255,.1) 3px);
  pointer-events:none;
}
.lm-pet-card[data-skin="holographic"] .lm-stat .lbl,.lm-pet-card[data-skin="holographic"] .pet-evolution-stage{color:rgba(255,255,255,.85) !important;}

/* 19. 다이아몬드 더스트 */
.lm-pet-card[data-skin="diamonddust"]{
  background:
    radial-gradient(circle at 30% 30%,rgba(255,255,255,.95) 0%,transparent 25%),
    radial-gradient(circle at 70% 70%,rgba(255,255,255,.7) 0%,transparent 25%),
    linear-gradient(160deg,#E3F2FD,#FFFFFF,#E1F5FE);
  border:3px solid #FFFFFF;color:#0D47A1;
  box-shadow:0 0 30px rgba(187,222,251,.9),0 0 60px rgba(255,255,255,.6),inset 0 0 30px rgba(255,255,255,.8);
  position:relative;overflow:hidden;
}
.lm-pet-card[data-skin="diamonddust"]::before{
  content:'✦ 💠 ✧ 💠 ✦ 💠 ✧';position:absolute;inset:0;font-size:12px;letter-spacing:22px;line-height:30px;
  color:rgba(33,150,243,.5);animation:starDrift 10s linear infinite;pointer-events:none;
}
.lm-pet-card[data-skin="diamonddust"]::after{
  content:'';position:absolute;inset:0;
  background:repeating-conic-gradient(from 0deg,transparent 0deg,transparent 30deg,rgba(33,150,243,.04) 30deg,rgba(33,150,243,.04) 60deg);
  pointer-events:none;animation:starSwirl 40s linear infinite;
}

/* 20. 드래곤 스케일 */
.lm-pet-card[data-skin="dragonscale"]{
  background:
    radial-gradient(circle at 15% 25%,rgba(0,191,165,.4) 8px,transparent 9px) 0 0/24px 24px,
    radial-gradient(circle at 15% 25%,rgba(0,191,165,.4) 8px,transparent 9px) 12px 12px/24px 24px,
    linear-gradient(160deg,#004D40,#00695C,#00897B);
  border:3px solid #FFD700;color:#FFF8E1;
  box-shadow:0 8px 30px rgba(0,150,136,.5),inset 0 0 40px rgba(255,215,0,.1);
  position:relative;overflow:hidden;
}
.lm-pet-card[data-skin="dragonscale"]::before{
  content:'🐉';position:absolute;top:50%;left:50%;font-size:120px;opacity:.06;
  transform:translate(-50%,-50%);pointer-events:none;
}
.lm-pet-card[data-skin="dragonscale"]::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 30%,rgba(255,215,0,.15) 50%,transparent 70%);
  animation:gemShine 5s ease-in-out infinite;pointer-events:none;
}
.lm-pet-card[data-skin="dragonscale"] .lm-stat .lbl,.lm-pet-card[data-skin="dragonscale"] .pet-evolution-stage{color:rgba(255,248,225,.75) !important;}

.skin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;}
.skin-mini{aspect-ratio:1;border-radius:12px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2);text-align:center;padding:4px;position:relative;transition:all .15s;overflow:hidden;}
.skin-mini.active{border-color:var(--rose);box-shadow:0 0 0 3px rgba(232,83,122,.18);}
.skin-mini.locked{opacity:.4;cursor:not-allowed;}
.skin-mini .lock-icon{position:absolute;top:4px;right:4px;font-size:11px;}

/* 칭호 */
.title-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:10.5px;font-weight:700;letter-spacing:.5px;background:linear-gradient(135deg,#FFD700,#FF8C00);color:white;box-shadow:0 2px 8px rgba(255,140,0,.3);}
.title-chip.normal{background:#9E9E9E;}
.title-chip.rare{background:linear-gradient(135deg,#42A5F5,#1976D2);}
.title-chip.epic{background:linear-gradient(135deg,#FF7043,#E64A19);}
.title-chip.unique{background:linear-gradient(135deg,#EC407A,#C2185B);}
.title-chip.legend{background:linear-gradient(135deg,#FFD700,#FF6F00);box-shadow:0 0 12px rgba(255,215,0,.55);}

/* ═══════════════════════════════════════
   🃏 원카드 게임
═══════════════════════════════════════ */
.onecard-stage{background:linear-gradient(180deg,#0d4d2c 0%,#1a6b3e 100%);border-radius:18px;padding:16px;position:relative;overflow:hidden;box-shadow:inset 0 4px 20px rgba(0,0,0,.4);}
.onecard-stage::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(255,255,255,.06) 0%,transparent 70%);pointer-events:none;}
.onecard-cpu,.onecard-me{position:relative;z-index:1;text-align:center;margin:6px 0;}
.onecard-label{font-size:11.5px;color:rgba(255,255,255,.75);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;font-weight:600;}
.onecard-hand{display:flex;justify-content:center;gap:-12px;flex-wrap:wrap;min-height:80px;padding:0 8px;}
.oc-card{width:54px;height:78px;background:white;border-radius:7px;border:1.5px solid #333;box-shadow:0 3px 8px rgba(0,0,0,.45);display:inline-flex;flex-direction:column;justify-content:space-between;padding:5px 6px;font-weight:700;cursor:pointer;transition:transform .15s,margin-top .15s;margin-left:-16px;position:relative;font-family:Georgia,serif;}
.oc-card:first-child{margin-left:0;}
.oc-card.red{color:#D32F2F;}
.oc-card.black{color:#212121;}
.oc-card:hover.playable{transform:translateY(-8px);box-shadow:0 6px 14px rgba(0,0,0,.5);}
.oc-card.playable{border-color:#FFD700;box-shadow:0 3px 8px rgba(0,0,0,.45),0 0 0 1.5px rgba(255,215,0,.5);}
.oc-card:not(.playable){opacity:.72;cursor:not-allowed;}
.oc-card .rank-top{font-size:14px;line-height:1;}
.oc-card .suit-big{font-size:22px;text-align:center;}
.oc-card .rank-bot{font-size:14px;line-height:1;transform:rotate(180deg);align-self:flex-end;}
.oc-back{width:54px;height:78px;background:repeating-linear-gradient(45deg,#7B1FA2 0,#7B1FA2 6px,#4A148C 6px,#4A148C 12px);border-radius:7px;border:1.5px solid #311B92;box-shadow:0 3px 8px rgba(0,0,0,.45);margin-left:-16px;display:inline-block;position:relative;}
.oc-back:first-child{margin-left:0;}
.oc-back::after{content:'♥';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#FFD700;font-size:20px;text-shadow:0 0 4px rgba(0,0,0,.5);}
.onecard-center{display:flex;justify-content:center;align-items:center;gap:18px;padding:14px 0;position:relative;z-index:1;}
.oc-deck{width:60px;height:84px;background:repeating-linear-gradient(45deg,#3949AB 0,#3949AB 6px,#1A237E 6px,#1A237E 12px);border-radius:8px;border:2px solid #283593;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white;font-size:22px;transition:transform .15s;box-shadow:0 4px 12px rgba(0,0,0,.45);}
.oc-deck:hover{transform:scale(1.05);}
.oc-deck.disabled{opacity:.55;cursor:not-allowed;}
.oc-top{width:60px;height:84px;background:white;border-radius:8px;border:2px solid #333;display:flex;flex-direction:column;justify-content:space-between;padding:6px 8px;box-shadow:0 4px 12px rgba(0,0,0,.45);font-family:Georgia,serif;font-weight:700;}
.oc-top.red{color:#D32F2F;}
.oc-top.black{color:#212121;}
.oc-top .rank-top{font-size:16px;line-height:1;}
.oc-top .suit-big{font-size:28px;text-align:center;}
.oc-top .rank-bot{font-size:16px;line-height:1;transform:rotate(180deg);align-self:flex-end;}
.onecard-info{display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.25);border-radius:8px;padding:7px 12px;margin-top:10px;font-size:11.5px;color:white;position:relative;z-index:1;}
.suit-picker{display:flex;gap:10px;justify-content:center;margin-top:10px;}
.suit-pick-btn{width:48px;height:48px;border-radius:10px;background:white;border:2px solid var(--border);font-size:26px;cursor:pointer;transition:all .15s;}
.suit-pick-btn:hover{transform:scale(1.1);border-color:var(--rose);}
.suit-pick-btn.red{color:#D32F2F;}
.suit-pick-btn.black{color:#212121;}
.onecard-log{max-height:120px;overflow-y:auto;background:rgba(0,0,0,.35);border-radius:8px;padding:8px 10px;font-size:11.5px;color:rgba(255,255,255,.85);line-height:1.6;margin-top:10px;position:relative;z-index:1;}
.onecard-log::-webkit-scrollbar{width:3px;}
.onecard-log::-webkit-scrollbar-thumb{background:rgba(255,255,255,.3);border-radius:99px;}
.bet-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.bet-btn{padding:14px;border-radius:12px;border:2px solid var(--border);background:white;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:14px;color:var(--text1);transition:all .15s;}
.bet-btn:hover{border-color:var(--rose);transform:translateY(-2px);box-shadow:0 4px 12px rgba(232,83,122,.18);}
.bet-btn:disabled{opacity:.4;cursor:not-allowed;}
.onecard-result{text-align:center;padding:20px;background:white;border-radius:14px;animation:fadeIn .5s ease;}
.onecard-result.win{background:linear-gradient(135deg,#FFF9C4,#FFE082);border:2px solid #FFD700;}
.onecard-result.lose{background:linear-gradient(135deg,#FFCDD2,#EF9A9A);border:2px solid #E53935;}
</style>

<script>
  // 1. 마우스 우클릭 방지
  document.addEventListener('contextmenu', function(e) { 
    e.preventDefault(); 
  });

  // 2. 키보드 단축키 차단 (F12, Ctrl+Shift+I/J/C, Ctrl+U 등)
  document.addEventListener('keydown', function(e) {
    if (
      e.key === 'F12' ||
      (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
      (e.ctrlKey && e.key === 'U')
    ) {
      e.preventDefault();
      alert('보안상의 이유로 소스 코드 및 개발자 도구를 열 수 없습니다.');
    }
  });
</script>
